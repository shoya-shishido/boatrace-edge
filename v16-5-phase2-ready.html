<style>
/* ═══════════════════════════════════════════════════
   BOATRACE EDGE v16.4 — Styles
   Dark Theme / Mobile-First / 6画面対応
   ═══════════════════════════════════════════════════ */

:root {
  --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px;
  --space-5:24px; --space-6:32px; --space-7:48px;
  --r-xs:4px; --r-sm:6px; --r:10px; --r-lg:14px; --r-xl:20px; --r-full:9999px;
}

/* ── Dark Theme ── */
:root {
  --bg:#0a0f1a; --bg2:#111827; --bg3:#1a2236;
  --sf:rgba(255,255,255,0.04); --sf2:rgba(255,255,255,0.07); --sf3:rgba(255,255,255,0.10);
  --bd:rgba(255,255,255,0.07); --bd2:rgba(255,255,255,0.12);
  --tx:#e8ecf4; --tx2:#8b95a8; --tx3:#94a0b4; --tx4:#6b7a90;
  --ac:#4f8cff; --ac2:#3b6fd9; --ac-s:rgba(79,140,255,0.12); --ac-t:#a0c4ff;
  --err:#f05252; --err-s:rgba(240,82,82,0.12);
  --warn:#f0a030; --warn-s:rgba(240,160,48,0.12);
  --ok:#30c060; --ok-s:rgba(48,192,96,0.12);
  --sh1:0 1px 3px rgba(0,0,0,0.3); --sh2:0 4px 16px rgba(0,0,0,0.3); --sh3:0 8px 32px rgba(0,0,0,0.4);
  color-scheme:dark;
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
body {
  background:var(--bg); color:var(--tx); font-family:'Noto Sans JP',-apple-system,'Hiragino Sans',sans-serif;
  font-size:14px; line-height:1.65; min-height:100dvh; -webkit-tap-highlight-color:transparent;
  padding-bottom:64px; overflow-x:hidden;
}
#root { min-height:100dvh; }
button { font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
input[type=range] { -webkit-appearance:none; appearance:none; background:transparent; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:var(--ac); border:2px solid var(--bg2); cursor:pointer; margin-top:-5px; }
input[type=range]::-webkit-slider-runnable-track { height:6px; border-radius:3px; }
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:2px; }

@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes dotPulse { 0%,80%,100%{transform:scale(0.6);opacity:0.3} 40%{transform:scale(1);opacity:1} }
.fade-up { animation:fadeUp .3s ease-out both; }

/* ── Skeleton Loading ── */
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
.skel { border-radius:var(--r-sm); background:linear-gradient(90deg,var(--sf) 25%,var(--sf2) 50%,var(--sf) 75%); background-size:200% 100%; animation:shimmer 1.5s ease-in-out infinite; }
.skel-card { border-radius:var(--r); background:var(--bg2); border:1px solid var(--bd); padding:16px; margin-bottom:10px; }
.skel-line { height:12px; margin-bottom:8px; }
.skel-line.w60 { width:60%; }
.skel-line.w80 { width:80%; }
.skel-line.w40 { width:40%; }
.skel-line.w100 { width:100%; }
.skel-circle { width:60px; height:60px; border-radius:50%; margin:0 auto 12px; }
.skel-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.skel-venue { height:68px; border-radius:var(--r); }
.skel-kpi { height:52px; border-radius:var(--r); }

/* ── Header ── */
.hdr { position:sticky; top:0; z-index:100; background:rgba(10,15,26,0.85); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-bottom:1px solid var(--bd); padding:8px 12px; display:flex; align-items:center; gap:6px; }
.hdr-logo { display:flex; align-items:center; gap:6px; }
.hdr-icon { width:26px; height:26px; border-radius:var(--r-sm); background:linear-gradient(135deg,#4f8cff,#7c5cfc); display:flex; align-items:center; justify-content:center; }
.hdr-icon svg { width:14px; height:14px; }
.hdr-title { font-size:14px; font-weight:900; letter-spacing:-0.3px; }
.hdr-ver { font-size:10px; color:var(--tx3); font-weight:600; margin-left:1px; }
.hdr-right { margin-left:auto; display:flex; align-items:center; gap:4px; }
.hdr-btn { height:30px; padding:0 8px; border-radius:var(--r-full); font-size:12px; font-weight:700; display:flex; align-items:center; gap:3px; transition:all .15s; }
.hdr-btn-primary { background:var(--ac); color:#fff; }
.hdr-btn-primary:active { background:var(--ac2); transform:scale(0.97); }
.hdr-btn-ghost { background:var(--sf2); color:var(--tx2); }
.hdr-date { display:flex; align-items:center; gap:2px; }
.hdr-date button { width:24px; height:24px; border-radius:50%; background:var(--sf); color:var(--tx3); font-size:12px; display:flex; align-items:center; justify-content:center; }
.hdr-date button:active { background:var(--sf2); }
.hdr-date span { font-size:11px; font-weight:700; font-family:'JetBrains Mono',monospace; color:var(--tx2); min-width:auto; text-align:center; white-space:nowrap; }

/* ── Footer Nav ── */
.fnav { position:fixed; bottom:0; left:0; right:0; z-index:100; background:rgba(10,15,26,0.92); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-top:1px solid var(--bd); display:flex; padding:4px 2px calc(env(safe-area-inset-bottom,0px) + 4px); }
.fnav button { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; padding:6px 0; font-size:12px; font-weight:600; color:var(--tx3); transition:color .15s; position:relative; min-height:54px; }
.fnav button.active { color:var(--ac-t); }
.fnav button.active::after { content:''; position:absolute; top:0; left:25%; right:25%; height:2px; background:var(--ac); border-radius:0 0 2px 2px; }
.fnav button svg { width:20px; height:20px; }
.fnav .ai-dot { position:absolute; top:6px; right:calc(50% - 13px); width:5px; height:5px; border-radius:50%; background:var(--ac); animation:pulse 2s infinite; }

/* ── Content ── */
.content { max-width:480px; margin:0 auto; padding:12px; }

/* ── Cards ── */
.card { background:var(--bg2); border:1px solid var(--bd); border-radius:var(--r-lg); padding:14px; margin-bottom:10px; }
.card-sm { padding:10px; margin-bottom:8px; }
.card-accent { border-color:rgba(79,140,255,0.15); background:linear-gradient(135deg,rgba(79,140,255,0.04),rgba(124,92,252,0.03)); }

/* ── Boat Badges ── */
.bn { display:inline-flex; align-items:center; justify-content:center; border-radius:50%; font-weight:700; flex-shrink:0; line-height:1; }
.bn-1{background:#f0f0f0;color:#111;border:1.5px solid #ccc} .bn-2{background:#111;color:#fff;border:1.5px solid #444}
.bn-3{background:#d42020;color:#fff;border:1.5px solid #f04040} .bn-4{background:#1a6dd4;color:#fff;border:1.5px solid #3888f0}
.bn-5{background:#d4a800;color:#111;border:1.5px solid #e8c020} .bn-6{background:#10944a;color:#fff;border:1.5px solid #28b860}

/* ── Rank badges ── */
.rank{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:var(--r-sm);font-size:13px;font-weight:900;}
.rank-S{background:linear-gradient(135deg,#f0a030,#f06030);color:#fff;} .rank-A{background:linear-gradient(135deg,#4f8cff,#7c5cfc);color:#fff;}
.rank-B{background:var(--ok-s);color:var(--ok);border:1px solid rgba(48,192,96,0.2);} .rank-D{background:var(--sf);color:var(--tx3);}

/* ── Chips ── */
.chip-row{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;}
.chip-row::-webkit-scrollbar{display:none;}
.chip{padding:7px 14px;border-radius:var(--r-full);font-size:13px;font-weight:700;white-space:nowrap;flex-shrink:0;background:var(--sf2);color:var(--tx2);border:1px solid transparent;transition:all .15s;}
.chip.on{background:var(--ac-s);color:var(--ac-t);border-color:rgba(79,140,255,0.2);}

/* ── Chaos Badge ── */
.chaos{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:var(--r-full);font-size:12px;font-weight:700;}
.chaos-low{background:var(--ok-s);color:var(--ok);} .chaos-mid{background:var(--warn-s);color:var(--warn);} .chaos-high{background:var(--err-s);color:var(--err);}

/* ── Recommend Card ── */
.rec{border-radius:var(--r-lg);padding:14px;margin-bottom:8px;border:1px solid var(--bd);background:var(--bg2);cursor:pointer;transition:all .15s;}
.rec:active{background:var(--bg3);transform:scale(0.99);}
.rec-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.rec-venue{font-size:14px;font-weight:700;flex:1;}
.rec-time{font-size:13px;color:var(--tx3);font-family:'JetBrains Mono',monospace;}
.rec-patterns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.rec-pat{font-size:13px;padding:3px 8px;border-radius:var(--r-full);background:var(--sf);color:var(--tx2);}
.rec-pat:first-child{background:var(--ac-s);color:var(--ac-t);}
.rec-bottom{display:flex;align-items:center;gap:8px;}
.rec-axis{display:flex;align-items:center;gap:5px;font-size:14px;font-weight:700;}
.rec-invest{margin-left:auto;font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--warn);}

/* ── Entry Card (選手) ── */
.ent{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd);}
.ent:last-child{border-bottom:none;}
.ent-name{font-size:15px;font-weight:700;color:var(--ac-t);cursor:pointer;}
.ent-name:active{opacity:0.7;}
.ent-sub{font-size:13px;color:var(--tx3);margin-top:1px;}
.ent-stats{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.ent-stat{font-size:13px;padding:3px 8px;border-radius:var(--r-xs);background:var(--sf);border:1px solid var(--bd);line-height:1.3;}
.ent-stat b{font-weight:700;margin-left:2px;}

/* ── Visual (展開予想) ── */
.vis-tabs{display:flex;gap:2px;background:var(--sf);border-radius:var(--r);padding:3px;margin-bottom:12px;}
.vis-tab{flex:1;padding:8px 6px;border-radius:calc(var(--r) - 2px);font-size:13px;font-weight:700;text-align:center;color:var(--tx3);transition:all .15s;}
.vis-tab.on{background:var(--bg2);color:var(--tx);box-shadow:var(--sh1);}
.vis-svg{border-radius:var(--r);overflow:hidden;background:linear-gradient(145deg,rgba(15,25,50,0.7),rgba(20,35,60,0.5));border:1px solid rgba(79,140,255,0.08);margin-bottom:12px;}
.vis-pat{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.vis-bar{flex:1;height:5px;background:var(--sf);border-radius:3px;overflow:hidden;}
.vis-fill{height:100%;border-radius:3px;transition:width .4s;}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:flex;flex-direction:column;justify-content:flex-end;}
.modal{background:var(--bg);border-top-left-radius:var(--r-xl);border-top-right-radius:var(--r-xl);max-height:90vh;display:flex;flex-direction:column;animation:slideUp .3s ease-out;}
.modal-head{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.modal-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--sf2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}

/* ── Chat ── */
.chat-fab{position:fixed;bottom:72px;right:14px;z-index:150;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#4f8cff,#7c5cfc);box-shadow:0 4px 20px rgba(79,140,255,0.35);display:none;align-items:center;justify-content:center;font-size:20px;transition:transform .2s;}
.chat-fab:active{transform:scale(0.92);}
.chat-box{position:fixed;inset:0;z-index:250;display:flex;flex-direction:column;background:var(--bg);}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.chat-msg{display:flex;gap:8px;max-width:90%;animation:fadeUp .2s ease-out;}
.chat-msg.user{align-self:flex-end;flex-direction:row-reverse;}
.chat-bubble{padding:10px 14px;border-radius:var(--r-lg);font-size:14px;line-height:1.7;}
.chat-msg.ai .chat-bubble{background:var(--bg2);border:1px solid var(--bd);}
.chat-msg.user .chat-bubble{background:var(--ac);color:#fff;}
.chat-input-row{padding:8px 12px calc(env(safe-area-inset-bottom,0px)+8px);border-top:1px solid var(--bd);display:flex;gap:8px;background:var(--bg);align-items:flex-end;}
.chat-input{flex:1;padding:10px 14px;border-radius:var(--r-full);background:var(--sf2);border:1px solid var(--bd);color:var(--tx);font-size:14px;outline:none;font-family:inherit;resize:none;max-height:80px;}
.chat-input:focus{border-color:var(--ac);box-shadow:0 0 0 2px var(--ac-s);}
.chat-send{width:36px;height:36px;border-radius:50%;background:var(--ac);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;align-self:flex-end;}
.chat-send:disabled{opacity:0.4;}
.chat-suggest{display:flex;gap:6px;flex-wrap:wrap;padding:0 16px 8px;}
.chat-suggest button{padding:7px 14px;border-radius:var(--r-full);font-size:13px;background:var(--sf2);color:var(--tx2);border:1px solid var(--bd);}

/* ── AI Dots ── */
.ai-dots{display:flex;align-items:center;gap:6px;padding:8px;font-size:13px;color:var(--tx3);}
.ai-dot-anim{width:6px;height:6px;border-radius:50%;background:var(--ac-t);animation:dotPulse 1.2s infinite;}
.ai-dot-anim:nth-child(2){animation-delay:0.15s;} .ai-dot-anim:nth-child(3){animation-delay:0.3s;}

/* ── Venue Grid ── */
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;}
.vcard{padding:10px 10px;border-radius:var(--r);background:var(--bg2);border:1px solid var(--bd);text-align:left;cursor:pointer;transition:all .15s;overflow:hidden;}
.vcard:active{background:var(--bg3);transform:scale(0.98);}
button:active:not(:disabled){opacity:0.7;transform:scale(0.97);transition:none;}
.vcard.off{opacity:0.25;cursor:default;}
.vcard-name{font-size:17px;font-weight:800;letter-spacing:0.3px;}
.vcard-sub{font-size:12px;color:var(--tx3);margin-top:2px;}

/* ── Race List ── */
.rlist{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.rbtn{padding:8px 4px;border-radius:var(--r);background:var(--sf);border:1px solid var(--bd);text-align:center;cursor:pointer;transition:all .15s;}
.rbtn:active{background:var(--sf2);}
.rbtn.on{border-color:var(--ac);background:var(--ac-s);}
.rbtn-no{font-size:13px;font-weight:900;}
.rbtn-time{font-size:12px;color:var(--tx3);font-family:'JetBrains Mono',monospace;}

/* ── Tab bar (Race detail) ── */
.tabs{display:flex;gap:2px;background:var(--sf);border-radius:var(--r);padding:3px;margin-bottom:12px;}
.tab{flex:1;padding:8px 6px;border-radius:calc(var(--r) - 2px);font-size:12px;font-weight:700;text-align:center;color:var(--tx3);transition:all .15s;white-space:nowrap;}
.tab.on{background:var(--bg2);color:var(--tx);box-shadow:var(--sh1);}

/* ── Stats row ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.kpi{text-align:center;padding:8px 4px;border-radius:var(--r-sm);background:var(--sf);}
.kpi-val{font-size:15px;font-weight:900;font-family:'JetBrains Mono',monospace;}
.kpi-label{font-size:12px;color:var(--tx3);margin-top:2px;}

/* ── Profile Modal ── */
.prof-radar{display:block;margin:0 auto;max-width:180px;}
.prof-bar{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.prof-bar-label{font-size:12px;color:var(--tx2);width:56px;flex-shrink:0;font-weight:600;}
.prof-bar-track{flex:1;height:5px;background:var(--sf);border-radius:3px;overflow:hidden;}
.prof-bar-fill{height:100%;border-radius:3px;}
.prof-bar-val{font-size:12px;font-weight:700;width:36px;text-align:right;}
.prof-tag{display:inline-block;padding:3px 10px;border-radius:var(--r-full);font-size:12px;font-weight:600;margin:2px;border:1px solid;}

/* ── Review ── */
.review{background:linear-gradient(135deg,rgba(124,92,252,0.06),rgba(79,140,255,0.06));border:1px solid rgba(124,92,252,0.1);border-radius:var(--r-lg);padding:14px;}
.review-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.review-icon{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#7c5cfc,#4f8cff);display:flex;align-items:center;justify-content:center;font-size:11px;}
.review-text{font-size:12px;line-height:1.8;color:var(--tx2);}

/* ── Daily Report ── */
.score-ring{width:80px;height:80px;margin:8px auto;position:relative;}
.score-ring svg{width:100%;height:100%;transform:rotate(-90deg);}
.score-ring circle{fill:none;stroke-width:7;stroke-linecap:round;}
.score-ring .bg{stroke:var(--sf);}

/* ── Empty state ── */
.empty{text-align:center;padding:var(--space-7) var(--space-5);}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:0.6;}
.empty-title{font-size:14px;font-weight:700;margin-bottom:6px;}
.empty-desc{font-size:12px;color:var(--tx2);line-height:1.7;margin-bottom:16px;}
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 28px;border-radius:var(--r-full);background:var(--ac);color:#fff;font-size:13px;font-weight:700;transition:all .15s;}
.btn-primary:active{background:var(--ac2);transform:scale(0.97);}
.btn-ghost{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:var(--r-full);background:var(--sf2);color:var(--tx2);font-size:12px;font-weight:700;border:1px solid var(--bd);}

/* ── Spinner ── */
.spinner{width:28px;height:28px;border:3px solid var(--ac);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}

/* ── Responsive ── */
@media (max-width:380px) {
  .content{padding:8px;}
  .card{padding:10px;margin-bottom:8px;}
  .kpi-row{grid-template-columns:repeat(2,1fr);}
  .rlist{grid-template-columns:repeat(3,1fr);}
  .hdr-date span{font-size:10px;}
  .rec{padding:10px;}

  const el = document.getElementById('root');
  if (el) {

    el.prepend(d);
  }
  return false;
};

// 甲子園: 資金配分（Kelly基準ベース × 場ティア補正）
// Kelly: f* = (p*b - q) / b where p=top combo prob, b=expected odds, q=1-p
// 実戦ではフルKellyの25%（quarter-Kelly）を使用
function calcBetAmount(rank, chaosScore, venueTier, topProb, expectedOdds) {
  if (venueTier === 'D') return 10000; // 回避場は最低額
  
  // Kelly基準計算（topProbとexpectedOddsがある場合）
  let kellyBase = 10000;
  if (topProb > 0 && expectedOdds > 1) {
    const b = expectedOdds - 1;
    const p = topProb;
    const q = 1 - p;
    const kellyF = Math.max(0, (p * b - q) / b);
    // quarter-Kelly × 総予算の1%を1レース上限
    kellyBase = Math.round(kellyF * 0.25 * 2000000 / 100) * 100;
  }
  
  // ランク補正
  const rankM = rank === 'S' ? 1.5 : rank === 'A' ? 1.0 : 0.7;
  // 場ティア補正（実績ROIベース）
  const tierM = venueTier === 'S' ? 1.3 : venueTier === 'A' ? 1.1 : venueTier === 'B' ? 1.0 : 0.8;
  // 荒れ度補正（高荒れROI 110%実績、ただし298Rなので控えめに）
  const chaosM = chaosScore >= 70 ? 1.3 : chaosScore >= 40 ? 0.9 : 1.0;
  
  const raw = Math.max(kellyBase, 10000) * rankM * tierM * chaosM;
  return Math.max(10000, Math.min(50000, Math.round(raw / 100) * 100));
}

// v10: 選択日付（デフォルト=今日JST）
let selectedDate = null; // null = today

function getTodayStr() {
  const now = new Date();
  const jst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
  const y = jst.getUTCFullYear();
  const m = String(jst.getUTCMonth() + 1).padStart(2, '0');
  const d = String(jst.getUTCDate()).padStart(2, '0');
  return `${y}${m}${d}`;
}

function getDateStr() {
  return selectedDate || getTodayStr();
}

function isToday() {
  return !selectedDate || selectedDate === getTodayStr();
}

function shiftDate(ds, delta) {
  const y = parseInt(ds.slice(0,4));
  const m = parseInt(ds.slice(4,6)) - 1;
  const d = parseInt(ds.slice(6,8));
  const dt = new Date(y, m, d + delta);
  return `${dt.getFullYear()}${String(dt.getMonth()+1).padStart(2,'0')}${String(dt.getDate()).padStart(2,'0')}`;
}

function formatDateLabel(ds) {
  const today = getTodayStr();
  const yesterday = shiftDate(today, -1);
  const mm = ds.slice(4,6);
  const dd = ds.slice(6,8);
  if (ds === today) return `${mm}/${dd} (今日)`;
  if (ds === yesterday) return `${mm}/${dd} (昨日)`;
  return `${mm}/${dd}`;
}

function setDate(ds) {
  selectedDate = ds === getTodayStr() ? null : ds;

  fetchAll();
}

function getDatePath() {

}

// ── 支部マスター自動検証（3ヶ月ごと）──
// APIデータ読み込み時に未知のbranch_numberがあればコンソールに警告
// これにより新支部追加やAPIスキーマ変更を自動検知
function validateBranchMapping(entries) {
  const unknowns = new Map();
  for (const e of entries) {
    if (e._rawBranchNum && !BRANCH_NUM_MAP[e._rawBranchNum]) {
      unknowns.set(e._rawBranchNum, (unknowns.get(e._rawBranchNum) || 0) + 1);
    }
  }
  if (unknowns.size > 0) {
    console.warn('[EDGE] ⚠️ 未知の支部番号を検出! BRANCH_NUM_MAPの更新が必要:', Object.fromEntries(unknowns));
    console.warn('[EDGE] 更新手順: BRANCH_NUM_MAPに {番号:\'支部名\'} を追加');
  }
  // 支部解決率をログ
  const total = entries.filter(e => e.regNo > 0).length;
  const resolved = entries.filter(e => e.branch).length;
  if (total > 0) {
    const pct = Math.round(resolved / total * 100);
    /* console.log(`[EDGE] 支部解決率: ${resolved}/${total} (${pct}%) ${ */
  }
}

// 支部情報をbr-racers.jpから動的に補完（フォールバック用：通常はBRANCH_NUM_MAPで解決済み）
async function supplementBranchFromBR(entries) {
  const missing = entries.filter(e => !e.branch && e.regNo);
  if (missing.length === 0) return;
  // For remaining without branch, try br-racers.jp search
  for (const e of missing) {
    try {
      const url = `https://br-racers.jp/?q=${e.regNo}`;
      const html = await fetchViaProxy(url);
      if (!html) continue;
      const branchPattern = /(群馬|埼玉|東京|静岡|愛知|三重|福井|滋賀|大阪|兵庫|徳島|香川|岡山|広島|山口|福岡|佐賀|長崎)支部/;
      const m = html.match(branchPattern);
      if (m) {
        e.branch = m[1];
      }
    } catch(err) { console.warn('[br-branch]', err); }
  }
}

// ── 今節成績: results JSONから逆算（HTMLパースより信頼性が高い）──
async function supplementSesFromResults(vid) {
  const key = `ses-results-${vid}`;
  if (liveCache[key]) return;
  liveCache[key] = true;
  
  const venue = state.venues.find(v => v.id === vid);
  if (!venue || !venue.schedule || venue.schedule.length === 0) return;
  
  const todayStr = getDateStr();
  const todayY = parseInt(todayStr.slice(0, 4));
  
  // venue.scheduleから日付リストを作成（当日含む）
  const allDates = [];
  for (const s of venue.schedule) {
    const dateStr = `${todayY}${String(s.month).padStart(2,'0')}${String(s.date).padStart(2,'0')}`;
    if (dateStr <= todayStr) allDates.push(dateStr);
  }
  if (allDates.length === 0) return;
  /* console.log(`[EDGE-SES-API] Building ses from results for ${ */
  
  // 選手の登録番号セット
  const regToName = {};
  for (const race of venue.races) {
    for (const e of race.entries) {
      if (e.regNo) regToName[e.regNo] = e.name;
    }
  }
  
  const sesMap = {}; // regNo → [{rank, raceNo, course, st, date}]
  
  for (const dateStr of allDates) {
    try {
      const yr = dateStr.slice(0, 4);
      const pCacheKey = `prog-${yr}/${dateStr}`, rCacheKey = `res-${yr}/${dateStr}`;
      let progData = cachePrograms.get(pCacheKey);
      let resData = cacheResults.get(rCacheKey);
      
      if (!progData || !resData) {
        const progUrl = `${API_BASE}/programs/v2/${yr}/${dateStr}.json`;
        const resUrl = `${API_BASE}/results/v2/${yr}/${dateStr}.json`;
        const [progRes, resRes] = await Promise.all([
          fetch(progUrl).catch(() => null),
          fetch(resUrl).catch(() => null)
        ]);
        if (!progRes?.ok || !resRes?.ok) continue;
        progData = await progRes.json();
        resData = await resRes.json();
        cachePrograms.set(pCacheKey, progData);
        cacheResults.set(rCacheKey, resData);
      }
      
      const venueProgs = (progData.programs || []).filter(p => p.race_stadium_number === vid);
      const venueResults = (resData.results || []).filter(r => r.race_stadium_number === vid);
      
      // 艇番→登録番号マッピング
      const bnToReg = {};
      for (const prog of venueProgs) {
        const rno = prog.race_number;
        bnToReg[rno] = {};
        const boats = prog.boats || {};
        const boatArr = Array.isArray(boats) ? boats : Object.values(boats);
        for (const b of boatArr) {
          if (b.racer_boat_number && b.racer_number) {
            bnToReg[rno][b.racer_boat_number] = b.racer_number;
          }
        }
      }
      
      for (const res of venueResults) {
        const rno = res.race_number;
        const boats = res.boats || {};
        const boatArr = Array.isArray(boats) ? boats : Object.values(boats);
        const mapping = bnToReg[rno] || {};
        
        for (const b of boatArr) {
          const bn = b.racer_boat_number;
          const regNo = mapping[bn] || b.racer_number;
          if (!regNo || !regToName[regNo]) continue;
          
          const place = b.racer_place_number;
          if (!place || place < 1) continue;
          
          if (!sesMap[regNo]) sesMap[regNo] = [];
          sesMap[regNo].push({
            rank: place,
            raceNo: rno,
            course: b.racer_course_number || null,
            st: b.racer_start_timing ?? null,
            date: dateStr,
          });
        }
      }
    } catch(e) {
      console.warn(`[EDGE-SES-API] Error fetching ${dateStr}:`, e.message);
    }
  }
  
  // sesResults適用
  let updated = 0;
  for (const race of venue.races) {
    for (const e of race.entries) {
      if (!e.regNo || !sesMap[e.regNo]) continue;
      const apiSes = sesMap[e.regNo];
      if (apiSes.length > 0) {
        // API版は常に優先（JSONパースなので信頼性が高い）
        e.sesResults = apiSes.map((s, i) => ({
          rank: s.rank,
          course: s.course,
          st: s.st,
          day: Math.floor(i / 2) + 1,
        }));
        e._sesSource = 'api'; // デバッグ用
        updated++;
      }
    }
  }
  
  /* console.log(`[EDGE-SES-API] Updated ${updated} entries for $ */
  if (updated > 0) render();
}

  const targetRegNos = new Set(needStats.map(e => e.regNo));
  const courseHistory = {}; // regNo → [{course, rank, st}]
  
  /* console.log(`[EDGE-COURSE-API] Building course stats for ${t */
  
  // 過去180日分を段階的にロード（60日→中間render→残り120日）
  const DAYS_BACK = 180;
  const PHASE1 = 60; // 最初に60日分を取得して即表示
  const fetchDates = [];
  for (let d = 1; d <= DAYS_BACK; d++) {
    const dt = new Date(today);
    dt.setDate(dt.getDate() - d);
    const ds = `${dt.getFullYear()}${String(dt.getMonth()+1).padStart(2,'0')}${String(dt.getDate()).padStart(2,'0')}`;
    fetchDates.push(ds);
  }
  
  // 日付をまとめてfetch（並列数を制限、7日ずつ）
  const BATCH = 7;
  let renderedPhase1 = false;
  for (let i = 0; i < fetchDates.length; i += BATCH) {
    const batch = fetchDates.slice(i, i + BATCH);
    const results = await Promise.all(batch.map(async (dateStr) => {
      try {
        const yr = dateStr.slice(0, 4);
        const pKey = `prog-${yr}/${dateStr}`, rKey = `res-${yr}/${dateStr}`;
        let prog = cachePrograms.get(pKey), res = cacheResults.get(rKey);
        if (!prog || !res) {
          const [progRes, resRes] = await Promise.all([
            fetch(`${API_BASE}/programs/v2/${yr}/${dateStr}.json`).catch(() => null),
            fetch(`${API_BASE}/results/v2/${yr}/${dateStr}.json`).catch(() => null)
          ]);
          if (!progRes?.ok || !resRes?.ok) return null;
          prog = await progRes.json(); res = await resRes.json();
          cachePrograms.set(pKey, prog); cacheResults.set(rKey, res);
        }
        return { prog, res };
      } catch { return null; }
    }));
    
    // Phase1完了時（60日分取得後）に中間renderして先に表示
    if (!renderedPhase1 && i + BATCH >= PHASE1) {
      renderedPhase1 = true;
      // 中間集計 → 表示
      _applyCourseStats(race, courseHistory, targetRegNos, false);
      render();
    }
    
    for (const data of results) {
      if (!data) continue;
      const allProgs = data.prog.programs || [];
      const allResults = data.res.results || [];
      
      // 全場の全レースから対象選手のデータを抽出
      // まずprogramsから登録番号→艇番マッピングを構築
      const raceMap = {}; // `${sid}-${rno}` → {bn: regNo}
      for (const prog of allProgs) {
        const k = `${prog.race_stadium_number}-${prog.race_number}`;
        raceMap[k] = {};
        const boats = prog.boats || {};
        const boatArr = Array.isArray(boats) ? boats : Object.values(boats);
        for (const b of boatArr) {
          if (b.racer_boat_number && b.racer_number && targetRegNos.has(b.racer_number)) {
            raceMap[k][b.racer_boat_number] = b.racer_number;
          }
        }
      }
      
      // resultsから着順+コース+STを抽出
      for (const res of allResults) {
        const k = `${res.race_stadium_number}-${res.race_number}`;
        const mapping = raceMap[k];
        if (!mapping) continue;
        
        const boats = res.boats || {};
        const boatArr = Array.isArray(boats) ? boats : Object.values(boats);
        for (const b of boatArr) {
          const regNo = mapping[b.racer_boat_number] || b.racer_number;
          if (!regNo || !targetRegNos.has(regNo)) continue;
          
          const place = b.racer_place_number;
          const course = b.racer_course_number;
          if (!place || place < 1 || !course || course < 1 || course > 6) continue;
          
          if (!courseHistory[regNo]) courseHistory[regNo] = [];
          courseHistory[regNo].push({
            course,
            rank: place,
            st: b.racer_start_timing ?? null,
          });
        }
      }
    }
    
    // レートリミット：バッチ間に少し待機
    if (i + BATCH < fetchDates.length) await new Promise(r => setTimeout(r, 100));
  }
  
  // courseHistoryから各選手のコース別成績を集計
  _applyCourseStats(race, courseHistory, targetRegNos, true);
}

function _applyCourseStats(race, courseHistory, targetRegNos, isFinal) {
  let built = 0;
  for (const e of race.entries) {
    if (!e.regNo) continue;
    // 最終パスではcourseStatsを上書き、中間パスでは未設定のみ
    if (!isFinal && e.courseStats) continue;
    if (!targetRegNos.has(e.regNo)) continue;
    const history = courseHistory[e.regNo];
    if (!history || history.length < 3) continue; // 最低3走ないと統計不十分
    
    const courseData = {};
    const totalRaces = history.length;
    
    for (let c = 1; c <= 6; c++) {
      const cRaces = history.filter(h => h.course === c);
      if (cRaces.length === 0) {
        courseData[c] = { entryRate: 0, winRate: null, top2Rate: null, top3Rate: null, avgST: null };
        continue;
      }
      const entryRate = Math.round(cRaces.length / totalRaces * 1000) / 10;
      const wins = cRaces.filter(h => h.rank === 1).length;
      const top2 = cRaces.filter(h => h.rank <= 2).length;
      const top3 = cRaces.filter(h => h.rank <= 3).length;
      const sts = cRaces.filter(h => h.st != null && h.st > 0).map(h => h.st);
      
      courseData[c] = {
        entryRate,
        winRate: Math.round(wins / cRaces.length * 1000) / 10,
        top2Rate: Math.round(top2 / cRaces.length * 1000) / 10,
        top3Rate: Math.round(top3 / cRaces.length * 1000) / 10,
        avgST: sts.length > 0 ? Math.round(sts.reduce((a,b) => a+b, 0) / sts.length * 100) / 100 : null,
        races: cRaces.length, // デバッグ用: サンプル数
      };
    }
    
    e.courseStats = courseData;
    built++;
    console.log(`[EDGE-COURSE-API] OK: ${e.name} (${e.regNo}) ${history.length}走`,
      Object.entries(courseData).filter(([,d]) => d.races > 0).map(([c, d]) => `${c}C:${d.races}走/1着${d.winRate}%/3連${d.top3Rate}%`).join(' '));
  }
  
  /* console.log(`[EDGE-COURSE-API] Built ${built}/${race.entries */
  if (built > 0 && isFinal) render();
}

async function supplementCourseStats(vid, rno) {
  const key = `course-${vid}-${rno}`;
  if (liveCache[key]) return;
  liveCache[key] = true;
  try {
    const venue = state.venues.find(v => v.id === vid);
    if (!venue) return;
    const race = venue.races.find(r => r.number === rno);
    if (!race) return;
    
    // 6艇を順番に取得（レートリミット回避のためstagger）
    for (const entry of race.entries) {
      if (!entry.regNo || entry.courseStats) continue;
      const cacheKey = `cs-${entry.regNo}`;
      if (liveCache[cacheKey]) { entry.courseStats = liveCache[cacheKey]; continue; }
      try {
        const url = `https://www.boatrace.jp/owpc/pc/data/racersearch/course?toban=${entry.regNo}`;
        /* console.log(`[EDGE] CourseStats fetching: ${entry.name} (${e */
        const html = await fetchViaProxy(url);
        if (!html) { console.warn(`[EDGE] CourseStats: no HTML for ${entry.regNo}`); continue; }
        
        // テキストベースパース（最も確実）
        // 公式HTML: テーブルの中にタイトルセル+データ行がある
        // テキストを抜き出して「進入率」「3連対率」「スタートタイミング」の各セクションからデータ取得
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const allText = doc.body?.textContent || '';
        
        // ── 公式ページのテーブル構造 ──
        // 順番: 進入率 → 1着率 → 2連対率 → 3連対率 → 平均スタートタイミング
        // 各セクションに6コース分のパーセント値（STのみ秒数）
        
        let entryRates = [], winRates = [], top2Rates = [], top3Rates = [], avgSTs = [];
        
        // 方法1: セクション区切りで抽出（テキストベース）
        // 進入率 → 1着率まで
        const entrySection = allText.match(/進入率([\s\S]*?)(?=1着率|１着率)/)?.[1] || '';
        const entryMatches = entrySection.match(/(\d+\.?\d*)%/g);
        if (entryMatches && entryMatches.length >= 6) {
          entryRates = entryMatches.slice(0, 6).map(s => parseFloat(s));
        }
        
        // 1着率 → 2連対率まで
        const winSection = allText.match(/(?:1着率|１着率)([\s\S]*?)(?=2連対率|２連対率)/)?.[1] || '';
        const winMatches = winSection.match(/(\d+\.?\d*)%/g);
        if (winMatches && winMatches.length >= 6) {
          winRates = winMatches.slice(0, 6).map(s => parseFloat(s));
        }
        
        // 2連対率 → 3連対率まで
        const top2Section = allText.match(/(?:2連対率|２連対率)([\s\S]*?)(?=3連対率|３連対率)/)?.[1] || '';
        const top2Matches = top2Section.match(/(\d+\.?\d*)%/g);
        if (top2Matches && top2Matches.length >= 6) {
          top2Rates = top2Matches.slice(0, 6).map(s => parseFloat(s));
        }
        
        // 3連対率 → スタートタイミングまで
        const top3Section = allText.match(/(?:3連対率|３連対率)([\s\S]*?)(?=スタートタイミング|平均ST)/)?.[1] || '';
        const top3Matches = top3Section.match(/(\d+\.?\d*)%/g);
        if (top3Matches && top3Matches.length >= 6) {
          top3Rates = top3Matches.slice(0, 6).map(s => parseFloat(s));
        }
        
        // 平均ST
        const stSection = allText.match(/スタートタイミング([\s\S]*?)(?=スタート順|集計期間|$)/)?.[1] || '';
        const stMatches = stSection.match(/(\d+\.\d{2})/g);
        if (stMatches && stMatches.length >= 6) {
          avgSTs = stMatches.slice(0, 6).map(s => parseFloat(s));
        }
        
        // 方法2: テーブルからDOMで抽出（フォールバック）
        if (entryRates.length < 6 || winRates.length < 6 || top3Rates.length < 6 || avgSTs.length < 6) {
          const tables = doc.querySelectorAll('table');
          for (const tbl of tables) {
            const tblText = tbl.textContent || '';
            const rows = tbl.querySelectorAll('tr');
            const vals = [];
            for (const row of rows) {
              const tds = row.querySelectorAll('td');
              if (tds.length >= 2) {
                const lastTd = tds[tds.length - 1].textContent.trim();
                const num = parseFloat(lastTd.replace('%', ''));
                if (!isNaN(num)) vals.push(num);
              }
            }
            if (vals.length >= 6) {
              if (tblText.includes('進入率') && entryRates.length < 6) entryRates = vals.slice(0, 6);
              else if ((tblText.includes('1着率') || tblText.includes('１着率')) && winRates.length < 6) winRates = vals.slice(0, 6);
              else if ((tblText.includes('2連対率') || tblText.includes('２連対率')) && top2Rates.length < 6) top2Rates = vals.slice(0, 6);
              else if ((tblText.includes('3連対率') || tblText.includes('３連対率')) && top3Rates.length < 6) top3Rates = vals.slice(0, 6);
              else if (tblText.includes('スタートタイミング') && avgSTs.length < 6) avgSTs = vals.slice(0, 6);
            }
          }
        }
        
        // 最低限: 進入率+3連対率+STが揃えばOK（1着率・2連対率はオプショナル）
        if (entryRates.length >= 6 && top3Rates.length >= 6 && avgSTs.length >= 6) {
          const courseData = {};
          for (let c = 1; c <= 6; c++) {
            courseData[c] = {
              entryRate: entryRates[c - 1],
              winRate: winRates.length >= 6 ? winRates[c - 1] : null,
              top2Rate: top2Rates.length >= 6 ? top2Rates[c - 1] : null,
              top3Rate: top3Rates[c - 1],
              avgST: avgSTs[c - 1],
            };
          }
          entry.courseStats = courseData;
          liveCache[cacheKey] = courseData;
          console.log(`[EDGE] CourseStats OK: ${entry.name} (${entry.regNo})`, 
            Object.entries(courseData).map(([c, d]) => `${c}C:入${d.entryRate}%/1着${d.winRate ?? '?'}%/2連${d.top2Rate ?? '?'}%/3連${d.top3Rate}%/ST${d.avgST}`).join(' '));
        } else {
          console.warn(`[EDGE] CourseStats incomplete: ${entry.name} entry=${entryRates.length} win=${winRates.length} top2=${top2Rates.length} top3=${top3Rates.length} st=${avgSTs.length}`);
        }
        
        // レートリミット回避: 200ms待機
        await new Promise(r => setTimeout(r, 200));
      } catch(e) { console.warn(`[EDGE] CourseStats error: ${entry.regNo}`, e.message); }
    }
    
    // レンダリング通知
    const loaded = race.entries.filter(e => e.courseStats).length;
    /* console.log(`[EDGE] CourseStats complete: ${loaded}/${race.e */
  } catch(err) { console.warn('[courseStats]', err); }
}

// ── Utilities ──
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'style' && typeof v === 'object') {
        Object.assign(el.style, v);
      } else if (k.startsWith('on')) {
        el.addEventListener(k.slice(2).toLowerCase(), v);
      } else if (k === 'className') {
        el.className = v;
      } else if (k === 'innerHTML') {
        el.innerHTML = v;
      } else if (k === 'disabled') {
        el.disabled = !!v;
      } else {
        el.setAttribute(k, v);
      }
    }
  }
  for (const c of children.flat()) {
    if (c == null || c === false || c === true) continue;
    el.appendChild(typeof c === 'object' && c instanceof Node ? c : document.createTextNode(String(c)));
  }
  return el;
}

function fmt(v, d) {
  if (v == null || v === '') return '—';
  return Number(v).toFixed(d != null ? d : 2);
}

}

function getDeadline(time) {
  if (!time) return { label:'--:--', color:var_text4, blink:false, closed:false, minutesLeft:null };
  const now = new Date();
  let target;
  if (time.includes('-')) {
    target = new Date(time.replace(' ','T'));
  } else {
    const [hh, mm] = time.split(':').map(Number);
    target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hh, mm, 0);
  }
  const diff = (target - now) / 60000;
  const label = String(target.getHours()).padStart(2,'0') + ':' + String(target.getMinutes()).padStart(2,'0');
  if (diff < 0) return { label, color:'var(--tx4)', blink:false, closed:true, minutesLeft:diff };
  if (diff < 10) return { label, color:'var(--err)', blink:true, closed:false, minutesLeft:diff };
  if (diff < 30) return { label, color:'var(--warn)', blink:false, closed:false, minutesLeft:diff };
  return { label, color:'var(--tx3)', blink:false, closed:false, minutesLeft:diff };
}

const var_text4 = '#475569';

// ── Data Fetching ──
function apiUrlDate(type) {
  return `${API_BASE}/${type}/v2/${getDatePath()}.json`;
}
function apiUrlToday(type) {
  return `${API_BASE}/${type}/v2/today.json`;
}

function isDataSufficient(type, data) {
  if (type === 'previews') {
    const races = data.previews || [];
    if (races.length === 0) return false;
    // Check if any race has actual exhibition data (not all null)
    return races.some(rc => {
      const boats = rc.boats || {};
      const vals = Array.isArray(boats) ? boats : Object.values(boats);
      return vals.some(b => b.racer_exhibition_time != null && b.racer_exhibition_time > 0);
    });
  }
  if (type === 'results') {
    const races = data.results || [];
    if (races.length === 0) return false;
    return races.some(rc => {
      const boats = Array.isArray(rc.boats) ? rc.boats : Object.values(rc.boats || {});
      return boats.some(b => b.racer_place_number != null);
    });
  }
  return true;
}

async function fetchData(type) {
  state.fs[type] = 'loading';
  state.err = null;
  render();
  
  // #16 リトライロジック（指数バックオフ）
  const MAX_RETRIES = 2;
  for (let attempt = 0; attempt <= MAX_RETRIES; attempt++) {
    if (attempt > 0) {
      const delay = Math.min(2000 * Math.pow(2, attempt - 1), 8000);
      /* console.log(`[EDGE] ${type}: リトライ ${attempt}/${MAX_RETRIES}  */
      await new Promise(r => setTimeout(r, delay));
    }
    
    try {
    // Try date-specific URL first
    const dateUrl = apiUrlDate(type);
    /* console.log(`[EDGE] Fetching ${type}: ${dateUrl}`); */
    let res = await fetch(dateUrl);
    let data = null;
    let usedFallback = false;
    
    if (res.ok) {
      data = await res.json();
      /* console.log(`[EDGE] ${type} date-specific: loaded`); */
    }
    
    // For all types: check if data is sufficient, fallback to today.json
    // (only for today's date — past dates won't have today.json)
    if (isToday() && (!data || !isDataSufficient(type, data))) {
      /* console.log(`[EDGE] ${type}: date-specific data insufficient */
      const todayUrl = apiUrlToday(type);
      try {
        const res2 = await fetch(todayUrl);
        if (res2.ok) {
          const data2 = await res2.json();
          // Verify data is actually for today (not stale yesterday's data)
          const todayStr = getDateStr();
          const todayDash = todayStr.slice(0,4)+'-'+todayStr.slice(4,6)+'-'+todayStr.slice(6,8);
          let isCurrentData = true;
          if (type === 'programs' && data2.programs?.length > 0) {
            const firstDate = data2.programs[0].race_date || '';
            if (firstDate && firstDate !== todayDash) {
              /* console.log(`[EDGE] ${type}: today.json contains stale data  */
              isCurrentData = false;
            }
          } else if (type === 'previews' && data2.previews?.length > 0) {
            const firstDate = data2.previews[0].race_date || '';
            if (firstDate && firstDate !== todayDash) {
              /* console.log(`[EDGE] ${type}: today.json contains stale data  */
              isCurrentData = false;
            }
          } else if (type === 'results' && data2.results?.length > 0) {
            const firstDate = data2.results[0].race_date || '';
            if (firstDate && firstDate !== todayDash) {
              /* console.log(`[EDGE] ${type}: today.json contains stale data  */
              isCurrentData = false;
            }
          }
          if (isCurrentData) {
            if (type === 'programs' ? (data2.programs || []).length > 0 : isDataSufficient(type, data2)) {
              data = data2;
              usedFallback = true;
              /* console.log(`[EDGE] ${type}: using today.json (fallback)`); */
            } else if (!data) {
              data = data2;
              usedFallback = true;
            }
          }
        }
      } catch(e2) {
        console.warn(`[EDGE] ${type} today.json fallback failed:`, e2);
      }
    }
    
    if (!data) {
      if (!res.ok) {
        if (res.status === 404) {
          const hr = new Date().getHours();
          if (hr >= 0 && hr < 8) {
            throw new Error(`本日(${getDateStr()})のデータはAPI更新待ちです。\n深夜〜早朝はデータが未反映の場合があります。\n← 前日ボタンで昨日の結果を確認できます。`);
          } else {
            throw new Error(`本日(${getDateStr()})のデータが見つかりません。\nしばらく経ってからリトライしてください。`);
          }
        }
        throw new Error(`HTTP ${res.status}`);
      }
      throw new Error('データの取得に失敗しました');
    }
    
    if (type === 'programs') {
      state.programs = data;
      state.venues = parsePrograms(data);
      const cnt = (data.programs || []).length;
      const vCnt = state.venues.filter(v => v.active).length;
      state.src = `${vCnt}場 ${cnt}R`;
    } else if (type === 'previews') {
      state.previews = data;
      state.pvMap = parsePreviews(data);
      const pvKeys = Object.keys(state.pvMap);
      const hasEx = pvKeys.filter(k => state.pvMap[k].entries.some(e => e.exST != null && e.exST !== 0)).length;
      /* console.log(`[EDGE] Previews: ${pvKeys.length} races, ${hasE */
    } else {
      state.results = data;
      state.rMap = parseResults(data);
      const hasResults = Object.keys(state.rMap).filter(k => state.rMap[k].hasResult).length;
      /* console.log(`[EDGE] Results: ${Object.keys(state.rMap).lengt */
    }
    
    state.fs[type] = 'done';
    state.lastUpdate = new Date();
    state._picksCache = null; // invalidate AI picks cache
    return; // 成功したらリトライループを抜ける
  } catch(e) {
    if (attempt >= MAX_RETRIES) {
      state.fs[type] = 'error';
      state.err = `${type}取得失敗: ${e.message}`;
    } else {
      console.warn(`[EDGE] ${type} attempt ${attempt} failed:`, e.message);
      continue; // リトライ
    }
  }
  } // end retry loop
  render();
}

// ── VENUE_TRAITS自動更新: results APIから場別コース別1着率を再計算 ──
async function updateVenueTraitsFromResults() {
  const cacheKey = 'venue-traits-update';
  if (liveCache[cacheKey]) return;
  liveCache[cacheKey] = true;
  
  const todayStr = getDateStr();
  const today = new Date(parseInt(todayStr.slice(0,4)), parseInt(todayStr.slice(4,6))-1, parseInt(todayStr.slice(6,8)));
  const DAYS = 90; // 直近90日分
  const venueCourseWins = {}; // vid → [c1wins, c2wins, ..., c6wins]
  const venueTotals = {};     // vid → total races
  
  for (let d = 1; d <= DAYS; d++) {
    const dt = new Date(today);
    dt.setDate(dt.getDate() - d);
    const ds = `${dt.getFullYear()}${String(dt.getMonth()+1).padStart(2,'0')}${String(dt.getDate()).padStart(2,'0')}`;
    const yr = ds.slice(0, 4);
    try {
      const res = await fetch(`${API_BASE}/results/v2/${yr}/${ds}.json`).catch(() => null);
      if (!res?.ok) continue;
      const data = await res.json();
      const results = Array.isArray(data.results) ? data.results : Object.values(data.results || {});
      
      for (const r of results) {
        const vid = r.race_stadium_number;
        if (!VENUES[vid]) continue;
        const boats = Array.isArray(r.boats) ? r.boats : Object.values(r.boats || {});
        if (boats.length < 6) continue;
        
        if (!venueCourseWins[vid]) { venueCourseWins[vid] = [0,0,0,0,0,0]; venueTotals[vid] = 0; }
        venueTotals[vid]++;
        
        for (const b of boats) {
          if (b.racer_place_number === 1 && b.racer_course_number >= 1 && b.racer_course_number <= 6) {
            venueCourseWins[vid][b.racer_course_number - 1]++;
          }
        }
      }
    } catch { continue; }
    
    // 10日ごとに30ms待機（レートリミット対策）
    if (d % 10 === 0) await new Promise(r => setTimeout(r, 30));
  }
  
  // VENUE_TRAITSを更新
  let updated = 0;
  for (const [vidStr, wins] of Object.entries(venueCourseWins)) {
    const vid = Number(vidStr);
    const total = venueTotals[vid] || 1;
    if (total < 50) continue; // サンプル不足
    const traits = VENUE_TRAITS[vid];
    if (!traits) continue;
    
    const newRates = wins.map(w => Math.round(w / total * 100));
    // 更新（差が大きい場合のみログ）
    const oldRates = [traits.c1win, traits.c2win, traits.c3win, traits.c4win, traits.c5win, traits.c6win];
    traits.c1win = newRates[0]; traits.c2win = newRates[1]; traits.c3win = newRates[2];
    traits.c4win = newRates[3]; traits.c5win = newRates[4]; traits.c6win = newRates[5];
    
    const maxDiff = Math.max(...newRates.map((v, i) => Math.abs(v - oldRates[i])));
    if (maxDiff >= 3) {
      /* console.log(`[VENUE-UPDATE] ${traits.name}: ${oldRates.join( */
    }
    updated++;
  }
  if (updated > 0) console.log(`[VENUE-UPDATE] ${updated}場を更新 (${DAYS}日分)`);
}

// ── Parsers ──
function normalizeGrade(raw) {
  if (!raw && raw !== 0) return '一般';
  if (typeof raw === 'number' || !isNaN(Number(raw))) {
    return GRD_MAP[Number(raw)] || '一般';
  }
  const s = String(raw).toUpperCase();
  if (s.includes('SG')) return 'SG';
  if (s.includes('PG1')) return 'PG1';
  if (s.includes('G1')) return 'G1';
  if (s.includes('G2')) return 'G2';
  if (s.includes('G3')) return 'G3';
  return '一般';
}

function parseEntry(e, idx) {
  const clsNum = e.racer_class_number ?? 4;
  return {
    boatNumber: e.racer_boat_number ?? (idx + 1),
    name: e.racer_name || `${idx+1}号艇`,
    cls: CLS_MAP[clsNum] || 'B2',
    wr: e.racer_national_top_1_percent ?? null,
    dr: e.racer_national_top_2_percent ?? null,
    tr: e.racer_national_top_3_percent ?? null,
    lwr: e.racer_local_top_1_percent ?? null,
    ldr: e.racer_local_top_2_percent ?? null,
    ltr: e.racer_local_top_3_percent ?? null,
    mNo: e.racer_assigned_motor_number ?? 0,
    mdr: e.racer_assigned_motor_top_2_percent ?? null,
    mtr: e.racer_assigned_motor_top_3_percent ?? null,
    bNo: e.racer_assigned_boat_number ?? 0,
    bdr: e.racer_assigned_boat_top_2_percent ?? null,
    btr: e.racer_assigned_boat_top_3_percent ?? null,
    st: e.racer_average_start_timing ?? null,
    fc: e.racer_flying_count ?? 0,
    lc: e.racer_late_count ?? 0,
    wt: e.racer_weight ?? null,
    age: e.racer_age ?? null,
    regNo: e.racer_number ?? 0,
    branch: BRANCH_NUM_MAP[e.racer_branch_number] ?? e.racer_branch_name ?? e.racer_branch ?? null,
    _rawBranchNum: e.racer_branch_number ?? null,
    term: e.racer_term_number ?? e.racer_term ?? null,
  };
}

function parsePrograms(raw) {
  const races = raw.programs || [];
  if (!Array.isArray(races)) return [];
  const sMap = {};
  for (const rc of races) {
    const sid = rc.race_stadium_number || 0;
    if (!sMap[sid]) {
      sMap[sid] = {
        id: sid,
        name: VENUES[sid] || `#${sid}`,
        grade: normalizeGrade(rc.race_grade_number),
        series: rc.race_title || '',
        dayNo: rc.race_day_number || rc.day_number || rc.nday || 0,
        active: true,
        races: []
      };
    }
    const boatsRaw = rc.boats || [];
    const boatsArr = Array.isArray(boatsRaw) ? boatsRaw : Object.values(boatsRaw);
    const entries = boatsArr.map((b, i) => parseEntry(b, i));
    sMap[sid].races.push({
      number: rc.race_number || 0,
      name: rc.race_subtitle || rc.race_name || '',
      deadline: rc.race_closed_at || null,
      entries
    });
  }
  // 支部マスター検証（未知の支部番号がないかチェック）
  const allEntries = Object.values(sMap).flatMap(v => v.races.flatMap(r => r.entries));
  validateBranchMapping(allEntries);
  return Object.values(sMap)
    .map(v => { v.races.sort((a,b) => a.number - b.number); return v; })
    .sort((a,b) => a.id - b.id);
}

function parsePreviews(raw) {
  const map = {};
  const races = raw.previews || [];
  if (!Array.isArray(races)) return map;
  /* console.log(`[EDGE] parsePreviews: ${races.length} races`); */
  for (const rc of races) {
    const sid = rc.race_stadium_number || 0;
    const rno = rc.race_number || 0;
    const key = `${sid}-${rno}`;
    const boats = rc.boats || {};
    const entries = [];
    // boats can be object {"1":{...}} or array [{...}]
    const boatKeys = Array.isArray(boats) ? boats.map((_,i) => String(i)) : Object.keys(boats);
    if (boatKeys.length === 0) {
      console.warn(`[EDGE] Preview ${key}: boats is empty`, typeof boats, boats);
    }
    for (const k of boatKeys) {
      const x = Array.isArray(boats) ? boats[parseInt(k)] : boats[k];
      if (!x) continue;
      entries.push({
        bn: x.racer_boat_number ?? parseInt(k) ?? 0,
        course: x.racer_course_number || 0,  // 0 = not yet determined
        exST: x.racer_start_timing ?? null,   // can be 0.00 legitimately
        exT: x.racer_exhibition_time > 0 ? x.racer_exhibition_time : null,  // 0 = not measured
        tilt: x.racer_tilt_adjustment ?? null,
        wt: x.racer_weight > 0 ? x.racer_weight : null,  // 0 = not measured
      });
    }
    // Build course order
    const courseOrder = [];
    for (const e of entries) {
      if (e.course > 0) courseOrder[e.course - 1] = e.bn;
    }
    map[key] = {
      wind: rc.race_wind ?? null,
      windDir: rc.race_wind_direction_number ?? 0,
      wave: rc.race_wave ?? null,
      weather: rc.race_weather_number ?? 0,
      temp: rc.race_temperature ?? null,
      waterTemp: rc.race_water_temperature ?? null,
      entries,
      course: courseOrder.filter(v => v != null && v > 0),
    };
  }
  /* console.log(`[EDGE] parsePreviews: mapped ${Object.keys(map) */
  return map;
}

function parseResults(raw) {
  const map = {};
  const races = raw.results || [];
  if (!Array.isArray(races)) return map;
  for (const rc of races) {
    const sid = rc.race_stadium_number || 0;
    const rno = rc.race_number || 0;
    const key = `${sid}-${rno}`;
    const boatsRaw = rc.boats || [];
    const boats = Array.isArray(boatsRaw) ? boatsRaw : Object.values(boatsRaw);
    const order = [];
    const sts = {};
    for (const b of boats) {
      if (b.racer_place_number) {
        order.push({ bn: b.racer_boat_number, place: b.racer_place_number });
      }
      if (b.racer_start_timing != null) {
        sts[b.racer_boat_number] = b.racer_start_timing;
      }
    }
    order.sort((a,b) => a.place - b.place);
    const po = rc.payouts || {};
    function getPay(k) {
      const arr = po[k];
      if (!arr || !Array.isArray(arr) || !arr.length) return { combo:'—', amount:0 };
      const p = arr[0];
      return { combo: p.combination || '—', amount: p.payout || p.amount || 0 };
    }
    map[key] = {
      order: order.map(o => o.bn),
      technique: rc.race_technique_number || null,
      pay: { t3:getPay('trifecta'), f3:getPay('trio'), t2:getPay('exacta'), f2:getPay('quinella') },
      sts,
      hasResult: order.length > 0,
    };
  }
  return map;
}

// ═══════════════════════════════════════════════════════
//  [PREDICT] 予測エンジン — コアロジック
//  predict(), calcChaosScore()
//  入力: entries, pv, venueId → 出力: ranked[], trifectaProbs{}
//  UI非依存。バックテスト・作戦ボードから共用。
// ═══════════════════════════════════════════════════════

// ── Prediction ──
function isValidCourse(co) { return co && co.length === 6 && new Set(co).size === 6 && co.every(b => b >= 1 && b <= 6); }
function predict(entries, pv, venueId, raceGrade) {
  if (!entries || entries.length < 6) return null;
  // ═══ v16: レース格補正 ═══
  const GRADE_MULT = { 'SG':1.4, 'PG1':1.3, 'G1':1.25, 'G2':1.1, 'G3':1.05, '一般':1.0 };
  const gradeMult = GRADE_MULT[raceGrade] || 1.0;
  const courseAdv = getCourseAdv(venueId);
  const scores = [];
  for (let i = 0; i < entries.length; i++) {
    const e = entries[i];
    // Use actual course from preview if available, otherwise assume waku=course
    let course = i + 1;
    if (pv && isValidCourse(pv.course)) {
      const idx = pv.course.indexOf(e.boatNumber);
      if (idx >= 0) course = idx + 1;
    }
    const baseST = e.st != null ? e.st : 0.18;
    let st = baseST;
    let exBonus = 0;
    let weightAdj = 0; // v15.3: 体重変動
    if (pv) {
      // 展示タイムの場平均（相対評価用）
      const _allExT = (pv.entries || []).filter(p => p.exT).map(p => p.exT);
      const _avgExT = _allExT.length > 0 ? _allExT.reduce((a,b) => a+b, 0) / _allExT.length : 6.80;
      for (const pe of (pv.entries || [])) {
        if (pe.bn === e.boatNumber) {
          if (pe.exST != null && EX_PARAMS.stBlend > 0) st = baseST * (1 - EX_PARAMS.stBlend) + pe.exST * EX_PARAMS.stBlend;
          if (pe.exT != null && EX_PARAMS.exCoeff > 0) exBonus = Math.max(0, (_avgExT - pe.exT) * EX_PARAMS.exCoeff);
          // 体重変動: 出走表体重と展示体重の差
          if (pe.wt && e.wt && pe.wt > 0 && e.wt > 0) {
            const wtDiff = e.wt - pe.wt; // 正=減量してきた
            if (wtDiff >= 1.0) weightAdj = 0.3;       // 1kg以上減量→本気度高い
            else if (wtDiff >= 0.5) weightAdj = 0.15;  // 0.5kg減量→やや本気
            else if (wtDiff <= -1.0) weightAdj = -0.2; // 1kg増→消化レースの可能性
          }
          break;
        }
      }
    }
    // 当地勝率(lwr)と全国勝率(wr)のブレンド（当地の方が予測に重要）
    const effectiveWR = e.lwr > 0 ? (e.wr || 0) * 0.6 + e.lwr * 0.4 : (e.wr || 0);
    const fWR = effectiveWR * W.wr * 0.6;
    const fDR = (e.dr || 0) * W.t2 * 0.012;
    // Phase3 #9: 場分類補正
    const vClass = VENUE_CLASS_ADJUST[VENUE_CLASS[venueId]] || VENUE_CLASS_ADJUST.balanced;
    const fCRS = (courseAdv[course] || 0) * W.crs * vClass.crsBoost * (vClass.c2Boost && course === 2 ? vClass.c2Boost : 1.0);
    const fCLS = (CLASS_BONUS[e.cls] || 0) * W.cls * gradeMult;
    const fST = Math.max(0, (0.25 - st) * 12) * W.st * vClass.stReduce;
    const fMT = ((e.mdr || 30) - 30) * 0.1 * W.mt;
    const fEX = exBonus;
    // 枠番別（コース別）成績補正
    // courseStats[course] = { entryRate, winRate, top2Rate, top3Rate, avgST }
    let fCourseStats = 0;
    if (e.courseStats && e.courseStats[course]) {
      const cd = e.courseStats[course];
      // コース別1着率がある場合はそれを優先（最も予測に重要）
      if (cd.winRate != null && cd.winRate > 0) {
        const avgWin = COURSE_AVG[course - 1] || 10;
        const winAdj = (cd.winRate - avgWin) * 0.10; // v15.3: 0.06→0.10 コース適性をより重視
        fCourseStats += winAdj;
      } else {
        // 3連対率フォールバック
        const top3Adj = (cd.top3Rate - 40) * 0.04;
        fCourseStats += top3Adj;
      }
      // コース別STがeの全体平均STより速い場合はボーナス
      const stAdj = cd.avgST > 0 ? Math.max(0, (baseST - cd.avgST) * 5) : 0;
      // コース別進入率 → そのコースに入り慣れているか
      const expAdj = cd.entryRate > 25 ? (cd.entryRate - 15) * 0.01 : cd.entryRate < 5 ? -0.3 : 0;
      fCourseStats += stAdj + expAdj;
    }
    // 今節得点率（好調/不調を反映）v15.3: 係数UP
    let fSES = 0;
    let fTrend = 0; // v16: 今節トレンド
    if (e.sesResults?.length > 0) {
      const pts = e.sesResults.filter(r => r.rank <= 6).map(r => [10,8,6,4,2,1][r.rank-1] || 0);
      const sesScore = pts.length > 0 ? pts.reduce((a,b) => a+b, 0) / pts.length : 5;
      fSES = (sesScore - 5) * 0.25; // v15.3: 0.15→0.25 今節の調子をより重視
      // ═══ v16: 今節トレンド検出（前半→後半の推移）═══
      if (e.sesResults.length >= 3) {
        const n = e.sesResults.length;
        const mid = Math.floor(n / 2);
        const firstHalf = e.sesResults.slice(0, mid);
        const secondHalf = e.sesResults.slice(mid);
        const avgFirst = firstHalf.reduce((s, r) => s + (r.rank || 3.5), 0) / firstHalf.length;
        const avgSecond = secondHalf.reduce((s, r) => s + (r.rank || 3.5), 0) / secondHalf.length;
        const placeTrend = avgFirst - avgSecond; // 正=後半改善
        // ST推移（sesResultsにST情報があれば）
        const stAll = e.sesResults.filter(r => r.st != null && r.st > 0);
        if (stAll.length >= 3) {
          const stMid = Math.floor(stAll.length / 2);
          const stFirst = stAll.slice(0, stMid).reduce((s,r) => s + r.st, 0) / stMid;
          const stSecond = stAll.slice(stMid).reduce((s,r) => s + r.st, 0) / (stAll.length - stMid);
          const stTrend = stFirst - stSecond; // 正=ST改善
          fTrend = placeTrend * 0.12 + stTrend * 6.0;
        } else {
          fTrend = placeTrend * 0.12;
        }
      }
    }
    // F持ちペナルティ（最適化済み）
    let fFC = 0;
    if (e.fc >= 2) fFC = -1.2;
    else if (e.fc === 1) fFC = -0.4; // 最適化: -0.6→-0.4
    // 前付け選手フラグ（1Cに入れば有利、それ以外なら助走短縮で不利）
    let fZEN = 0;
    const zenInfo = isZentsuke(e.regNo);
    if (zenInfo && course <= 2) fZEN = zenInfo.priority * 0.05; // 前付けで内コース→やや有利
    else if (zenInfo && course >= 4) fZEN = -zenInfo.priority * 0.03; // 前付け失敗で外→不利
    
    // 風・波による補正 (v15.3: 予測エンジンに直接反映)
    let fWind = 0;
    if (pv && pv.wind != null && pv.wind > 0) {
      const wind = pv.wind;
      const dir = pv.windDir || 0; // 1:北,2:北東,...,5:南,...
      const isHeadwind = dir >= 3 && dir <= 5; // 向かい風(南寄り)
      const isTailwind = dir === 1 || dir === 7 || dir === 8; // 追い風(北寄り)
      
      if (course === 1) {
        // 1コース: 向かい風で不利（スロー起こしが効かない）、追い風で有利
        if (isHeadwind && wind >= 3) fWind = -wind * 0.15; // 強い向かい風→大幅不利
        else if (isHeadwind) fWind = -wind * 0.08;
        else if (isTailwind && wind >= 3) fWind = wind * 0.05; // 追い風→やや有利
      } else if (course === 2) {
        // 2コース: 向かい風で差し有利
        if (isHeadwind && wind >= 3) fWind = wind * 0.08;
      } else if (course >= 4) {
        // 4-6コース: 向かい風でまくり有利（インが弱るため）
        if (isHeadwind && wind >= 4) fWind = wind * 0.10;
        else if (isHeadwind && wind >= 2) fWind = wind * 0.04;
      }
      
      // 波高: 高波はイン不利、外有利
      const wave = pv.wave || 0;
      if (wave >= 5 && course === 1) fWind -= 0.4;
      else if (wave >= 3 && course === 1) fWind -= 0.2;
      else if (wave >= 5 && course >= 4) fWind += 0.15;
    }
    
    const power = fWR + fDR + fCRS + fCLS + fST + fMT + fEX + fSES + fFC + fZEN + fCourseStats + fWind + weightAdj + fTrend;
    scores.push({
      boat: e.boatNumber, name: e.name, cls: e.cls, course,
      power: Math.round(power * 100) / 100,
      factors: { 勝率:fWR, '2連':fDR, コース:fCRS, 級別:fCLS, ST:fST, モーター:fMT, 展示:fEX, 枠別:fCourseStats, 今節:fSES, F持ち:fFC, '風波':fWind, '体重':weightAdj, '調子↑↓':fTrend }
    });
  }

  // ═══ 隣艇相互作用（2nd pass）═══
  // 外の選手がA1で自分がB1だとターンマークで被せられるリスク
  for (let i = 0; i < scores.length; i++) {
    const me = scores[i];
    let neighborAdj = 0;
    // 内側の選手（courseが自分-1）の強さ
    const inner = scores.find(s => s.course === me.course - 1);
    const outer = scores.find(s => s.course === me.course + 1);
    if (inner) {
      const innerEntry = entries.find(e => e.boatNumber === inner.boat);
      const myEntry = entries.find(e => e.boatNumber === me.boat);
      if (innerEntry && myEntry) {
        const wrDiff = (innerEntry.wr || 4) - (myEntry.wr || 4);
        if (wrDiff > 1.5 && me.course >= 2) neighborAdj -= 0.15; // 内側が強い→不利
      }
    }
    if (outer) {
      const outerEntry = entries.find(e => e.boatNumber === outer.boat);
      const myEntry = entries.find(e => e.boatNumber === me.boat);
      if (outerEntry && myEntry && me.course === 1) {
        // 1コースの外（2C）がA1上位だと差しリスク
        const wrDiff = (outerEntry.wr || 4) - (myEntry.wr || 4);
        if (wrDiff > 1.0) neighborAdj -= 0.1;
      }
    }
    me.power += neighborAdj;
    me.power = Math.round(me.power * 100) / 100;
    if (neighborAdj !== 0) me.factors['隣艇'] = Math.round(neighborAdj * 100) / 100;
  }

  const ranked = [...scores].sort((a,b) => b.power - a.power);

  // Softmax probabilities (1着確率)
  const exps = scores.map(s => Math.exp(s.power / SOFTMAX_T));
  const sum = exps.reduce((a,b) => a+b, 0);
  let probs = exps.map(v => Math.round(v / sum * 1000) / 10);
  
  // ═══ v16.3: コース別確率キャップ ═══
  // 5C/6Cからの1着確率が現実離れしないよう上限を適用
  let capped = false;
  for (const s of scores) {
    const cap = COURSE_PROB_CAP[s.course];
    if (cap && probs[s.boat - 1] > cap) {
      probs[s.boat - 1] = cap;
      capped = true;
    }
  }
  if (capped) {
    // キャップで削った分を他の艇に再配分
    const total = probs.reduce((a,b) => a+b, 0);
    if (total > 0) probs = probs.map(p => Math.round(p / total * 1000) / 10);
  }
  
  for (const r of ranked) r.prob = probs[r.boat - 1];

  // ═══ 展開連動型3連単確率（v15.3 独自モデル）═══
  // 決まり手パターンに基づく条件付き2-3着確率
  // 「1コースが逃げたら2コースは差し有利」等のロジック
  const trifectaProbs = {}; // combo string → probability
  const courseMap = {}; // boat → course
  for (const s of scores) courseMap[s.boat] = s.course;
  
  // 展開連動の条件付き確率を計算
  function calc2ndGiven1st(first, candidates) {
    const c1 = courseMap[first];
    const weights = {};
    // 実測データがある場合はそれを使う（バックテスト後に自動設定される）
    const empLink = window.EMPIRICAL_LINKAGE;
    
    for (const cand of candidates) {
      const c2 = courseMap[cand];
      let w = probs[cand - 1] || 1;
      
      if (empLink && empLink[c1] && empLink[c1][c2]) {
        // ★ 実測倍率を使用（データ駆動）
        w *= empLink[c1][c2];
      } else {
        // フォールバック: ハードコード（実測データがない場合）
        if (c1 === 1) {
          if (c2 === 2) w *= 1.6;
          else if (c2 === 3) w *= 1.2;
          else if (c2 >= 5) w *= 0.7;
        } else if (c1 >= 3 && c1 <= 4) {
          if (c2 === c1 + 1) w *= 1.5;
          else if (c2 === 1) w *= 0.6;
          else if (c2 === c1 - 1) w *= 0.8;
        } else if (c1 === 2) {
          if (c2 === 1) w *= 1.3;
          else if (c2 === 3) w *= 1.2;
        } else if (c1 >= 5) {
          if (c2 === 1) w *= 1.1;
          else if (c2 === c1 - 1) w *= 1.3;
        }
      }
      weights[cand] = Math.max(w, 0.1);
    }
    const total = Object.values(weights).reduce((a,b) => a+b, 0);
    const result = {};
    for (const [k,v] of Object.entries(weights)) result[k] = v / total;
    return result;
  }
  
  // 全120パターンの3連単確率を計算
  for (let a = 1; a <= 6; a++) {
    const pA = (probs[a-1] || 0) / 100;
    if (pA < 0.005) continue;
    const cands2 = [1,2,3,4,5,6].filter(b => b !== a);
    const p2given1 = calc2ndGiven1st(a, cands2);
    for (const b of cands2) {
      const pB = p2given1[b] || 0;
      if (pB < 0.01) continue;
      const cands3 = cands2.filter(c => c !== b);
      const p3given12 = calc2ndGiven1st(b, cands3); // 2着からの3着連動
      for (const c of cands3) {
        const pC = p3given12[c] || 0;
        const triProb = pA * pB * pC;
        if (triProb > 0.0001) {
          trifectaProbs[`${a}-${b}-${c}`] = triProb;
        }
      }
    }
  }
  
  // 正規化
  const triTotal = Object.values(trifectaProbs).reduce((a,b) => a+b, 0);
  if (triTotal > 0) {
    for (const k of Object.keys(trifectaProbs)) {
      trifectaProbs[k] = trifectaProbs[k] / triTotal;
    }
  }
  
  // ═══ v16.3: Platt Scaling キャリブレーション補正 ═══
  // ロジスティック回帰ベースの確率補正: calibrated_p = 1 / (1 + exp(-(A * log(p/(1-p)) + B)))
  // パラメータはBTの実測データから最適化（2-5%帯の-26%乖離を解消）
  // A<1で overconfidence を抑制、B<0 で全体を下方補正
  if (window.CALIBRATION_ENABLED !== false) {
    const PLATT_A = window.PLATT_A || 0.85;  // slope: バックテスト10342R最適値(5%ROI 88%)
    const PLATT_B = window.PLATT_B || -0.10; // intercept: バックテスト10342R最適値
    
    for (const k of Object.keys(trifectaProbs)) {
      const p = trifectaProbs[k];
      if (p <= 0 || p >= 1) continue;
      // Platt Scaling: logistic transform
      const logit = Math.log(p / (1 - p));
      const calibrated = 1 / (1 + Math.exp(-(PLATT_A * logit + PLATT_B)));
      trifectaProbs[k] = calibrated;
    }
    // 再正規化
    const calTotal = Object.values(trifectaProbs).reduce((a,b) => a+b, 0);
    if (calTotal > 0) {
      for (const k of Object.keys(trifectaProbs)) trifectaProbs[k] /= calTotal;
    }
  }

  const gap = ranked[0].power - ranked[1].power;
  const conf = Math.min(95, Math.max(15, Math.round(gap * 15 + 25)));

  // 買い目 (top 3 permutations + 4th)
  const t3 = [ranked[0].boat, ranked[1].boat, ranked[2].boat];
  const combos = [];
  for (let a = 0; a < 3; a++)
    for (let b = 0; b < 3; b++)
      for (let c = 0; c < 3; c++)
        if (a !== b && b !== c && a !== c)
          combos.push(`${t3[a]}-${t3[b]}-${t3[c]}`);
  if (ranked.length > 3) {
    combos.push(`${t3[0]}-${t3[1]}-${ranked[3].boat}`);
    combos.push(`${t3[0]}-${ranked[3].boat}-${t3[1]}`);
  }
  
  return { ranked, probs, conf, gap: Math.round(gap * 10) / 10, combos, trifectaProbs };
}

// ═══════════════════════════════════════════════════════
//  Feature #6: 荒れ度予測スコア (0-100)
//  API不要。既存データから算出
// ═══════════════════════════════════════════════════════
function calcChaosScore(race, venue, pv, pred) {
  if (!race || !race.entries || race.entries.length < 6) return { score: 50, level: 'mid', label: '—', factors: [] };
  
  const entries = race.entries;
  const traits = VENUE_TRAITS[venue.id];
  const factors = [];
  let total = 0;
  
  // ── Factor 1: 風・波高 (0-25pt) ──
  let windScore = 0;
  if (pv) {
    const wind = pv.wind || 0;
    const wave = pv.wave || 0;
    if (wind >= 5) windScore = 25;
    else if (wind >= 4) windScore = 20;
    else if (wind >= 3) windScore = 14;
    else if (wind >= 2) windScore = 8;
    else windScore = 3;
    // Wave adds extra
    if (wave >= 10) windScore = Math.min(25, windScore + 5);
    else if (wave >= 5) windScore = Math.min(25, windScore + 2);
    
    const windDir = pv.windDir || 0;
    const isHeadwind = windDir >= 4 && windDir <= 6; // 南寄り=向かい風(ざっくり)
    const isTailwind = windDir <= 2 || windDir >= 8; // 北寄り=追い風
    let desc = `風${wind}m`;
    if (wave > 0) desc += ` 波${wave}cm`;
    if (wind >= 3 && isTailwind) { desc += ' 追い風→まくり有利'; windScore = Math.min(25, windScore + 3); }
    if (wind >= 3 && isHeadwind) { desc += ' 向かい風→イン不利'; windScore = Math.min(25, windScore + 2); }
    if (windScore >= 14) factors.push({ name:'風・波', score:windScore, desc, icon:'💨' });
  }
  total += windScore;
  
  // ── Factor 2: 選手力差 (0-20pt) — 力が拮抗するほど荒れる ──
  let skillScore = 0;
  const wrs = entries.map(e => e.wr || 0);
  const maxWr = Math.max(...wrs);
  const minWr = Math.min(...wrs);
  const wrRange = maxWr - minWr;
  const a1Count = entries.filter(e => e.cls === 'A1').length;
  
  if (wrRange < 1.5) { skillScore = 18; factors.push({ name:'選手力差', score:18, desc:`勝率差${wrRange.toFixed(1)} 実力拮抗`, icon:'⭐' }); }
  else if (wrRange < 2.5) { skillScore = 12; if (a1Count >= 2) factors.push({ name:'選手力差', score:12, desc:`A1が${a1Count}名 混戦`, icon:'⭐' }); }
  else if (wrRange < 3.5) skillScore = 6;
  else skillScore = 2;
  
  if (a1Count >= 3) { skillScore = Math.min(20, skillScore + 5); }
  total += skillScore;
  
  // ── Factor 3: イン信頼度 (0-25pt) — 1号艇が弱いと荒れる ──
  let inScore = 0;
  const boat1 = entries.find(e => e.boatNumber === 1);
  if (boat1) {
    const b1Wr = boat1.wr || 0;
    const b1ST = boat1.st || 0.18;
    const b1Cls = boat1.cls || 'B1';
    
    if (b1Cls === 'B2' || b1Wr < 4.0) { inScore = 22; factors.push({ name:'イン信頼度', score:22, desc:`1号艇${boat1.name}(${b1Cls}) 勝率${b1Wr.toFixed(1)}`, icon:'🎰' }); }
    else if (b1Cls === 'B1' || b1Wr < 5.5) { inScore = 15; factors.push({ name:'イン信頼度', score:15, desc:`1号艇${boat1.name}(${b1Cls}) やや不安`, icon:'🎰' }); }
    else if (b1Wr < 6.5) inScore = 8;
    else inScore = 3;
    
    // ST不安定
    if (b1ST >= 0.20) { inScore = Math.min(25, inScore + 5); }
    
    // 展示STが遅い場合
    if (pv && pv.entries) {
      const b1Pv = pv.entries.find(pe => pe.bn === 1);
      if (b1Pv && b1Pv.exST != null && b1Pv.exST >= 0.22) {
        inScore = Math.min(25, inScore + 4);
      }
    }
  }
  total += inScore;
  
  // ── Factor 4: 会場傾向 (0-15pt) ──
  let venueScore = 0;
  if (traits) {
    const c1win = traits.c1win || 50;
    if (c1win <= 45) { venueScore = 14; factors.push({ name:'会場傾向', score:14, desc:`${traits.name} 1C率${c1win}% 荒れ場`, icon:'🏟️' }); }
    else if (c1win <= 50) { venueScore = 10; }
    else if (c1win <= 55) venueScore = 5;
    else venueScore = 2;
  }
  total += venueScore;
  
  // ── Factor 5: ML予測の自信度 (0-15pt) — confが低いほど荒れる ──
  let confScore = 0;
  if (pred) {
    const gap = pred.gap || 0;
    if (gap < 0.1) { confScore = 14; factors.push({ name:'予測困難度', score:14, desc:`パワー差${gap} 混戦`, icon:'📉' }); }
    else if (gap < 0.2) confScore = 10;
    else if (gap < 0.3) confScore = 5;
    else confScore = 1;
  } else {
    confScore = 8;
  }
  total += confScore;
  
  // Clamp 0-100
  const score = Math.max(0, Math.min(100, total));
  const level = score >= 70 ? 'high' : score >= 45 ? 'mid' : 'low';
  const label = score >= 80 ? '大荒れ警報' : score >= 70 ? '荒れ気配' : score >= 55 ? 'やや荒れ' : score >= 40 ? '標準' : '堅い';
  const icon = score >= 70 ? '🌊' : score >= 45 ? '⚠️' : '🛡️';
  
  // Sort factors by score desc, keep top 3
  factors.sort((a, b) => b.score - a.score);
  
  return { score, level, label, icon, factors: factors.slice(0, 3) };
}

// ── 次に買えるレースを検索 ──
function findNextBuyableRace() {
  if (!state.venues || state.venues.length === 0) return null;
  let best = null;
  let bestTime = Infinity;
  for (const v of state.venues) {
    if (!v.active) continue;
    for (const r of v.races) {
      const rk = `${v.id}-${r.number}`;
      const rs = state.rMap[rk];
      if (rs?.hasResult) continue; // 既に結果あり
      if (!r.deadline) continue;
      const dl = getDeadline(r.deadline);
      if (dl.closed) continue; // 締切済み
      // 残り時間を計算
      const parts = r.deadline.match(/(\d+):(\d+)/);
      if (!parts) continue;
      const now = new Date();
      const deadlineDate = new Date(now);
      deadlineDate.setHours(parseInt(parts[1]), parseInt(parts[2]), 0, 0);
      const remaining = deadlineDate - now;
      if (remaining > 0 && remaining < bestTime) {
        bestTime = remaining;
        best = { venueId: v.id, venueName: v.name, raceNo: r.number, deadline: r.deadline, remaining };
      }
    }
  }
  return best;
}
