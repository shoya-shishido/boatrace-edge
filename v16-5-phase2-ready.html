function parseReviewSections(text) {
  const sections = {展開: '', 精度: '', 学び: '' };
  let current = null;
  for (const line of text.split('\n')) {
    const m = line.match(/^\[?(展開|精度|学び)\]?\s*(.*)/);
    if (m) { current = m[1]; sections[current] = m[2] || ''; }
    else if (current && line.trim()) { sections[current] += (sections[current] ? '\n' : '') + line.trim(); }
  }
  return sections;
}


function runSimulation() {
  const picks = generateAllPicks();
  const sp = state.simParams;
  
  let totalInv = 0, totalRet = 0, hitCount = 0, totalRaces = 0;
  const raceResults = [];
  let cumProfit = 0;
  
  for (const p of picks) {
    if (!sp.targetRanks.includes(p.rank)) continue;
    const key = `${p.venueId}-${p.raceNumber}`;
    const rs = state.rMap[key];
    if (!rs || !rs.hasResult || rs.order.length < 3) continue;
    
    totalRaces++;
    
    // スタイルで買い目構成を変える
    let combos = [];
    const allCombos = p.combos || [];
    const ranked = p.pred ? p.pred.ranked : [];
    
    if (sp.style === 0) {
      // 手堅く: 本命軸の買い目のみ（1位固定の3連単）
      const axis = ranked.length > 0 ? ranked[0].boat : 0;
      combos = allCombos.filter(c => c.startsWith(`${axis}-`)).slice(0, Math.min(sp.maxCombos, 6));
      if (combos.length === 0) combos = allCombos.slice(0, 3);
    } else if (sp.style === 2) {
      // 穴狙い: ワイドに流す + 4番手絡みも入れる
      combos = allCombos.slice(0, sp.maxCombos);
      // 4番手絡みの穴目を追加生成
      if (ranked.length >= 4) {
        const t4 = ranked[3].boat;
        const t1 = ranked[0].boat;
        const t2 = ranked[1].boat;
        const extras = [`${t4}-${t1}-${t2}`, `${t1}-${t4}-${t2}`, `${t4}-${t2}-${t1}`];
        for (const ex of extras) {
          if (!combos.includes(ex) && combos.length < sp.maxCombos) combos.push(ex);
        }
      }
    } else {
      // バランス: 通常
      combos = allCombos.slice(0, sp.maxCombos);
    }
    
    if (combos.length === 0) continue;
    
    const betPerCombo = Math.max(100, Math.round(sp.betPerRace / combos.length / 100) * 100);
    const actualInv = betPerCombo * combos.length;
    totalInv += actualInv;
    
    const actualCombo = `${rs.order[0]}-${rs.order[1]}-${rs.order[2]}`;
    const hit = combos.includes(actualCombo);
    let payout = 0;
    
    if (hit && rs.pay?.t3?.amount > 0) {
      hitCount++;
      payout = Math.floor(rs.pay.t3.amount / 100 * betPerCombo);
      totalRet += payout;
    }
    
    cumProfit += payout - actualInv;
    raceResults.push({ venueName: p.venueName, raceNumber: p.raceNumber, rank: p.rank, inv: actualInv, payout, profit: payout - actualInv, hit, cumProfit, combosUsed: combos.length });
  }
  
  return {
    totalRaces, hitCount, totalInv, totalRet,
    profit: totalRet - totalInv,
    roi: totalInv > 0 ? Math.round(totalRet / totalInv * 1000) / 10 : 0,
    hitRate: totalRaces > 0 ? Math.round(hitCount / totalRaces * 1000) / 10 : 0,
    avgPayout: hitCount > 0 ? Math.round(totalRet / hitCount) : 0,
    raceResults,
  };
}

// ── レース注目ポイント生成 ──
function calcRaceHighlights(race, venue, pv, pred, courseOrder) {
  const hl = [];
  const entries = race.entries;
  const traits = VENUE_TRAITS[venue.id];
  const wind = pv ? (pv.wind || 0) : 0;
  const windDir = pv ? (pv.windDir || 0) : 0;
  const isHead = windDir >= 4 && windDir <= 6;

  // ST巧者がアウトにいる
  for(let c = 3; c < 6; c++){
    const bn = courseOrder[c];
    const e = entries.find(en => en.boatNumber === bn);
    if(e && (e.st || 0.18) <= 0.13){
      hl.push({ icon:'⏱️', boat:bn, text:`${e.name} ST${(e.st).toFixed(2)}は全艇トップクラスの速さ。${c+1}Cからのダッシュで一気にまくる展開は十分にありえる。1Mの攻防に注目` });
      break;
    }
  }

  // A1がインにいない
  const inBoat = courseOrder[0];
  const inE = entries.find(e => e.boatNumber === inBoat);
  if(inE && inE.cls !== 'A1'){
    const a1Outer = entries.find(e => e.cls === 'A1' && e.boatNumber !== inBoat);
    if(a1Outer){
      const c = courseOrder.indexOf(a1Outer.boatNumber);
      hl.push({ icon:'👑', boat:a1Outer.boatNumber, text:`A1級${a1Outer.name}が${c+1}C進入。インの${inE.name}(${inE.cls})との実力差を考えると、差しorまくりで逆転する展開も想定しておきたい` });
    }
  }

  // 向かい風強→イン不利
  if(wind >= 4 && isHead){
    hl.push({ icon:'🌬️', boat:null, text:`向かい風${wind}mの強風コンディション。インが助走距離を取りにくくスタートが流れやすい。2-3Cの差しが効きやすく、波乱含みの一戦` });
  }

  // 展示タイムが飛び抜けている選手
  if(pv?.exhibition){
    let bestExT = null, bestExBn = 0;
    for(const e of entries){
      const pe = pv.exhibition.find(ex => ex.boatNumber === e.boatNumber);
      if(pe?.exTime && (!bestExT || pe.exTime < bestExT)){ bestExT = pe.exTime; bestExBn = e.boatNumber; }
    }
    if(bestExT){
      let secondBest = 99;
      for(const e of entries){
        const pe = pv.exhibition.find(ex => ex.boatNumber === e.boatNumber);
        if(pe?.exTime && pe.exTime !== bestExT && pe.exTime < secondBest) secondBest = pe.exTime;
      }
      if(secondBest - bestExT >= 0.08){
        const be = entries.find(e => e.boatNumber === bestExBn);
        hl.push({ icon:'🔥', boat:bestExBn, text:`${be?.name||bestExBn+'号艇'} 展示タイム${bestExT.toFixed(2)}が2番手を0.08秒以上引き離す圧倒的な数値。モーターの仕上がりが良く、直線での伸びに大きな期待` });
      }
    }
  }

  // F持ち選手
  for(const e of entries){
    if(e.fc > 0){
      hl.push({ icon:'⚠️', boat:e.boatNumber, text:`${e.name} フライングF${e.fc}持ち。スタートで無理ができないため出遅れのリスクがあり、本来の実力を発揮できない可能性。軸にする場合は要注意` });
      break;
    }
  }

  // モーター2連高い外枠
  for(let c = 2; c < 6; c++){
    const bn = courseOrder[c];
    const e = entries.find(en => en.boatNumber === bn);
    if(e && (e.mdr || 0) >= 50){
      hl.push({ icon:'🔧', boat:bn, text:`${e.name} モーター2連率${(e.mdr||0).toFixed(0)}%の好エンジン。出足・行き足ともに水準以上で、${c+1}Cからの一発が期待できる。穴党は要チェック` });
      break;
    }
  }

  return hl.slice(0, 4); // 最大4つ
}

// ═══════════════════════════════════════════════════════
//  [FORMATION] 展開予測エンジン — コアロジック
//  predictFormation()
//  進入コース予測 → ST予測 → 1マーク展開の3段階シミュレーション
//  UI非依存。ビジュアルタブ・AI分析から共用。
// ═══════════════════════════════════════════════════════
function predictFormation(race, venue, pv, pred) {
  const entries = race.entries;
  const traits = VENUE_TRAITS[venue.id];
  const c1win = traits?.c1win || 52;
  
  // ── Step 1: 進入コース予測 ──
  let courseOrder = [1,2,3,4,5,6];
  let hasExhibitCourse = false;
  if (isValidCourse(pv?.course)) {
    courseOrder = [...pv.course];
    hasExhibitCourse = true;
  }
  // 枠なり判定 (展示進入が枠番順と一致しているか)
  const isWakunari = courseOrder.every((bn, i) => bn === i + 1);
  // 進入変更マップ: 各艇が枠番から何コース移動したか
  const courseShift = {}; // {boatNumber: shift} 正=内に入った(前付け), 負=外に出た
  for (let c = 0; c < 6; c++) {
    const bn = courseOrder[c];
    courseShift[bn] = (bn - 1) - c; // 元の位置(bn-1) - 実際のコース(c)
  }
  
  // ── Step 2: 精密ST予測 ──
  const predictedST = {};
  for (let c = 0; c < 6; c++) {
    const bn = courseOrder[c];
    const e = entries.find(en => en.boatNumber === bn);
    if (!e) { predictedST[bn] = 0.18; continue; }
    
    let baseST = e.st || 0.18;
    const exST = pv?.entries?.find(p => p.bn === bn)?.exST;
    const exT = pv?.entries?.find(p => p.bn === bn)?.exT;
    
    // ① 展示STブレンド（最適化: 通算ST重視、展示ST35%）
    if (exST != null && exST > 0) {
      if (exST >= 0.01) baseST = baseST * 0.65 + exST * 0.35;
    }
    
    // ② F持ち選手の慎重化（最適化済み）
    if (e.fc >= 2) baseST += 0.05;       // 最適化: 0.04→0.05
    else if (e.fc === 1) baseST += 0.025; // 最適化: 0.02→0.025
    
    // ③ 今節の調子（得点率ベース + 今節STの傾向）
    if (e.sesResults?.length > 0) {
      const pts = e.sesResults.filter(r => r.rank <= 6).map(r => [10,8,6,4,2,1][r.rank-1] || 0);
      const sesScore = pts.length > 0 ? pts.reduce((a,b) => a+b, 0) / pts.length : 5;
      if (sesScore >= 8) baseST -= 0.008;       // 絶好調→攻め
      else if (sesScore >= 6) baseST -= 0.003;   // 好調
      else if (sesScore <= 2.5) baseST += 0.008; // 不調→守り
      else if (sesScore <= 4) baseST += 0.003;
      
      // 今節STの平均を加味（データがあれば）
      const sesSTvals = e.sesResults.filter(r => r.st != null && r.st >= 0.01 && r.st <= 0.30).map(r => r.st);
      if (sesSTvals.length >= 2) {
        const avgSesST = sesSTvals.reduce((a,b) => a+b, 0) / sesSTvals.length;
        // 今節STが通算STより早い/遅い → 調子反映（30%ブレンド）
        baseST = baseST * 0.7 + avgSesST * 0.3;
      }
    }
    
    // ④ スロー/ダッシュ補正（最適化: 実統計ベース）
    // 実績: 1C=0.167, 2C=0.165, 3C=0.157, 4C=0.153, 5C=0.155, 6C=0.157
    const COURSE_ST_ADJ = [0, 0.005, 0.004, -0.004, -0.012, -0.010, -0.008];
    baseST += COURSE_ST_ADJ[c + 1] || 0;
    
    // ⑤ 級別補正（A1はSTを踏めるが、B2は慎重）
    const cls = e.cls || 'B1';
    if (cls === 'A1') baseST -= 0.005;
    else if (cls === 'B2') baseST += 0.005;
    
    // ⑥ 場特性補正
    if (c1win < 42) baseST += (c <= 2 ? 0.005 : -0.008); // 荒れ場→スリット乱れ
    if (c1win > 60) baseST += (c === 0 ? -0.005 : 0.003); // インが圧倒的な場→イン早め
    
    // ⑦ 風の影響（最適化: 半分の強さが最適）
    const wind = pv?.wind || 0;
    const windDir = pv?.windDir || 0;
    const isHead = windDir >= 4 && windDir <= 6;
    const isTail = windDir >= 1 && windDir <= 3;
    if (wind >= 5 && isHead) baseST += 0.003; // 最適化: 0.005→0.003
    if (wind >= 3) {
      if (isHead && c <= 1) baseST += 0.0015 * (wind / 5);  // 最適化: 半減
      if (isHead && c >= 4) baseST -= 0.001 * (wind / 5);
      if (isTail && c <= 1) baseST -= 0.001 * (wind / 5);
      if (isTail && c >= 3) baseST += 0.001 * (wind / 5);
    }
    
    // ⑩ 前付け選手補正（展示前でも進入予測に反映）
    const zenInfo = isZentsuke(e.regNo);
    if (zenInfo && !hasExhibitCourse) {
      // 展示データがない場合、前付け選手は内コースに入る想定でSTを補正
      if (e.boatNumber >= 4 && zenInfo.priority >= 6) baseST += 0.01; // 前付けで助走短縮
    }
    
    // ⑪ コース別成績ST補正（選手のコース別平均STを加味）
    if (e.courseStats && e.courseStats[c + 1]) {
      const csAvgST = e.courseStats[c + 1].avgST;
      if (csAvgST > 0 && csAvgST < 0.30) {
        // コース別STと通算STの差分を20%ブレンド
        baseST = baseST * 0.8 + csAvgST * 0.2;
      }
    }
    
    // ⑧ 展示タイム（足色）反映：足が良い→STも踏み込みやすい
    if (exT) {
      if (exT <= 6.60) baseST -= 0.005;      // 超抜モーター
      else if (exT <= 6.70) baseST -= 0.002;  // 好機
      else if (exT >= 6.90) baseST += 0.003;  // 足色悪い→回りも悪い→慎重
    }
    
    // ⑨ 進入変更の影響（展示進入コースがある場合）
    if (hasExhibitCourse) {
      const shift = courseShift[bn] || 0;
      if (shift >= 2) {
        // 2コース以上の前付け → 助走距離が大幅短縮、ST遅れやすい
        baseST += 0.015;
      } else if (shift === 1) {
        // 1コース前付け → 助走やや短い
        baseST += 0.005;
      } else if (shift <= -2) {
        // 2コース以上外に出された → 助走は十分だがリズム崩れ
        baseST += 0.003;
      }
    }
    
    predictedST[bn] = Math.max(0.05, Math.min(0.28, baseST));
  }
  
  // ── Step 3: スリット情報まとめ ──
  const slitOrder = courseOrder.map(bn => ({ bn, st: predictedST[bn], course: courseOrder.indexOf(bn) }))
    .sort((a, b) => a.st - b.st);
  
  const inBn = courseOrder[0];
  const inEntry = entries.find(e => e.boatNumber === inBn);
  const inST = predictedST[inBn];
  const inSlitRank = slitOrder.findIndex(s => s.bn === inBn);
  
  const wind = pv?.wind || 0;
  const windDir = pv?.windDir || 0;
  const isHead = windDir >= 4 && windDir <= 6;
  const isTail = windDir <= 2 || windDir >= 8;
  const wave = pv?.wave || 0;
  
  // ── Step 4: 精密1M展開予測 ──
  // 1Mでの優位度は複数ファクターの総合評価
  
  // コース別決まり手の統計傾向テーブル（全国平均 %）
  // [逃げ, 差し, まくり, まくり差し, 抜き, 恵まれ]
  const COURSE_TACTIC_STATS = {
    1: [93, 0, 0, 0, 5, 2],      // 1C: ほぼ逃げ
    2: [0, 63, 22, 8, 5, 2],     // 2C: 差し主体、まくりもあり
    3: [0, 12, 36, 39, 8, 5],    // 3C: まくり差し>まくり>差し
    4: [0, 18, 42, 28, 7, 5],    // 4C: まくり主体、差し・まくり差しも
    5: [0, 7, 22, 55, 9, 7],     // 5C: まくり差し主体
    6: [0, 10, 18, 48, 12, 12],  // 6C: まくり差し主体、展開待ち多い
  };
  
  // 選手の得意決まり手を推定する関数
  // 勝率・級別・STから選手タイプを判定
  function estimateRacerStyle(e, course) {
    const wr = e?.wr || 4;
    const st = e?.st || 0.18;
    const cls = e?.cls || 'B1';
    
    // スタート力: STが早い選手→まくり適性高い
    const stPower = Math.max(0, (0.20 - st) * 50); // 0.14→3, 0.18→1, 0.22→-1
    
    // ターン力推定: 勝率が高く差し/まくり差しで上位に来る選手はターン力が高い
    const turnSkill = (wr - 4) * 2; // 7.00→6, 5.00→2
    
    // 決まり手の重み調整
    const style = {
      escape: 0,  // 逃げ
      sashi: 0,   // 差し
      makuri: 0,  // まくり
      makuriSashi: 0, // まくり差し
    };
    
    if (course === 1) {
      // 1C: 逃げ力 = ST力 + 実力
      style.escape = 10 + stPower * 2 + turnSkill * 1.5;
    } else if (course === 2) {
      // 2C: 差しがメイン。ST早くてWR高い→まくりも選択肢
      style.sashi = 6 + turnSkill * 2;
      if (stPower >= 2 && wr >= 5.5) style.makuri = 3 + stPower * 1.5;
    } else if (course === 3) {
      // 3C: まくり差し or まくり。STが速い実力者→まくり、それ以外→まくり差し
      if (stPower >= 2 && wr >= 5) {
        style.makuri = 4 + stPower * 2;
        style.makuriSashi = 3 + turnSkill;
      } else {
        style.makuriSashi = 5 + turnSkill * 1.5;
        style.sashi = 2 + turnSkill * 0.8;
      }
    } else if (course === 4) {
      // 4C: 最もまくりが出やすいコース。STが命
      style.makuri = 4 + stPower * 2.5;
      style.makuriSashi = 2 + turnSkill;
      style.sashi = 1 + turnSkill * 0.5;
    } else if (course === 5) {
      // 5C: まくり差し主体。超抜STなら大外まくり
      style.makuriSashi = 5 + turnSkill * 2;
      if (stPower >= 3 && wr >= 5) style.makuri = 3 + stPower * 2;
    } else {
      // 6C: 展開待ちまくり差し。よほどのST/実力差がないと厳しい
      style.makuriSashi = 4 + turnSkill * 1.5;
      if (stPower >= 4 && wr >= 5.5) style.makuri = 2 + stPower * 2;
    }
    
    return style;
  }
  
  const positions1M = [];
  
  // 隣艇との力関係も加味するため全艇の情報を先に収集
  const boatInfo = courseOrder.map((bn, c) => {
    const e = entries.find(en => en.boatNumber === bn);
    const pe = pv?.entries?.find(p => p.bn === bn);
    return {
      bn, c, e,
      st: predictedST[bn],
      wr: e?.wr || 4,
      mdr: e?.mdr || 30,
      mtr: e?.mtr || 40,
      bdr: e?.bdr || 30,
      cls: e?.cls || 'B1',
      fc: e?.fc || 0,
      exT: pe?.exT || null,
      exST: pe?.exST ?? null,
      tilt: pe?.tilt ?? 0,
    };
  });
  
  // 展示タイムの場平均（相対評価用）
  const allExT = boatInfo.filter(b => b.exT).map(b => b.exT);
  const avgExT = allExT.length > 0 ? allExT.reduce((a,b) => a+b, 0) / allExT.length : 6.80;
  
  for (let c = 0; c < 6; c++) {
    const bi = boatInfo[c];
    if (!bi.e) continue;
    
    let tactic = 'follow';
    let advantage = 0;
    let tacticReason = '';
    
    // スリットでの位置（早い＝有利）
    const slitRank = slitOrder.findIndex(s => s.bn === bi.bn);
    const stGap = bi.st - inST; // イン艇とのST差
    
    // 足色スコア（最適化: 相対評価）
    const footScore = bi.exT ? Math.max(-2, (avgExT - bi.exT) * 20) : 0; // 相対値、マイナスもあり
    
    // ターン力
    const turnPower = (bi.mdr * 0.4 + (bi.mtr || bi.mdr * 1.3) * 0.3 + bi.bdr * 0.3) / 100;
    
    // 選手実力スコア
    const skillScore = (bi.wr - 4) * 3;
    
    // チルト効果（伸び型: 高チルト→まくり有利）
    const tiltBonus = bi.tilt >= 1.0 ? 2.5 : (bi.tilt >= 0.5 ? 1.0 : 0);
    
    const rStyle = estimateRacerStyle(bi.e, c + 1);
    const shift = courseShift[bi.bn] || 0;
    
    // 隣艇の弱さ（内側の選手が弱い→差し/まくりのチャンス拡大）
    const innerWeak = c > 0 ? Math.max(0, 5 - boatInfo[c-1].wr) * 0.5 : 0;
    // 隣艇のF持ち（内側がF持ち→膨れやすい→差しチャンス）
    const innerFc = c > 0 && boatInfo[c-1].fc > 0 ? 2 * boatInfo[c-1].fc : 0;
    
    if (c === 0) {
      // ── 1C: 逃げ ──
      tactic = 'escape';
      // 最適化: ベース値を場c1winと連動させる
      advantage = Math.max(8, 10 + (c1win - 50) * 0.3);
      advantage += skillScore * 0.8;
      advantage += rStyle.escape * 0.3;
      if (slitRank === 0) advantage += 4;
      else if (slitRank <= 2) advantage += 1;
      else if (slitRank >= 4) advantage -= 7; // 最適化: -6→-7（ST遅れの影響大）
      advantage += footScore * 0.5;
      advantage += turnPower * 5;
      // 風×波の影響（最適化: 半分の強さ）
      if (wind >= 3 && isHead) advantage -= wind * 0.8;
      if (wind >= 3 && isTail && wind < 4) advantage += wind * 0.3;
      if (wind >= 4 && isTail) advantage -= 1; // 追い風強すぎ→膨れ
      if (wind >= 5 && isHead) advantage -= 3;
      // 波高の影響（新規）
      if (wave >= 3) advantage -= (wave - 2) * 0.8;
      if (wave >= 5) advantage -= 3;
      if (bi.fc > 0) advantage -= bi.fc * 3;
      if (shift >= 2) advantage -= 4;
      tacticReason = 'イン先マイ→押し切り';
    } else if (c === 1) {
      // ── 2C: 差し or まくり ──
      if (rStyle.makuri > rStyle.sashi && bi.st <= 0.15 && bi.wr >= 5.5) {
        tactic = 'makuri';
        advantage = 3 + rStyle.makuri * 0.5;
        advantage += skillScore * 0.8;
        advantage += footScore * 0.4;
        advantage += tiltBonus;
        if (stGap <= -0.02) advantage += Math.abs(stGap) * 40;
        tacticReason = '2Cまくり（ST力で捲る）';
      } else {
        tactic = 'sashi';
        advantage = 4;
        advantage += skillScore * 0.7;
        advantage += rStyle.sashi * 0.3;
        const inWeak = boatInfo[0].wr < 5 || boatInfo[0].fc > 0;
        if (inWeak) advantage += 5; // 最適化: 4→5（イン弱の影響は大きい）
        // 向かい風で差し有利を強化
        if (wind >= 3 && isHead) advantage += wind * 1.0; // 最適化: 0.8→1.0
        if (wind >= 5 && isHead) advantage += 3; // 新規: 強い向かい風ボーナス
        if (wind >= 3 && isTail) advantage -= 2;
        // 波高→イン膨れ→差しチャンス
        if (wave >= 3) advantage += (wave - 2) * 0.5;
        advantage += footScore * 0.3;
        advantage += turnPower * 4;
        advantage += innerFc; // 1Cの選手がF持ち→膨れチャンス
        if (stGap >= 0.05) advantage -= 3;
        tacticReason = '1M内を差し抜け';
      }
      if (bi.fc > 0) advantage -= bi.fc * 2;
    } else if (c === 2) {
      // ── 3C: まくり差し or まくり or 差し ──
      const fastST = stGap <= -0.02;
      if (fastST && rStyle.makuri > rStyle.makuriSashi && bi.wr >= 5.5) {
        tactic = 'makuri';
        advantage = 2 + Math.abs(stGap) * 70;
        advantage += rStyle.makuri * 0.4;
        advantage += skillScore * 0.7;
        advantage += footScore * 0.5;
        advantage += tiltBonus * 1.5; // チルト効果（3Cまくり×高チルト=伸び型）
        tacticReason = `3Cまくり（ST${bi.st.toFixed(2)}で外から捲る）`;
      } else if (fastST && bi.wr >= 5) {
        tactic = 'makuriSashi';
        advantage = 3 + Math.abs(stGap) * 60;
        advantage += rStyle.makuriSashi * 0.4;
        advantage += skillScore * 0.6;
        advantage += turnPower * 5;
        advantage += footScore * 0.4;
        if (wind >= 3 && isHead) advantage += 2;
        advantage += innerWeak; // 内側選手が弱い→差し込みやすい
        tacticReason = '2C外からまくり差し';
      } else {
        // 3CでSTも遅く実力もない場合 → 差しは非現実的、追随
        tactic = 'follow';
        advantage = 1 + skillScore * 0.3;
        advantage += turnPower * 2;
        tacticReason = '展開待ち';
      }
      if (bi.fc > 0) advantage -= bi.fc * 2;
    } else if (c === 3) {
      // ── 4C: まくり（最もまくりが出やすいコース）──
      // 最適化: stGap閾値を0.00に緩和（まくり判定の門を広げる）
      const fastST = stGap <= 0.00;
      if (fastST && bi.wr >= 4.5) {
        tactic = 'makuri';
        advantage = 2 + Math.max(0, -stGap) * 80;
        advantage += rStyle.makuri * 0.4;
        advantage += skillScore * 0.7;
        advantage += footScore * 0.6;
        advantage += turnPower * 4;
        advantage += tiltBonus * 2; // 4C×高チルトはまくり最強パターン
        if (wind >= 3 && isTail) advantage += 2; // 最適化: 3→2
        tacticReason = `ST${bi.st.toFixed(2)}のダッシュでまくり`;
      } else if (rStyle.makuriSashi > rStyle.makuri || bi.wr >= 5) {
        tactic = 'makuriSashi';
        advantage = 1 + skillScore * 0.4;
        advantage += rStyle.makuriSashi * 0.3;
        advantage += turnPower * 3;
        advantage += innerWeak;
        tacticReason = 'まくり差しに転じる';
      } else {
        // 4CでSTも遅く実力もない場合 → 追随
        tactic = 'follow';
        advantage = skillScore * 0.2;
        tacticReason = '展開待ち';
      }
      if (bi.fc > 0) advantage -= bi.fc * 3;
    } else if (c === 4) {
      // ── 5C: まくり差し主体 ──
      const fastST = stGap <= -0.03;
      if (fastST && rStyle.makuri > rStyle.makuriSashi && bi.wr >= 5) {
        tactic = 'makuri';
        advantage = 1 + Math.abs(stGap) * 60;
        advantage += rStyle.makuri * 0.4;
        advantage += skillScore * 0.5;
        advantage += footScore * 0.5;
        advantage += tiltBonus * 1.5;
        tacticReason = '大外まくり';
      } else if (bi.wr >= 4.5) {
        tactic = 'makuriSashi';
        advantage = rStyle.makuriSashi * 0.4;
        advantage += skillScore * 0.3;
        advantage += turnPower * 2;
        advantage += innerWeak;
        // 隣艇連鎖: 4Cまくり→1C潰れ→5Cまくり差し浮上
        const c4makuri = boatInfo[3].wr >= 5.5 && boatInfo[3].st <= inST;
        if (c4makuri) advantage += 2; // 4Cがまくりそうなら5Cのまくり差しチャンスUP
        tacticReason = '展開待ちまくり差し';
      }
      if (bi.fc > 0) advantage -= bi.fc * 3;
    } else {
      // ── 6C: 最外枠 ──
      const fastST = stGap <= -0.04;
      if (fastST && bi.wr >= 5.5) {
        tactic = 'makuri';
        advantage = Math.abs(stGap) * 50;
        advantage += rStyle.makuri * 0.3;
        advantage += skillScore * 0.4;
        advantage += footScore * 0.4;
        advantage += tiltBonus;
        tacticReason = '超抜STで大外まくり';
      } else if (bi.wr >= 4.5) {
        tactic = 'makuriSashi';
        advantage = rStyle.makuriSashi * 0.3;
        advantage += skillScore * 0.2;
        advantage += innerWeak;
        tacticReason = '展開次第のまくり差し';
      }
      if (bi.fc > 0) advantage -= bi.fc * 3;
    }
    
    // 進入変更による影響加味
    if (hasExhibitCourse && !isWakunari && shift !== 0) {
      if (shift >= 1 && c >= 1) advantage -= 1; // 前付けで内に入ったが助走短縮
      if (shift <= -1 && c <= 1) advantage -= 0.5; // 外に追い出されたスロー勢
    }
    
    // コース別成績補正（そのコースの得意/苦手を反映）
    if (bi.e?.courseStats && bi.e.courseStats[c + 1]) {
      const cd = bi.e.courseStats[c + 1];
      // コース別3連対率が高い→そのコースが得意→advantage UP
      const csBonus = (cd.top3Rate - 35) * 0.08; // 35%基準、50%なら+1.2、70%なら+2.8
      // コース別進入率が極端に低い→不慣れ→advantage DOWN
      const expPenalty = cd.entryRate < 5 ? -1.5 : cd.entryRate < 10 ? -0.5 : 0;
      advantage += csBonus + expPenalty;
    }
    
    advantage = Math.max(-5, advantage);
    positions1M.push({ bn: bi.bn, course: c, tactic, advantage, st: bi.st, e: bi.e, exT: bi.exT, tacticReason, racerStyle: rStyle });
  }
  
  // 1M後の順位予測
  positions1M.sort((a, b) => b.advantage - a.advantage);
  
  return {
    courseOrder,
    predictedST,
    positions1M,
    slitOrder,
    inBn,
    inST,
    wind, windDir, isHead, isTail,
    hasExhibitCourse, isWakunari,
  };
}

function calcRacePatterns(race, venue, pv, pred, courseOrder) {
  const entries = race.entries;
  const traits = VENUE_TRAITS[venue.id];
  const patterns = [];
  
  const boat1Course = courseOrder[0]; // 1コースの艇番
  const e1 = entries.find(e => e.boatNumber === boat1Course);
  const e1Wr = e1 ? (e1.wr || 0) : 0;
  const e1St = e1 ? (e1.st || 0.18) : 0.18;
  const c1Win = traits ? traits.c1win : 52;
  
  // Wind effect
  const wind = pv ? (pv.wind || 0) : 0;
  const windDir = pv ? (pv.windDir || 0) : 0;
  const isHeadwind = windDir >= 4 && windDir <= 6;
  const isTailwind = windDir <= 2 || windDir >= 8;
  
  // ① イン逃げ
  let escapeProb = c1Win * 0.8;
  if (e1Wr >= 7) escapeProb += 8;
  else if (e1Wr >= 6) escapeProb += 3;
  else if (e1Wr < 4.5) escapeProb -= 10;
  if (e1St <= 0.14) escapeProb += 5;
  else if (e1St >= 0.20) escapeProb -= 8;
  if (wind >= 3 && isTailwind) escapeProb += 3;
  if (wind >= 3 && isHeadwind) escapeProb -= 8;
  if (wind >= 5) escapeProb -= 5;
  escapeProb = Math.round(Math.max(10, Math.min(70, escapeProb)));
  
  patterns.push({
    icon: '🚀', label: `${boat1Course}号艇イン逃げ`,
    prob: escapeProb,
    desc: e1 ? `${e1.name}(${e1.cls}) ST${e1St}でスタート決めて押し切り` : null,
  });
  
  // ② まくり候補（4-6コースのダッシュ勢）
  let bestMakuri = null;
  let makuriProb = 0;
  for (let c = 3; c < 6; c++) {
    const bn = courseOrder[c];
    const e = entries.find(en => en.boatNumber === bn);
    if (!e) continue;
    const eSt = e.st || 0.18;
    const eWr = e.wr || 0;
    let mp = 5 + (0.18 - eSt) * 120 + (eWr - 5) * 3;
    if (wind >= 3 && isTailwind) mp += 5;
    if (c >= 4 && eSt <= 0.14) mp += 8;
    if (mp > makuriProb) { makuriProb = mp; bestMakuri = { bn, e, course: c + 1 }; }
  }
  if (bestMakuri && makuriProb > 8) {
    makuriProb = Math.round(Math.max(5, Math.min(40, makuriProb)));
    patterns.push({
      icon: '⚡', label: `${bestMakuri.bn}号艇まくり(${bestMakuri.course}C)`,
      prob: makuriProb,
      desc: `${bestMakuri.e.name}(${bestMakuri.e.cls}) ST${(bestMakuri.e.st||0.18).toFixed(2)}のダッシュ力`,
    });
  }
  
  // ③ 差し候補（2-3コース）
  let bestSashi = null;
  let sashiProb = 0;
  for (let c = 1; c < 3; c++) {
    const bn = courseOrder[c];
    const e = entries.find(en => en.boatNumber === bn);
    if (!e) continue;
    const eWr = e.wr || 0;
    let sp = 10 + (eWr - 5) * 4;
    if (c === 1) sp += 5; // 2C差し有利
    if (wind >= 3 && isHeadwind) sp += 5;
    if (sp > sashiProb) { sashiProb = sp; bestSashi = { bn, e, course: c + 1 }; }
  }
  if (bestSashi && sashiProb > 8) {
    sashiProb = Math.round(Math.max(5, Math.min(35, sashiProb)));
    patterns.push({
      icon: '🔄', label: `${bestSashi.bn}号艇差し(${bestSashi.course}C)`,
      prob: sashiProb,
      desc: `${bestSashi.e.name}が1M内を突いて差し切り`,
    });
  }
  
  // ④ まくり差し候補（4-5コースから内を突く）
  let bestMakuriSashi = null;
  let makuriSashiProb = 0;
  for (let c = 3; c < 5; c++) {
    const bn = courseOrder[c];
    const e = entries.find(en => en.boatNumber === bn);
    if (!e) continue;
    const eSt = e.st || 0.18;
    const eWr = e.wr || 0;
    let msp = 3 + (eWr - 5) * 2.5 + (0.18 - eSt) * 60;
    // まくり差しは外の選手がまくったとき内を突く展開なので、さらに外にまくり候補がいるか
    const outerHasMakuri = bestMakuri && bestMakuri.course > (c + 1);
    if (outerHasMakuri) msp += 6;
    if (wind >= 3 && isHeadwind) msp += 4; // 向かい風→展開が荒れてまくり差し増加
    if (msp > makuriSashiProb) { makuriSashiProb = msp; bestMakuriSashi = { bn, e, course: c + 1 }; }
  }
  if (bestMakuriSashi && makuriSashiProb > 6) {
    makuriSashiProb = Math.round(Math.max(3, Math.min(30, makuriSashiProb)));
    patterns.push({
      icon: '🎯', label: `${bestMakuriSashi.bn}号艇まくり差し(${bestMakuriSashi.course}C)`,
      prob: makuriSashiProb,
      desc: `${bestMakuriSashi.e.name}が展開を突いて内を差す`,
      tactic: 'makurisashi',
    });
  }

  // ⑤ 波乱
  // ⑤ 波乱
  const remaining = Math.max(5, 100 - patterns.reduce((s, p) => s + p.prob, 0));
  patterns.push({
    icon: '🌊', label: 'その他・波乱',
    prob: remaining,
    desc: null,
  });
  
  // Normalize to 100%
  const total = patterns.reduce((s, p) => s + p.prob, 0);
  if (total > 0 && total !== 100) {
    const scale = 100 / total;
    for (const p of patterns) p.prob = Math.round(p.prob * scale);
    // Fix rounding
    const diff = 100 - patterns.reduce((s, p) => s + p.prob, 0);
    patterns[0].prob += diff;
  }
  
  // Sort by prob desc
  patterns.sort((a, b) => b.prob - a.prob);
  
  return patterns;
}

// #11: Odds divergence
function calcOddsAlerts(vid,rno){
  const race=state.venues.find(v=>v.id===vid)?.races.find(r=>r.number===rno);if(!race)return;
  const pv=state.pvMap[`${vid}-${rno}`];const pred=predict(race.entries,pv,vid);
  const odds=state.oddsCache[`${vid}-${rno}`];if(!pred||!odds)return;
  const alerts=[];const rk=pred.ranked;
  
  // #7改善: より精度の高い確率推定
  // 各艇の着別確率を推定（1着率だけでなく2着率・3着率も考慮）
  const p = {}; // {bn: {p1, p2, p3}} 着別確率
  for (const r of rk) {
    const prob1 = r.prob / 100;
    p[r.boat] = {
      p1: prob1,
      p2: Math.min(0.45, prob1 * 0.85 + 0.05), // 2着率は1着率に連動（やや緩め）
      p3: Math.min(0.55, prob1 * 0.7 + 0.08),   // 3着率はさらに緩め
    };
  }
  
  for(let i=0;i<Math.min(3,rk.length);i++)for(let j=0;j<Math.min(4,rk.length);j++){if(i===j)continue;for(let k=0;k<Math.min(5,rk.length);k++){if(k===i||k===j)continue;
    const c=`${rk[i].boat}-${rk[j].boat}-${rk[k].boat}`;const mo=odds[c];if(!mo||mo<3)continue;
    // 改善: 3連単の結合確率をより正確に推定
    const aiP = p[rk[i].boat].p1 * p[rk[j].boat].p2 * p[rk[k].boat].p3 * 6; // 順列補正
    const ev = Math.max(0, aiP * mo);
    // 人気偏向補正: 低オッズ（人気サイド）のEVを少し下げる
    const popAdj = mo < 15 ? 0.92 : mo < 50 ? 1.0 : 1.05; // 高配当にやや有利な補正
    const adjEv = ev * popAdj;
    if(adjEv>1.2)alerts.push({venueId:vid,rno,combo:c,aiProb:Math.round(aiP*1000)/10,marketOdds:mo,ev:Math.round(adjEv*100)/100});}}
  alerts.sort((a,b)=>b.ev-a.ev);
  // #7改善: 点数制限（最大8点、EV1.5以上を優先）
  const hotAlerts = alerts.filter(a => a.ev >= 1.5).slice(0, 5);
  const warmAlerts = alerts.filter(a => a.ev >= 1.2 && a.ev < 1.5).slice(0, 3);
  state.oddsAlerts = [...hotAlerts, ...warmAlerts].slice(0, 8);
}

// #15: Momentum
function calcMomentum(e){
  const k=e.regNo||e.name;if(state.momCache[k])return state.momCache[k];
  const wr=e.wr||4,lwr=e.lwr||wr,mdr=e.mdr||30;
  const reasons=[];
  const sigs=[];
  const ld=(lwr||wr)-wr;
  if(ld>1){sigs.push(2);reasons.push('当地勝率が全国を大幅に上回る');}else if(ld>0.3){sigs.push(1);reasons.push('当地でやや好成績');}else if(ld<-1){sigs.push(-2);reasons.push('当地成績が全国平均を下回る');}else if(ld<-0.3){sigs.push(-1);reasons.push('当地でやや不振');}else{sigs.push(0);}
  if(mdr>45){sigs.push(2);reasons.push(`MT2連${mdr.toFixed(0)}%の好モーター。出足・伸び共に期待`);}else if(mdr>35){sigs.push(1);reasons.push(`MT2連${mdr.toFixed(0)}%で平均以上。足はまずまず`);}else if(mdr<20){sigs.push(-2);reasons.push(`MT2連${mdr.toFixed(0)}%と低調。機力面で厳しい`);}else if(mdr<28){sigs.push(-1);reasons.push(`MT2連${mdr.toFixed(0)}%でやや物足りない`);}else{sigs.push(0);}
  if(e.fc>0){sigs.push(-1);reasons.push(`F${e.fc}持ちでスタート慎重になりがち。出遅れリスクあり`);}
  if(e.cls==='A1'&&wr>=7){sigs.push(1);reasons.push('A1上位の実力者。安定した成績を維持');}
  else if(e.cls==='A1'&&wr>=6){reasons.push('A1級で安定感あり');}
  else if(e.cls==='B1'&&wr>=5.5){reasons.push('B1ながら好成績。勢いあり');}
  // モーター調整・換装検出（今節前半vs後半の成績推移）
  if(e.sesResults&&e.sesResults.length>=4){
    const half=Math.floor(e.sesResults.length/2);
    const firstHalf=e.sesResults.slice(0,half).filter(r=>r.rank<=6).map(r=>[10,8,6,4,2,1][r.rank-1]||0);
    const secondHalf=e.sesResults.slice(half).filter(r=>r.rank<=6).map(r=>[10,8,6,4,2,1][r.rank-1]||0);
    const avg1=firstHalf.length>0?firstHalf.reduce((a,b)=>a+b,0)/firstHalf.length:0;
    const avg2=secondHalf.length>0?secondHalf.reduce((a,b)=>a+b,0)/secondHalf.length:0;
    if(avg2-avg1>=3){sigs.push(1);reasons.push(`節前半→後半で得点率${avg1.toFixed(0)}→${avg2.toFixed(0)}と大幅UP。モーター調整奏功の可能性大`);}
    else if(avg1-avg2>=3){sigs.push(-1);reasons.push(`節後半に失速（${avg1.toFixed(0)}→${avg2.toFixed(0)}）。エンジン不安 or 体力面の懸念`);}
  }
  const total=sigs.reduce((a,b)=>a+b,0);
  const trend=total>=2?'up':total<=-2?'down':'stable';
  const label=trend==='up'?'↗上り調子':trend==='down'?'↘下降中':'→安定';
  // Build 100-140 char comment from collected reasons
  let comment='';
  if(reasons.length>0){
    comment=reasons.join('。');
    if(comment.length>140)comment=comment.substring(0,137)+'...';
    if(comment.length<100&&trend==='up')comment+='。好調期に入っており、舟券の軸として積極的に買える状態。展示や直前情報にも注目して最終判断したい';
    else if(comment.length<100&&trend==='down')comment+='。無理に軸にせず、相手候補や紐に留めるのが賢明。展示データで巻き返しの兆候がないか確認を';
    else if(comment.length<100)comment+='。大きな波はなく安定して走れている印象。堅実に2・3着に絡むタイプで、相手候補として狙いたい存在';
  } else {
    comment=trend==='up'?'全体的に数字が良く、好調サイクルに入っている印象。機力もしっかりしており、舟券の軸として信頼できる状態。スタート力も安定しているため、コースを問わず力を発揮できそうだ':
           trend==='down'?'成績・機力ともに下降気味で、スタートや展開に不安を抱える状況。相手候補に留めるのが無難で、軸にするにはリスクが高い。展示データで調子の変化がないか最終確認を':
           '成績・機力ともに平均的な水準で、大きな上積みも不安材料も見当たらない。堅実に走れるタイプだが、軸にするには決め手に欠ける部分も。相手候補として舟券に組み込みたい';
  }
  const sd=[];const base=wr;
  for(let i=0;i<5;i++){
    const noise=Math.sin((String(k).length||3)*i+i*3)*0.15;
    const tf=trend==='up'?i*0.25:trend==='down'?-i*0.2:0;
    sd.push(Math.max(1,Math.min(10,base+noise+tf)));
  }
  const r={trend,label,spark:sd,reason:comment};state.momCache[k]=r;return r;
}

let _renderTimer = null;
function render(){
  if (_renderTimer) clearTimeout(_renderTimer);

function _renderNow(){
  _renderTimer = null;
  const _scrollY = window.scrollY;
  const root=document.getElementById('root');
  // DocumentFragmentで構築→一括置換（チカチカ防止）
  const frag=document.createDocumentFragment();
  // pull-to-refresh インジケーター

  else if(state.view==='detail')content.appendChild(renderDetail());

  frag.appendChild(content);frag.appendChild(renderFooter());

  root.replaceChildren(frag);

// ═══ AI分析タブ (IMPROVED: ML根拠、買い目アドバイザー復活、ストーリー、オッズアラート) ═══

  const pick=getPickForDisplay(race,venue,pv,result);if(!pick){wrap.appendChild(h('div',{style:{textAlign:'center',padding:'20px',color:'var(--tx3)'}},'予測不可'));return wrap;}
  const rs=RANK_STYLE[pick.rank]||RANK_STYLE.B;

  // 低信頼度バナー
  if (isLowConf && pick.rank !== 'D') {
    wrap.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'6px',padding:'8px 12px',marginBottom:'6px',borderRadius:'var(--r)',background:'rgba(240,82,82,0.06)',border:'1px solid rgba(240,82,82,0.12)',fontSize:'12px',color:'var(--err)'}},
      h('span',null,'⚠️'),
      h('span',{style:{fontWeight:600}},'信頼度低 ('+pred.conf+'%)'),
      h('span',{style:{color:'var(--tx3)'}},'実力差が小さく予測が困難です。投資は控えめに')
    ));
  }
  // Rank card with ML reasoning + freeze badge
  const rc=h('div',{className:'card',style:{background:rs.bg,borderColor:rs.border,opacity:isLowConf?0.85:1}});
  // ═══ v16.3: freezeバッジ ═══
  if (pick.isFrozen) {
    const fBadge=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}});
    const fLabel = pick.source==='odds' ? '🔒 確定 '+pick.frozenAt : pick.source==='result' ? '🔒 結果確定時' : '🔒 確定';
    fBadge.appendChild(h('span',{style:{display:'inline-flex',alignItems:'center',gap:'4px',fontSize:'10px',fontWeight:600,padding:'2px 8px',borderRadius:'20px',background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.08)',color:'var(--tx3)'}},fLabel));
    rc.appendChild(fBadge);
  } else if (!result?.hasResult) {
    const fBadge=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}});
    fBadge.appendChild(h('span',{style:{display:'inline-flex',alignItems:'center',gap:'4px',fontSize:'10px',fontWeight:600,padding:'2px 8px',borderRadius:'20px',background:'rgba(255,255,255,0.03)',border:'1px dashed rgba(255,255,255,0.06)',color:'var(--tx4)'}},'🔓 暫定（オッズ取得で確定）'));
    rc.appendChild(fBadge);
  }

        row.appendChild(h('span',{style:{fontSize:'11px',color:'var(--tx4)',minWidth:'42px',textAlign:'right'}},b.odds.toFixed(1)+'倍'));
        row.appendChild(h('span',{className:`bet-ev ${b.ev>=1.0?'bet-ev-pos':'bet-ev-neg'}`,style:{fontSize:'10px',minWidth:'38px',textAlign:'right'},'data-tip':'期待値(Expected Value)。1.0以上なら統計的にプラスの賭け。オッズ×的中確率で算出'},`EV${b.ev.toFixed(1)}`));
      }
      
      // 金額（見送りは非表示）
      if (!isSkip) {
        row.appendChild(h('span',{style:{fontSize:'12px',fontWeight:700,color:'var(--warn)',marginLeft:'auto',fontFamily:'JetBrains Mono,monospace'}},`¥${b.betAmount}`));
      }
      
      betCard.appendChild(row);
    }
    
    // 投資サマリー
    if (!isCutVenue && (strongCount > 0 || normalCount > 0)) {
      const sumParts = [];
      if (strongCount > 0) sumParts.push(`🔥×${strongCount}`);
      if (normalCount > 0) sumParts.push(`⚡×${normalCount}`);
      const totalInvest = strongBet + normalBet;
      const sumBar = h('div',{style:{marginTop:'8px',padding:'7px 8px',borderRadius:'var(--r-sm)',background:'var(--sf)',display:'flex',justifyContent:'space-between',alignItems:'center'}});
      sumBar.appendChild(h('span',{style:{fontSize:'11px',color:'var(--tx3)'}},sumParts.join(' + ') + ` = ¥${totalInvest.toLocaleString()}`));
      if (skipCount > 0) sumBar.appendChild(h('span',{style:{fontSize:'10px',color:'var(--tx4)'}},`見送り ${skipCount}目`));
      betCard.appendChild(sumBar);
    }
    
    wrap.appendChild(betCard);
  }
  // Visual
  wrap.appendChild(renderVisual(race,venue,pv,pred));
  
  // ── 詳細分析（折りたたみ式）──
  const detailKey = `detail-${venue.id}-${race.number}`;
  const detailOpen = state._uiOpen?.[detailKey];
  
  const detailToggle = h('div',{className:'card',style:{cursor:'pointer',padding:'10px 14px',display:'flex',alignItems:'center',justifyContent:'space-between'},onClick:()=>{
    if (!state._uiOpen) state._uiOpen = {};
    state._uiOpen[detailKey] = !detailOpen;
    render();
  }});
  detailToggle.appendChild(h('span',{style:{fontSize:'13px',fontWeight:700,color:'var(--tx2)'}},'📊 詳細データ（3連単確率・買い目全目）'));
  detailToggle.appendChild(h('span',{style:{fontSize:'11px',color:'var(--tx4)',transition:'transform .2s',transform:detailOpen?'rotate(180deg)':'none'}},'▼'));
  wrap.appendChild(detailToggle);
  
  if (detailOpen) {
  // ── 展開連動型 3連単確率 TOP10（折りたたみ式）──
  if (pred.trifectaProbs && Object.keys(pred.trifectaProbs).length > 0) {
    const triCard = h('div',{className:'card',style:{cursor:'pointer'}});
    const triKey = `tri-${venue.id}-${race.number}`;
    const triOpen = state._uiOpen?.[triKey];
    
    const triHeader = h('div',{style:{display:'flex',alignItems:'center',gap:'8px'},onClick:()=>{
      if (!state._uiOpen) state._uiOpen = {};
      state._uiOpen[triKey] = !triOpen;
      render();
    }});
    triHeader.appendChild(h('div',{style:{fontSize:'14px',fontWeight:700}},'🎲 展開連動型 3連単確率'));
    
    // コンパクトなTOP3プレビュー
    const sorted = Object.entries(pred.trifectaProbs).sort((a,b) => b[1] - a[1]).slice(0, 10);
    if (!triOpen && sorted.length > 0) {
      const preview = h('div',{style:{display:'flex',gap:'6px',marginLeft:'auto',alignItems:'center'}});
      for (const [combo, prob] of sorted.slice(0,3)) {
        const boats = combo.split('-').map(Number);
        const mini = h('span',{style:{display:'inline-flex',gap:'1px',alignItems:'center'}});
        boats.forEach(bn => mini.appendChild(boatBadge(bn, 12)));
        mini.appendChild(h('span',{style:{fontSize:'11px',color:'var(--tx3)',marginLeft:'2px'}},(prob*100).toFixed(0)+'%'));
        preview.appendChild(mini);
      }
      triHeader.appendChild(preview);
    }
    triHeader.appendChild(h('span',{style:{fontSize:'12px',color:'var(--tx4)',marginLeft:triOpen?'auto':'4px',transition:'transform .2s',transform:triOpen?'rotate(180deg)':''}},'▼'));
    triCard.appendChild(triHeader);
    
    if (triOpen) {
      triCard.appendChild(h('div',{style:{fontSize:'11px',color:'var(--tx4)',margin:'6px 0 8px'}},'決まり手パターン(逃げ/差し/まくり)に基づく条件付き確率'));
      const maxProb = sorted[0]?.[1] || 1;
    
    for (const [combo, prob] of sorted) {
      const boats = combo.split('-').map(Number);
      const pct = (prob * 100).toFixed(1);
      const barW = Math.max(5, Math.round(prob / maxProb * 100));
      
      const row = h('div',{style:{display:'flex',alignItems:'center',gap:'6px',marginBottom:'3px'}});
      const badges = h('div',{style:{display:'flex',gap:'2px',minWidth:'60px'}});
      boats.forEach(bn => badges.appendChild(boatBadge(bn, 16)));
      row.appendChild(badges);
      
      // 確率バー
      const barOuter = h('div',{style:{flex:1,height:'14px',borderRadius:'7px',background:'var(--sf)',overflow:'hidden'}});
      const barInner = h('div',{style:{width:barW+'%',height:'100%',borderRadius:'7px',background:barW > 60 ? 'linear-gradient(90deg,#22c55e,#4ade80)' : barW > 30 ? 'linear-gradient(90deg,#3b82f6,#60a5fa)' : 'linear-gradient(90deg,#6b7280,#9ca3af)'}});
      barOuter.appendChild(barInner);
      row.appendChild(barOuter);
      
      row.appendChild(h('span',{style:{fontSize:'12px',fontWeight:700,fontFamily:'JetBrains Mono,monospace',minWidth:'40px',textAlign:'right',color: prob > 0.08 ? 'var(--ok)' : 'var(--tx3)'}},pct+'%'));
      
      // オッズがある場合はEVも表示
      const oddsK = `${venue.id}-${race.number}`;
      const lo = state.oddsCache[oddsK];
      if (lo && lo[combo]) {
        const ev = prob * lo[combo];
        row.appendChild(h('span',{className:`bet-ev ${ev>=1.0?'bet-ev-pos':'bet-ev-neg'}`,style:{fontSize:'11px'}},`EV${ev.toFixed(1)}`));
      }
      
      triCard.appendChild(row);
    }
    } // end triOpen
    wrap.appendChild(triCard);
  }
  
  // Bets with odds/EV (詳細版 - 折りたたみ内)
  if(pick.rank!=='D'&&pick.bets?.length>0){
    const bc=h('div',{className:'card'});bc.appendChild(h('div',{style:{fontSize:'14px',fontWeight:700,marginBottom:'8px'}},'💰 買い目詳細（全目）'));
    const ok2=`${venue.id}-${race.number}`;const odds=state.oddsCache[ok2];
    for(const b of pick.bets.slice(0,12)){const boats=b.combo.split('-').map(Number);const row=h('div',{className:'bet-row'});const bd=h('div',{className:'bet-boats'});boats.forEach(bn=>bd.appendChild(boatBadge(bn,16)));row.appendChild(bd);
      if(odds){const mo=odds[b.combo];if(mo){row.appendChild(h('span',{className:'bet-odds'},`${mo.toFixed(1)}倍`));const triProb=pred.trifectaProbs?.[b.combo]||0;const ev=triProb*mo;row.appendChild(h('span',{className:`bet-ev ${ev>=1.0?'bet-ev-pos':'bet-ev-neg'}`},`EV${ev.toFixed(2)}`));}}
      row.appendChild(h('span',{className:'bet-amount'},`¥${b.betAmount}`));bc.appendChild(row);}
    wrap.appendChild(bc);
  }
  // ═══ 💡 注目ポイント（オッズ乖離 + AI解説） ═══
  const oas=state.oddsAlerts.filter(a=>a.rno===race.number&&a.venueId===venue.id);
  const baKey=`${venue.id}-${race.number}`;const ba=state.betAdvisor[baKey];
  const aiText = ba?.text || null;
  const aiGenerating = ba?.generating;
  const aiError = ba?.error;
  const hasAny = oas.length > 0 || aiText || aiGenerating || aiError;

  if (hasAny || !aiText) {
    const hlCard = h('div',{className:'card',style:{marginTop:'8px'}});
    hlCard.appendChild(h('div',{style:{fontSize:'13px',fontWeight:800,color:'var(--tx)',marginBottom:'8px',display:'flex',alignItems:'center',gap:'6px'}},
      h('span',{style:{fontSize:'16px'}},'💡'),
      h('span',null,'注目ポイント')
    ));

    // オッズ乖離アラート（上に目立つ位置）
    if (oas.length > 0) {
      for (const a of oas.slice(0,3)) {
        const boats = a.combo.split('-').map(Number);
        const alRow = h('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'8px 10px',borderRadius:'8px',marginBottom:'4px',background:'rgba(240,180,41,0.04)',border:'1px solid rgba(240,180,41,0.1)'}});
        const bd = h('div',{style:{display:'flex',gap:'3px'}});
        boats.forEach(bn => bd.appendChild(boatBadge(bn, 18)));
        alRow.appendChild(bd);
        alRow.appendChild(h('span',{style:{flex:1,fontSize:'12px',color:'var(--tx2)'}},`市場${a.marketOdds.toFixed(1)}倍`));
        const evColor = a.ev >= 1.5 ? 'var(--ok)' : 'var(--ac-t)';
        const evBg = a.ev >= 1.5 ? 'rgba(45,212,160,0.12)' : 'rgba(79,140,255,0.1)';
        alRow.appendChild(h('span',{style:{fontSize:'11px',fontWeight:800,padding:'3px 8px',borderRadius:'6px',fontFamily:'JetBrains Mono,monospace',background:evBg,color:evColor}},`EV ${a.ev}`));
        hlCard.appendChild(alRow);
      }
    }

    // AI解説
    if (aiText) {
      if (oas.length > 0) hlCard.appendChild(h('div',{style:{borderTop:'1px solid var(--bd)',margin:'8px 0'}}));
      hlCard.appendChild(h('div',{style:{fontSize:'12px',color:'var(--tx2)',lineHeight:'1.7'}}, _collapsibleText(aiText)));
    } else if (aiGenerating) {
      hlCard.appendChild(renderDots('AI分析中...'));
    } else if (aiError) {
      const ec = h('div',{style:{fontSize:'12px',color:'var(--err)',display:'flex',alignItems:'center',gap:'6px'}});
      ec.appendChild(h('span',null,'⚠️ ' + aiError));
      ec.appendChild(h('button',{style:{fontSize:'11px',color:'var(--ac-t)',background:'none',border:'1px solid var(--ac)',borderRadius:'var(--r-sm)',padding:'2px 8px',cursor:'pointer'},onClick:()=>{delete state.betAdvisor[baKey];render();}},'再試行'));
      hlCard.appendChild(ec);
    } else {
      // 未生成 → 生成ボタン
      hlCard.appendChild(h('button',{style:{width:'100%',padding:'10px',borderRadius:'8px',border:'1px solid var(--bd)',background:'rgba(79,140,255,0.06)',color:'var(--ac-t)',fontSize:'12px',fontWeight:700,cursor:'pointer'},
        onClick:()=>generateBetAdvice(race,venue,pv,pred,pick)},'💬 AI解説を生成'));
    }
    wrap.appendChild(hlCard);
  }
  
  } // end detailOpen
  
  // Phase4 #14: 免責表示
  wrap.appendChild(h('div',{style:{marginTop:'8px',padding:'6px 10px',borderRadius:'var(--r-sm)',background:'rgba(255,255,255,0.02)',fontSize:'11px',color:'var(--tx4)',lineHeight:'1.5',textAlign:'center'}},
    '⚠️ AI予測は統計モデルに基づく参考情報です。投資判断はご自身の責任で行ってください。的中を保証するものではありません。'));
  
  return wrap;
}

function renderDots(label){const d=h('div',{className:'ai-dots'});d.appendChild(h('div',{className:'ai-dot-anim'}));d.appendChild(h('div',{className:'ai-dot-anim'}));d.appendChild(h('div',{className:'ai-dot-anim'}));d.appendChild(h('span',null,label));return d;}

// (renderVisual, renderResultTab, renderMyPage, renderProfile, renderSim, renderChat remain from v11)
// They are included below with minor fixes

function renderVisual(race, venue, pv, pred) {
  if (!pred) return h('div');
  let courseOrder = race.entries.map(e => e.boatNumber);
  if (isValidCourse(pv?.course)) courseOrder = pv.course;
  const formation = predictFormation(race, venue, pv, pred);
  courseOrder = formation.courseOrder;
  const TACTIC_LABEL = {escape:'逃げ',sashi:'差し',makuri:'まくり',makuriSashi:'まくり差し',follow:'追随'};
  const TACTIC_COLOR = {escape:'var(--ok)',sashi:'var(--ac-t)',makuri:'var(--warn)',makuriSashi:'var(--warn)',follow:'var(--tx4)'};
  const TACTIC_BG = {escape:'rgba(45,212,160,0.1)',sashi:'rgba(79,140,255,0.1)',makuri:'rgba(240,180,41,0.1)',makuriSashi:'rgba(240,180,41,0.1)',follow:'rgba(255,255,255,0.04)'};
  const BB = {1:'#e8e8e8',2:'#333',3:'#ef4444',4:'#3b82f6',5:'#eab308',6:'#22c55e'};
  const hasPreview = pv?.entries?.some(pe => pe.exT || pe.exST != null);

  // ── カード本体（水面風グラデ） ──
  const card = h('div',{style:{background:'linear-gradient(145deg,#0c1e35,#0a1628)',border:'1px solid rgba(80,160,255,0.12)',borderRadius:'16px',padding:'16px',marginBottom:'10px',position:'relative',overflow:'hidden'}});
  card.appendChild(h('div',{style:{position:'absolute',top:'0',right:'0',width:'120px',height:'120px',background:'radial-gradient(circle,rgba(79,140,255,0.06) 0%,transparent 70%)',pointerEvents:'none'}}));

  // ── タイトル ──
  const titleRow = h('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'12px'}});
  titleRow.appendChild(h('span',{style:{fontSize:'18px'}},'🎬'));
  titleRow.appendChild(h('span',{style:{fontSize:'14px',fontWeight:800,color:'var(--tx)'}},'展開予想'));
  titleRow.appendChild(h('span',{style:{fontSize:'10px',fontWeight:700,padding:'2px 8px',borderRadius:'20px',background:hasPreview?'rgba(45,212,160,0.1)':'rgba(240,180,41,0.1)',color:hasPreview?'var(--ok)':'var(--warn)',border:`1px solid ${hasPreview?'rgba(45,212,160,0.2)':'rgba(240,180,41,0.2)'}`}},hasPreview?'展示反映済':'展示待ち'));
  card.appendChild(titleRow);

  // ── タブ ──
  const tabs = h('div',{style:{display:'flex',gap:'4px',marginBottom:'12px'}});
  ['📍 スリット','🔄 1M後'].forEach((lbl,i) => {
    const isOn = state.raceVisTab===i;
    tabs.appendChild(h('button',{style:{flex:1,padding:'8px 0',borderRadius:'8px',fontSize:'12px',fontWeight:700,border:`1px solid ${isOn?'rgba(79,140,255,0.3)':'var(--bd)'}`,background:isOn?'rgba(79,140,255,0.12)':'transparent',color:isOn?'var(--ac-t)':'var(--tx3)',cursor:'pointer'},onClick:()=>{state.raceVisTab=i;render();}},lbl));
  });
  card.appendChild(tabs);

  if (state.raceVisTab === 0) {
    // ═══ スリットタブ: レーンバー式 ═══
    const slitWrap = h('div');
    for (let c = 0; c < courseOrder.length; c++) {
      const bn = courseOrder[c];
      const e = race.entries.find(en => en.boatNumber === bn);
      const predST = formation.predictedST?.[bn] || 0.17;
      const tactic = formation.positions1M?.find(p => p.bn === bn)?.tactic || 'follow';
      const barPct = Math.max(15, Math.min(100, (0.25 - predST) / 0.15 * 100));
      const stColor = predST <= 0.14 ? 'var(--ok)' : predST >= 0.20 ? 'var(--err)' : 'var(--tx2)';

      const lane = h('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'6px 8px',borderRadius:'8px',marginBottom:'3px',background:'rgba(255,255,255,0.02)'}});
      lane.appendChild(h('span',{style:{fontSize:'10px',color:'var(--tx4)',width:'18px',textAlign:'center'}},`${c+1}C`));
      lane.appendChild(boatBadge(bn, 20));
      // 選手名（短縮）
      lane.appendChild(h('span',{style:{fontSize:'11px',color:'var(--tx2)',width:'38px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},e?.name?.slice(0,3)||''));
      lane.appendChild(h('span',{style:{fontSize:'12px',fontWeight:700,fontFamily:'JetBrains Mono,monospace',width:'38px',textAlign:'right',color:stColor}},predST.toFixed(2)));
      const barWrap = h('div',{style:{flex:1,height:'6px',borderRadius:'3px',background:'rgba(255,255,255,0.04)',overflow:'hidden'}});
      barWrap.appendChild(h('div',{style:{width:`${barPct}%`,height:'100%',borderRadius:'3px',background:BB[bn]}}));
      lane.appendChild(barWrap);
      lane.appendChild(h('span',{style:{fontSize:'10px',fontWeight:700,padding:'2px 6px',borderRadius:'10px',minWidth:'44px',textAlign:'center',background:TACTIC_BG[tactic]||TACTIC_BG.follow,color:TACTIC_COLOR[tactic]||TACTIC_COLOR.follow}},TACTIC_LABEL[tactic]||'追随'));
      slitWrap.appendChild(lane);
    }
    card.appendChild(slitWrap);

  } else {
    // ═══ 1M後タブ: 着順リスト + パターン確率 ═══
    const posM = formation.positions1M || [];
    const posList = h('div',{style:{display:'flex',flexDirection:'column',gap:'3px'}});
    const rankBg = ['rgba(255,215,0,0.15)','rgba(192,192,192,0.12)','rgba(205,127,50,0.12)'];
    const rankTx = ['#ffd700','#c0c0c0','#cd7f32'];
    const maxAdv = Math.max(...posM.map(p=>p.advantage), 1);

    for (let i = 0; i < posM.length; i++) {
      const p = posM[i];
      const e = race.entries.find(en => en.boatNumber === p.bn);
      const isTop3 = i < 3;
      const tactic = TACTIC_LABEL[p.tactic] || '追随';
      const tacColor = TACTIC_COLOR[p.tactic] || TACTIC_COLOR.follow;
      const tacBg = TACTIC_BG[p.tactic] || TACTIC_BG.follow;
      const advPct = Math.max(10, (p.advantage / maxAdv) * 100);

      const row = h('div',{style:{display:'flex',alignItems:'center',gap:'10px',padding:'8px 10px',borderRadius:'10px',background:isTop3?'rgba(255,255,255,0.03)':'rgba(255,255,255,0.01)',border:i===0?'1px solid rgba(45,212,160,0.1)':'1px solid transparent',opacity:isTop3?1:Math.max(0.35,0.6-i*0.05)}});
      const rkBg = i<3?rankBg[i]:'rgba(255,255,255,0.04)';
      const rkTx = i<3?rankTx[i]:'var(--tx4)';
      row.appendChild(h('span',{style:{width:'22px',height:'22px',borderRadius:'6px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:900,flexShrink:0,background:rkBg,color:rkTx}},String(i+1)));
      row.appendChild(boatBadge(p.bn, 20));
      const info = h('div',{style:{flex:1,minWidth:0}});
      info.appendChild(h('div',{style:{fontSize:'12px',fontWeight:700,color:'var(--tx)'}},e?.name||`${p.bn}号艇`));
      info.appendChild(h('div',{style:{fontSize:'10px',color:'var(--tx4)'}},`${p.course+1}C → ${tactic}`));
      row.appendChild(info);
      const right = h('div',{style:{textAlign:'right'}});
      right.appendChild(h('div',{style:{fontSize:'10px',fontWeight:700,padding:'3px 8px',borderRadius:'10px',background:tacBg,color:tacColor,display:'inline-block'}},tactic));
      if (isTop3) {
        const advBar = h('div',{style:{width:'60px',height:'4px',borderRadius:'2px',background:'rgba(255,255,255,0.04)',overflow:'hidden',marginTop:'4px',marginLeft:'auto'}});
        advBar.appendChild(h('div',{style:{width:`${advPct}%`,height:'100%',borderRadius:'2px',background:tacColor}}));
        right.appendChild(advBar);
      }
      row.appendChild(right);
      posList.appendChild(row);
    }
    card.appendChild(posList);

    // ── 展開パターン確率 ──
    const patterns = calcRacePatterns(race, venue, pv, pred, courseOrder);
    if (patterns.length > 0) {
      const patSec = h('div',{style:{marginTop:'12px',paddingTop:'10px',borderTop:'1px solid rgba(255,255,255,0.06)'}});
      patSec.appendChild(h('div',{style:{fontSize:'11px',fontWeight:700,color:'var(--tx3)',marginBottom:'8px'}},'展開パターン'));
      for (const pat of patterns) {
        const row = h('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'8px 0',borderBottom:'1px solid rgba(255,255,255,0.04)'}});
        row.appendChild(h('span',{style:{fontSize:'14px',width:'20px',textAlign:'center'}},pat.icon));
        const body = h('div',{style:{flex:1}});
        const topLine = h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'3px'}});
        const labelSpan = h('span',{style:{display:'flex',alignItems:'center',gap:'4px',fontSize:'12px',fontWeight:600,color:'var(--tx2)'}});
        const bnMatch = pat.label.match(/^(\d)号艇/);
        if(bnMatch){labelSpan.appendChild(boatBadge(Number(bnMatch[1]),15));labelSpan.appendChild(h('span',null,pat.label.replace(/^\d号艇/,'')));}
        else{labelSpan.appendChild(h('span',null,pat.label));}
        topLine.appendChild(labelSpan);
        const probColor = pat.prob>=40?'var(--ok)':pat.prob>=25?'var(--ac-t)':'var(--tx3)';
        topLine.appendChild(h('span',{style:{fontSize:'13px',fontWeight:800,fontFamily:'JetBrains Mono,monospace',color:probColor}},`${pat.prob}%`));
        body.appendChild(topLine);
        const barOuter = h('div',{style:{height:'5px',borderRadius:'3px',background:'rgba(255,255,255,0.04)',overflow:'hidden'}});
        const barBg = pat.prob>=40?'linear-gradient(90deg,#30c060,#50e080)':pat.prob>=25?'linear-gradient(90deg,#4f8cff,#80b0ff)':'#5a6478';
        barOuter.appendChild(h('div',{style:{width:`${Math.max(15,pat.prob)}%`,height:'100%',borderRadius:'3px',background:barBg}}));
        body.appendChild(barOuter);
        if(pat.desc) body.appendChild(h('div',{style:{fontSize:'11px',color:'var(--tx4)',marginTop:'3px'}},pat.desc));
        row.appendChild(body);
        patSec.appendChild(row);
      }
      card.appendChild(patSec);
    }
  }

  // ── コンディションバー（共通） ──
  const wind2 = formation.wind || (pv?.wind||0);
  const wave2 = pv?.wave || 0;
  const isHead2 = formation.isHead;
  const isTail2 = formation.isTail;
  const windLabel = wind2 > 0 ? `🌬 ${isTail2?'追':'向'}風${wind2}m` : '🌬 無風';
  const waveLabel = wave2 > 0 ? `🌊 波${wave2}cm` : '🌊 穏やか';
  let condJudge = '', condColor = 'var(--tx4)';
  const inBn = formation.inBn;
  if (inBn) {
    const inE = race.entries.find(en=>en.boatNumber===inBn);
    if (inE && inE.wr >= 6 && !isHead2) { condJudge = `${inBn}号艇有利`; condColor = 'var(--ok)'; }
    else if (isHead2 && wind2 >= 3) { condJudge = 'イン不利'; condColor = 'var(--err)'; }
    else if (wind2 >= 4) { condJudge = '荒れ注意'; condColor = 'var(--warn)'; }
    else { condJudge = '平常'; condColor = 'var(--tx3)'; }
  }
  const condBar = h('div',{style:{display:'flex',gap:'12px',marginTop:'10px',paddingTop:'10px',borderTop:'1px solid rgba(255,255,255,0.06)',fontSize:'11px',color:'var(--tx4)',flexWrap:'wrap'}});
  condBar.appendChild(h('span',null,windLabel));
  condBar.appendChild(h('span',null,waveLabel));
  if(condJudge) condBar.appendChild(h('span',{style:{marginLeft:'auto',color:condColor,fontWeight:600}},condJudge));
  card.appendChild(condBar);

  return card;
}

  [3,5,8,10,15,20,30,50].forEach(p=>{const sel=(state.targetOdds||10)===p;oRow.appendChild(h('button',{style:{padding:'3px 8px',borderRadius:'var(--r-xs)',fontSize:'14px',fontWeight:sel?800:500,background:sel?'rgba(78,142,255,0.2)':'var(--sf)',color:sel?'var(--ac-t)':'var(--tx3)',border:`1px solid ${sel?'rgba(78,142,255,0.4)':'var(--bd)'}`},onClick:()=>{state.targetOdds=p;state.investStyle=p<=5?'safe':p<=15?'balance':'risk';state.smartBets=null;render();}},`${p}倍`));});

  oInput.addEventListener('change',e=>{const v=parseFloat(e.target.value);if(v>=1){state.targetOdds=v;state.smartBets=null;render();}});
  oRow.appendChild(oInput);oRow.appendChild(h('span',{style:{fontSize:'13px',color:'var(--tx3)'}},'倍'));

  p1.appendChild(h('button',{style:{width:'100%',padding:'12px',borderRadius:'var(--r)',background:'linear-gradient(135deg,#f59e0b,#ef4444)',color:'#fff',fontSize:'14px',fontWeight:800,border:'none',cursor:'pointer',marginTop:'4px'},onClick:()=>{rebuildBets();}},'\uD83D\uDCB0 AIに買い目を相談する'));
  wrap.appendChild(p1);

  }

  // ── Panel 2: Smart Bets Result ──

    const p2=h('div',{className:'panel',style:{border:'1px solid rgba(34,197,94,0.15)'}});

    const addStat=(label,value,color)=>{sum.appendChild(h('div',{style:{textAlign:'center'}},h('div',{style:{fontSize:'13px',color:'var(--tx3)'}},label),h('div',{style:{fontSize:'14px',fontWeight:900,color}},value)));};
    addStat('買い目数',`${sb.count}点`,'var(--ac-t)');
    addStat('合成オッズ',`${sb.syntheticOdds}倍`,'var(--ok)');
    addStat('購入合計',`¥${sb.totalBet.toLocaleString()}`,'var(--warn)');
    addStat('的中時リターン',sb.minReturn===sb.maxReturn?`¥${sb.minReturn.toLocaleString()}`:`¥${sb.minReturn.toLocaleString()}〜${sb.maxReturn.toLocaleString()}`,'var(--ok)');
    addStat('期待ROI',`${sb.expectedROI}%`,sb.expectedROI>=100?'var(--ok)':'var(--warn)');
    p2.appendChild(sum);
    
    // EV警告
    if (sb.hasLowEV) {
      p2.appendChild(h('div',{style:{padding:'4px 8px',borderRadius:'var(--r-sm)',background:'rgba(240,82,82,0.06)',border:'1px solid rgba(240,82,82,0.12)',fontSize:'11px',color:'var(--err)',marginBottom:'6px'}},
        `⚠️ 平均EV${sb.avgEV} < 1.0。理論上マイナス期待値です。オッズの変動を待つか、投資スタイルを変更してください`));
    }

    // Bet grid
    const grid=h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(155px, 1fr))',gap:'4px'}});
    const showN=Math.min(sb.bets.length,24);
    for(let i=0;i<showN;i++){
      const bet=sb.bets[i];const nums=bet.combo.split('-').map(Number);
      const evC=bet.ev>=1.5?'var(--ok)':bet.ev>=1.0?'var(--warn)':'var(--tx3)';
      const item=h('div',{style:{display:'flex',alignItems:'center',gap:'2px',padding:'5px 8px',borderRadius:'var(--r-sm)',background:'var(--sf)',border:'1px solid var(--bd)'}});
      nums.forEach((n,j)=>{item.appendChild(boatBadge(n,15));if(j<2)item.appendChild(h('span',{style:{color:'var(--tx3)',fontSize:'14px'}},'→'));});
      item.appendChild(h('span',{style:{fontSize:'14px',fontWeight:700,color:'var(--warn)',marginLeft:'auto'}},'¥'+bet.betAmount.toLocaleString()));
      item.appendChild(h('span',{style:{fontSize:'14px',color:'var(--tx3)',marginLeft:'4px'}},String(bet.odd)));
      item.appendChild(h('span',{style:{fontSize:'14px',color:evC,fontWeight:700,marginLeft:'2px'}},'EV'+bet.ev.toFixed(1)));
      grid.appendChild(item);
    }
    p2.appendChild(grid);
    if(sb.bets.length>24)p2.appendChild(h('div',{style:{textAlign:'center',marginTop:'6px',fontSize:'13px',color:'var(--tx3)'}},`他${sb.bets.length-24}件`));
    p2.appendChild(h('div',{style:{marginTop:'6px',fontSize:'14px',color:'var(--tx3)',lineHeight:1.5}},'※ 均等回収方式：どの目が的中しても近いリターンになるよう、オッズに応じて金額を配分。100円単位で丸め。EV=期待値（1.0超で理論上プラス）。オッズは変動します。'));
    wrap.appendChild(p2);
  }

  // ── Panel 3: 全120組合せ EVスキャン（展開連動型確率）──
  if(pred&&odds&&Object.keys(odds).length>0){
    const p3=h('div',{className:'panel'});
    p3.appendChild(h('div',{style:{fontSize:'14px',fontWeight:800,color:'var(--tx)',marginBottom:'4px'}},'🔍 全120組合せ EVスキャン'));
    // オッズ鮮度チェック
    const oddsKey2 = `${venue.id}-${race.number}`;
    const oddsMeta2 = state.oddsMeta?.[oddsKey2];
    if (oddsMeta2?.ts && (Date.now() - oddsMeta2.ts > 300000)) {
      p3.appendChild(h('div',{style:{fontSize:'11px',color:'var(--err)',marginBottom:'4px',padding:'2px 6px',borderRadius:'var(--r-xs)',background:'rgba(240,82,82,0.06)'}},'⚠️ オッズ鮮度低（5分超経過）。EV値の信頼性が低下しています'));
    }
    p3.appendChild(h('div',{style:{fontSize:'11px',color:'var(--tx4)',marginBottom:'8px'}},'展開連動型確率 × リアルオッズ → EV≥1.0のみ表示'));
    
    // 全120組合せのEVを計算
    const allEV = [];
    for (let a=1;a<=6;a++) for (let b=1;b<=6;b++) for (let c=1;c<=6;c++) {
      if (a===b||b===c||a===c) continue;
      const combo = `${a}-${b}-${c}`;
      const odd = odds[combo];
      if (!odd || odd <= 0) continue;
      let prob;
      if (pred.trifectaProbs && pred.trifectaProbs[combo]) {
        prob = pred.trifectaProbs[combo];
      } else {
        const pa=(pred.probs[a-1]||0)/100, pb=(pred.probs[b-1]||0)/100, pc=(pred.probs[c-1]||0)/100;
        prob = pa * pb / (1-pa) * pc / (1-pa-pb);
      }
      prob = Math.max(prob, 0.001);
      const ev = prob * odd;
      allEV.push({ combo, odd, prob, ev, boats: [a,b,c] });
    }
    allEV.sort((a,b) => b.ev - a.ev);
    
    const plusEV = allEV.filter(c => c.ev >= 1.0);
    const statLine = h('div',{style:{display:'flex',gap:'8px',marginBottom:'6px',fontSize:'12px',color:'var(--tx3)'}});
    statLine.appendChild(h('span',null,`全${allEV.length}通り中`));
    statLine.appendChild(h('span',{style:{color:'var(--ok)',fontWeight:700}},`EV≥1.0: ${plusEV.length}通り`));
    const avg = plusEV.length > 0 ? (plusEV.reduce((s,c) => s+c.ev, 0) / plusEV.length) : 0;
    if (avg > 0) statLine.appendChild(h('span',{style:{color:'var(--warn)',fontWeight:700}},`平均EV: ${avg.toFixed(2)}`));
    p3.appendChild(statLine);
    
    const tbl=h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:'12px'}});
    const thead=h('thead');const tr=h('tr');
    ['買い目','オッズ','確率','EV','判定'].forEach(c=>{tr.appendChild(h('th',{style:{padding:'5px 3px',textAlign:c==='買い目'?'left':'right',borderBottom:'1px solid var(--bd)',color:'var(--tx3)',fontWeight:600}},c));});
    thead.appendChild(tr);tbl.appendChild(thead);
    const tbody=h('tbody');
    
    for(const item of allEV.slice(0, 20)){
      const evC=item.ev>=1.5?'var(--ok)':item.ev>=1.0?'var(--warn)':'var(--err)';
      const judge=item.ev>=2.0?'★ 超妙味':item.ev>=1.5?'◎ 妙味':item.ev>=1.0?'○ 買い':'△ 見送り';
      const row=h('tr',{style:{borderBottom:'1px solid var(--bd)',background:item.ev>=1.5?'rgba(48,192,96,0.04)':'transparent'}});
      const cc=h('td',{style:{padding:'4px 3px',display:'flex',alignItems:'center',gap:'1px'}});
      item.boats.forEach((n,j)=>{cc.appendChild(boatBadge(n,14));if(j<2)cc.appendChild(h('span',{style:{color:'var(--tx4)',fontSize:'10px'}},'-'));});
      row.appendChild(cc);
      row.appendChild(h('td',{style:{padding:'4px 3px',textAlign:'right',fontWeight:700,fontFamily:'JetBrains Mono,monospace'}},item.odd.toFixed(1)));
      row.appendChild(h('td',{style:{padding:'4px 3px',textAlign:'right',fontFamily:'JetBrains Mono,monospace'}},(item.prob*100).toFixed(1)+'%'));
      row.appendChild(h('td',{style:{padding:'4px 3px',textAlign:'right',fontWeight:800,color:evC,fontFamily:'JetBrains Mono,monospace'}},item.ev.toFixed(2)));
      row.appendChild(h('td',{style:{padding:'4px 3px',textAlign:'right',fontSize:'11px',color:evC,fontWeight:700}},judge));
      tbody.appendChild(row);
    }
    tbl.appendChild(tbody);
    p3.appendChild(h('div',{style:{overflowX:'auto'}},tbl));
    if(allEV.length > 20) p3.appendChild(h('div',{style:{fontSize:'11px',color:'var(--tx4)',marginTop:'4px',textAlign:'center'}},`上位20件を表示 / 全${allEV.length}通り`));
    wrap.appendChild(p3);
    
    // ── Panel 4: オッズ歪み検出 ──
    const p4 = h('div',{className:'panel'});
    p4.appendChild(h('div',{style:{fontSize:'14px',fontWeight:800,color:'var(--tx)',marginBottom:'4px'}},'📊 オッズ歪み検出'));
    p4.appendChild(h('div',{style:{fontSize:'11px',color:'var(--tx4)',marginBottom:'8px'}},'市場確率 vs AI確率の乖離が大きい目 = バリューチャンス'));
    
    // 控除率(25%)を考慮した市場確率を計算
    const totalInvOdds = allEV.reduce((s,c) => s + (c.odd > 0 ? 1/c.odd : 0), 0);
    const distortions = allEV.filter(c => c.odd > 0).map(item => {
      const marketProb = (1 / item.odd) / totalInvOdds; // 控除率正規化後
      const aiProb = item.prob;
      const gap = aiProb - marketProb; // 正=AIが高い=市場が過小評価（バリュー）
      return { ...item, marketProb, gap };
    }).sort((a,b) => b.gap - a.gap);
    
    // 最も過小評価されている目TOP5（バリュー候補）
    const valueTargets = distortions.filter(d => d.gap > 0.005).slice(0, 5);
    if (valueTargets.length > 0) {
      p4.appendChild(h('div',{style:{fontSize:'12px',fontWeight:700,color:'var(--ok)',marginBottom:'4px'}},'🎯 バリュー候補（AIが市場より高確率と判定）'));
      for (const vt of valueTargets) {
        const row = h('div',{style:{display:'flex',alignItems:'center',gap:'5px',padding:'3px 0',borderBottom:'1px solid var(--bd)',fontSize:'12px'}});
        const bd = h('span',{style:{display:'flex',gap:'1px'}});
        vt.boats.forEach(bn => bd.appendChild(boatBadge(bn, 13)));
        row.appendChild(bd);
        row.appendChild(h('span',{style:{color:'var(--tx3)',fontFamily:'JetBrains Mono,monospace',minWidth:'40px'}},`${vt.odd.toFixed(1)}倍`));
        row.appendChild(h('span',{style:{color:'var(--warn)',minWidth:'45px'}},`市場${(vt.marketProb*100).toFixed(1)}%`));
        row.appendChild(h('span',{style:{color:'var(--ok)',fontWeight:700,minWidth:'40px'}},`AI${(vt.prob*100).toFixed(1)}%`));
        const gapPct = (vt.gap * 100).toFixed(1);
        row.appendChild(h('span',{style:{color:'var(--ok)',fontWeight:800,fontSize:'11px'}},`+${gapPct}%↑`));
        p4.appendChild(row);
      }
    }
    
    // 最も過大評価されている目TOP3（罠候補）
    const trapTargets = distortions.filter(d => d.gap < -0.01).slice(-3).reverse();
    if (trapTargets.length > 0) {
      p4.appendChild(h('div',{style:{fontSize:'12px',fontWeight:700,color:'var(--err)',margin:'6px 0 4px'}},'⚠️ 過大評価（人気が集中しすぎ）'));
      for (const tt of trapTargets) {
        const row = h('div',{style:{display:'flex',alignItems:'center',gap:'5px',padding:'2px 0',fontSize:'11px',color:'var(--tx3)'}});
        const bd = h('span',{style:{display:'flex',gap:'1px'}});
        tt.boats.forEach(bn => bd.appendChild(boatBadge(bn, 12)));
        row.appendChild(bd);
        row.appendChild(h('span',null,`${tt.odd.toFixed(1)}倍`));
        row.appendChild(h('span',null,`市場${(tt.marketProb*100).toFixed(1)}% > AI${(tt.prob*100).toFixed(1)}%`));
        row.appendChild(h('span',{style:{color:'var(--err)',fontWeight:600}},`EV${tt.ev.toFixed(2)}`));
        p4.appendChild(row);
      }
    }
    
    wrap.appendChild(p4);
  }
  return wrap;
}

  // Payouts
  const payRow=h('div',{style:{marginTop:'8px',display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'4px'}});

    ));

  // AI Review
  if (result.hasResult && result.order.length >= 3) {

    if (!rv) wrap.appendChild(h('button', { className:'btn-ghost', style:{width:'100%',marginTop:'6px'}, onClick:()=>generateAIReview(result,entries,pred,venue,pv) }, '📝 AI振り返りを生成'));

    else if (rv.text) {

      if(sec.展開)rvCard.appendChild(h('div',{className:'review-text'},sec.展開));

      wrap.appendChild(rvCard);
    }
  }
  return wrap;
}

// ── 今日のインサイト（ルールベース自動生成） ──
// ── あなたの実績（作戦ボードで投票済みのレースのみ集計） ──
function _mp_userStats() {
  if (!state._board?.overrides) return null;
  const overrides = state._board.overrides;
  // 投票済みのレースを集計
  const betKeys = Object.entries(overrides).filter(([k,v]) => v.exec === 'bet').map(([k]) => k);
  if (betKeys.length === 0) return null;
  
  let total = 0, hits = 0, invested = 0, returned = 0;
  for (const key of betKeys) {
    const rs = state.rMap[key];
    if (!rs?.hasResult || rs.order.length < 3) continue;
    const frozen = state.pickStore[key];
    if (!frozen) continue;
    
    total++;
    const bet = frozen.totalBet || 0;
    invested += bet;
    
    const actualCombo = `${rs.order[0]}-${rs.order[1]}-${rs.order[2]}`;
    const useBets = frozen.bets || [];
    const hit = useBets.some(b => b.combo === actualCombo);
    if (hit) {
      hits++;
      const winBet = useBets.find(b => b.combo === actualCombo);
      if (winBet && rs.pay?.t3?.amount) {
        returned += Math.floor(rs.pay.t3.amount / 100 * winBet.betAmount);
      }
    }
  }
  
  if (total === 0) return null;
  
  const roi = invested > 0 ? Math.round(returned / invested * 1000) / 10 : 0;
  const profit = returned - invested;
  const hitRate = Math.round(hits / total * 1000) / 10;
  
  const card = h('div',{style:{marginBottom:'12px',padding:'10px 12px',borderRadius:'var(--r)',background:'rgba(48,192,96,0.04)',border:'1px solid rgba(48,192,96,0.1)'}});
  const hdr = h('div',{style:{display:'flex',alignItems:'center',gap:'6px',marginBottom:'6px'}});
  hdr.appendChild(h('span',{style:{fontSize:'13px',fontWeight:700,color:'var(--ok)'}},'👤 あなたの実績'));
  hdr.appendChild(h('span',{style:{fontSize:'10px',color:'var(--tx4)'}},`投票済み${total}R`));
  card.appendChild(hdr);
  
  const row = h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px',textAlign:'center'}});
  const addM = (v, l, c) => {
    const d = h('div',{});
    d.appendChild(h('div',{style:{fontSize:'16px',fontWeight:900,fontFamily:'JetBrains Mono,monospace',color:c}},v));
    d.appendChild(h('div',{style:{fontSize:'10px',color:'var(--tx4)'}},l));
    row.appendChild(d);
  };
  addM(`${roi}%`, '回収率', roi>=100?'var(--ok)':'var(--err)');
  addM(`${hits}/${total}`, '的中', 'var(--tx2)');
  addM(`${profit>=0?'+':''}¥${profit.toLocaleString()}`, '収支', profit>=0?'var(--ok)':'var(--err)');
  card.appendChild(row);
  return card;
}

function _mp_insights(stats) {
  const insights = [];
  const rs = stats.rankStats || {};
  
  // S判定の的中率
  if (rs.S && rs.S.t >= 2) {
    const sRate = Math.round(rs.S.h / rs.S.t * 100);
    if (sRate >= 40) insights.push({ icon:'🎯', text:`S判定 ${rs.S.h}/${rs.S.t}的中(${sRate}%) — 好調！`, color:'var(--ok)' });
    else if (sRate === 0 && rs.S.t >= 3) insights.push({ icon:'⚠️', text:`S判定 0/${rs.S.t}的中 — 荒れた日`, color:'var(--warn)' });
  }
  
  // ROI vs 的中率のバランス
  if (stats.hitRate >= 15 && stats.roi < 80) {
    insights.push({ icon:'💡', text:'的中率は悪くないが配当が低い → 穴狙いを検討', color:'var(--ac-t)' });
  } else if (stats.hitRate < 10 && stats.roi >= 100) {
    insights.push({ icon:'🔥', text:'少ない的中で高ROI → 高配当的中あり！', color:'var(--ok)' });
  } else if (stats.roi >= 120) {
    insights.push({ icon:'🏆', text:`ROI ${stats.roi}% — 素晴らしい成績！`, color:'var(--ok)' });
  }
  
  // ランク別の傾向
  if (rs.B && rs.B.t >= 3 && rs.B.h === 0 && rs.S && rs.S.h > 0) {
    insights.push({ icon:'📊', text:'B判定は全ハズレ → S/A集中が効果的', color:'var(--tx3)' });
  }
  if (rs.A && rs.A.t >= 3 && rs.A.h / rs.A.t > 0.3) {
    insights.push({ icon:'✨', text:`A判定も${Math.round(rs.A.h/rs.A.t*100)}%的中 — 安定`, color:'var(--ac-t)' });
  }
  
  // 全外しケース
  if (stats.total >= 5 && stats.hits === 0) {
    insights.push({ icon:'💪', text:'まだ的中なし — 荒れた日。次のレースに期待', color:'var(--tx3)' });
  }
  
  if (insights.length === 0) return null;
  
  const card = h('div',{style:{marginBottom:'12px',padding:'10px 12px',borderRadius:'var(--r)',background:'rgba(79,140,255,0.04)',border:'1px solid rgba(79,140,255,0.1)'}});
  card.appendChild(h('div',{style:{fontSize:'13px',fontWeight:700,marginBottom:'6px',color:'var(--ac-t)'}},'🎯 今日のインサイト'));
  for (const ins of insights.slice(0, 3)) {
    const row = h('div',{style:{fontSize:'13px',color:ins.color,padding:'3px 0',display:'flex',gap:'6px'}});
    row.appendChild(h('span',null,ins.icon));
    row.appendChild(h('span',null,ins.text));
    card.appendChild(row);
  }
  return card;
}

// ── 予測精度ダッシュボード ──
function _mp_accuracy(stats) {
  const allPicks = generateAllPicks();
  const finished = [];
  for (const p of allPicks) {
    const rk = `${p.venueId}-${p.raceNumber}`;
    const rs = state.rMap[rk];
    if (!rs?.hasResult || rs.order.length < 3) continue;
    const hitR = checkHit(p.venueId, p.raceNumber);
    if (!hitR) continue;
    finished.push({ rank: hitR.rank, hit: hitR.hit, order: rs.order, pred: p.pred });
  }
  if (finished.length < 5) return null;
  
  // ① パワーランク1位→実際1着率 / 3着内率
  let rank1to1st = 0, rank1to3rd = 0, predCount = 0;
  for (const f of finished) {
    if (!f.pred?.ranked) continue;
    predCount++;
    const top = f.pred.ranked[0];
    if (top.boat === f.order[0]) rank1to1st++;
    if (f.order.slice(0,3).includes(top.boat)) rank1to3rd++;
  }
  
  // ② TOP3完全カバー率
  let top3cover = 0;
  for (const f of finished) {
    if (!f.pred?.ranked || f.pred.ranked.length < 3) continue;
    const top3boats = f.pred.ranked.slice(0,3).map(r => r.boat);
    const actual3 = f.order.slice(0,3);
    if (top3boats.every(b => actual3.includes(b))) top3cover++;
  }
  
  // ③ 1着艇のコース分布
  const courseWins = [0,0,0,0,0,0]; // index 0=1C
  for (const f of finished) {
    const w = f.order[0];
    if (w >= 1 && w <= 6) courseWins[w-1]++;
  }
  
  const card = h('div',{className:'card',style:{marginTop:'8px'}});
  card.appendChild(h('div',{style:{fontSize:'14px',fontWeight:700,marginBottom:'10px'}},'📊 予測精度'));
  if (predCount < 10) card.appendChild(h('div',{style:{fontSize:'10px',color:'var(--tx4)',marginBottom:'6px'}},'※ 参考値（10R未満）'));
  
  // ① メトリクスグリッド
  const accGrid = h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'10px'}});
  const r1pct = predCount > 0 ? Math.round(rank1to1st / predCount * 100) : 0;
  const r1_3pct = predCount > 0 ? Math.round(rank1to3rd / predCount * 100) : 0;
  const t3pct = predCount > 0 ? Math.round(top3cover / predCount * 100) : 0;
  
  const addAcc = (label, val, goodThreshold) => {
    const box = h('div',{style:{padding:'8px',borderRadius:'var(--r-sm)',background:'var(--sf)',textAlign:'center'}});
    box.appendChild(h('div',{style:{fontSize:'10px',color:'var(--tx4)',marginBottom:'2px'}},label));
    box.appendChild(h('div',{style:{fontSize:'18px',fontWeight:900,fontFamily:'JetBrains Mono,monospace',color:val>=goodThreshold?'var(--ok)':'var(--tx2)'}},val+'%'));
    accGrid.appendChild(box);
  };
  addAcc('ランク1位→1着', r1pct, 25);
  addAcc('ランク1位→3着内', r1_3pct, 55);
  addAcc('TOP3カバー率', t3pct, 15);
  addAcc('的中率', stats.hitRate, 15);
  card.appendChild(accGrid);
  
  // ③ 1着コース分布バー
  card.appendChild(h('div',{style:{fontSize:'12px',fontWeight:600,color:'var(--tx3)',marginBottom:'4px'}},'1着コース分布'));
  const maxWin = Math.max(...courseWins, 1);
  const BOAT_COLORS = ['#fff','#000','#f44','#0a0','#fc0','#0af'];
  const barRow = h('div',{style:{display:'flex',gap:'3px',height:'32px',alignItems:'flex-end'}});
  for (let i = 0; i < 6; i++) {
    const pct = Math.round(courseWins[i] / finished.length * 100);
    const col = h('div',{style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'2px'}});
    col.appendChild(h('div',{style:{fontSize:'9px',color:'var(--tx4)',fontFamily:'JetBrains Mono,monospace'}},courseWins[i]>0?pct+'%':''));
    col.appendChild(h('div',{style:{width:'100%',height:Math.max(3, courseWins[i]/maxWin*20)+'px',borderRadius:'2px',background:BOAT_COLORS[i],opacity:0.7}}));
    col.appendChild(h('div',{style:{fontSize:'10px',fontWeight:700,color:'var(--tx3)'}},(i+1)+'C'));
    barRow.appendChild(col);
  }
  card.appendChild(barRow);
  
  return card;
}

function _mp_ledger() {
  const frag = h('div',{});
  frag.appendChild(h('div',{style:{fontSize:'16px',fontWeight:900,margin:'20px 0 10px',color:'#22c55e'}},'💰 収支管理'));
  frag.appendChild(h('div',{style:{fontSize:'16px',fontWeight:900,margin:'20px 0 10px',color:'#22c55e'}},'💰 収支管理'));
  const ledger = JSON.parse(localStorage.getItem('br-ledger') || '[]');
  const ledgerCard = h('div',{className:'card',style:{padding:'12px'}});
  
  // サマリーカード（常に表示）
  const totalBet = ledger.reduce((a,r) => a + r.bet, 0);
  const totalRet = ledger.reduce((a,r) => a + r.ret, 0);
  const profit = totalRet - totalBet;
  const roi = totalBet > 0 ? Math.round(totalRet / totalBet * 100) : 0;
  const hitCount = ledger.filter(r => r.ret > 0).length;
  const hitRate = ledger.length > 0 ? Math.round(hitCount / ledger.length * 100) : 0;
  
  // ミニKPI
  const kpiGrid = h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'6px',marginBottom:'10px'}});
  const addLK = (label, val, color) => {
    const box = h('div',{style:{textAlign:'center',padding:'8px 4px',background:'rgba(255,255,255,0.03)',borderRadius:'var(--r-sm)',border:'1px solid var(--bd)'}});
    box.appendChild(h('div',{style:{fontSize:'14px',fontWeight:900,color,fontFamily:'JetBrains Mono,monospace'}},val));
    box.appendChild(h('div',{style:{fontSize:'12px',color:'var(--tx4)',marginTop:'2px'}},label));
    kpiGrid.appendChild(box);
  };
  addLK('投資', `¥${totalBet.toLocaleString()}`, 'var(--tx2)');
  addLK('収支', `${profit>=0?'+':''}¥${profit.toLocaleString()}`, profit>=0?'var(--ok)':'var(--err)');
  addLK('ROI', `${roi}%`, roi>=100?'var(--ok)':roi>0?'var(--warn)':'var(--tx4)');
  ledgerCard.appendChild(kpiGrid);
  
  // 収支推移ミニチャート
  if (ledger.length >= 2) {
    const pts = []; let cum = 0;
    for (const r of ledger) { cum += (r.ret - r.bet); pts.push(cum); }
    const maxV = Math.max(Math.abs(Math.min(...pts, 0)), Math.abs(Math.max(...pts, 0)), 500);
    const cW = 280, cH = 50;
    let svg = `<svg viewBox="0 0 ${cW} ${cH}" width="100%" style="display:block;margin-bottom:10px">`;
    svg += `<rect width="${cW}" height="${cH}" fill="rgba(0,0,0,0.2)" rx="6"/>`;
    const midY = cH / 2;
    svg += `<line x1="0" y1="${midY}" x2="${cW}" y2="${midY}" stroke="var(--bd)" stroke-width="0.5" stroke-dasharray="4,3"/>`;
    const n = pts.length;
    let path = '';
    for (let i = 0; i < n; i++) { const x = 5 + i * (cW - 10) / (n - 1); const y = midY - (pts[i] / maxV) * (cH / 2 - 4); path += i === 0 ? `M${x} ${y}` : ` L${x} ${y}`; }
    // グラデーション塗りつぶし
    const lastY = midY - (pts[n-1] / maxV) * (cH / 2 - 4);
    const fillColor = cum >= 0 ? 'rgba(34,197,94,' : 'rgba(239,68,68,';
    svg += `<defs><linearGradient id="plg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${fillColor}0.15)"/><stop offset="100%" stop-color="${fillColor}0)"/></linearGradient></defs>`;
    svg += `<path d="${path} L${5+(n-1)*(cW-10)/(n-1)} ${midY} L5 ${midY} Z" fill="url(#plg)"/>`;
    svg += `<path d="${path}" fill="none" stroke="${cum>=0?'var(--ok)':'var(--err)'}" stroke-width="1.5"/>`;
    // 最終値マーカー
    svg += `<circle cx="${5+(n-1)*(cW-10)/(n-1)}" cy="${lastY}" r="3" fill="${cum>=0?'var(--ok)':'var(--err)'}"/>`;
    svg += '</svg>';
    const cd = h('div'); cd.innerHTML = svg; ledgerCard.appendChild(cd);
  }
  
  // 新規入力（アコーディオン風）
  const inputSection = h('div',{style:{borderTop:'1px solid var(--bd)',paddingTop:'10px'}});
  const inputTitle = h('div',{style:{fontSize:'14px',fontWeight:700,color:'var(--tx3)',marginBottom:'8px',display:'flex',alignItems:'center',gap:'4px'}});

  const betWrap = h('div');
  betWrap.appendChild(h('label',{style:{fontSize:'12px',color:'var(--tx4)',marginBottom:'2px',display:'block'}},'購入額'));
  const inpBet = h('input',{type:'number',placeholder:'¥ 1,000',style:inputStyle});
  betWrap.appendChild(inpBet);
  formGrid.appendChild(betWrap);
  
  const retWrap = h('div');
  retWrap.appendChild(h('label',{style:{fontSize:'12px',color:'var(--tx4)',marginBottom:'2px',display:'block'}},'払戻額'));
  const inpRet = h('input',{type:'number',placeholder:'¥ 0',style:inputStyle});
  retWrap.appendChild(inpRet);
  formGrid.appendChild(retWrap);
  inputSection.appendChild(formGrid);

  const inpMemo = h('input',{type:'text',placeholder:'場名 R番号（例: 鳴門 10R）',style:{...inputStyle,flex:1}});
  memoRow.appendChild(inpMemo);
  const saveBtn = h('button',{className:'btn-primary',style:{padding:'8px 16px',fontSize:'14px',fontWeight:700,whiteSpace:'nowrap',borderRadius:'var(--r-sm)'},onClick:()=>{
    const bet=parseInt(inpBet.value)||0;const ret=parseInt(inpRet.value)||0;
    if(bet<=0)return;
    ledger.push({date:getDateStr(),bet,ret,memo:inpMemo.value||'',ts:Date.now()});
    localStorage.setItem('br-ledger',JSON.stringify(ledger));
    render();
  }},'💾 記録');
  memoRow.appendChild(saveBtn);
  inputSection.appendChild(memoRow);
  ledgerCard.appendChild(inputSection);
  
  // 直近の記録一覧
  if (ledger.length > 0) {

          const pts = e.sesResults.filter(r => r.rank <= 6).map(r => [10,8,6,4,2,1][r.rank-1] || 0);

          allEntries.push({ name: e.name, cls: e.cls, bn: e.boatNumber, regNo: e.regNo, wr: e.wr, st: e.st, mdr: e.mdr, bdr: e.bdr, sesScore, wins, races: e.sesResults.length, avgCourse, raceNo: race.number, hasSes: true });
        } else {

        }
      }
    }
    const seen = {}; const unique = [];
    const sorted = allEntries.sort((a,b) => { if (a.hasSes !== b.hasSes) return a.hasSes ? -1 : 1; return b.sesScore - a.sesScore; });
    for (const e of sorted) { if (!seen[e.regNo]) { seen[e.regNo] = true; unique.push(e); } }
    if (state._venueRankSort === 'wins') unique.sort((a,b) => (b.hasSes?1:0)-(a.hasSes?1:0) || b.wins - a.wins || b.sesScore - a.sesScore);
    else if (state._venueRankSort === 'wr') unique.sort((a,b) => (b.wr||0) - (a.wr||0));
    else unique.sort((a,b) => (b.hasSes?1:0)-(a.hasSes?1:0) || b.sesScore - a.sesScore);
    
    if (unique.length === 0) {
      frag.appendChild(h('div',{style:{textAlign:'center',padding:'16px',color:'var(--tx4)',fontSize:'14px'}},'レースデータを読み込み中...'));
    } else {
