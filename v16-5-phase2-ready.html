// ── Hit Rate & ROI Calculator ──
function calcStats(venueId) {
  // venueId: null=全場, number=特定場
  const targetVenues = venueId != null 
    ? state.venues.filter(v => v.id === venueId)
    : state.venues;
  let total = 0, hits = 0, invested = 0, returned = 0;
  
  for (const venue of targetVenues) {
    for (const race of venue.races) {
      const key = `${venue.id}-${race.number}`;
      const rs = state.rMap[key];
      if (!rs || !rs.hasResult || rs.order.length < 3) continue;
      
      const pv = state.pvMap[key] || null;
      const pred = predict(race.entries, pv, venue.id);
      if (!pred) continue;
      
      total++;
      const actualCombo = `${rs.order[0]}-${rs.order[1]}-${rs.order[2]}`;
      const betCount = pred.combos.length;
      
      // Use budget-proportional allocation if odds available, else flat 100円
      const budget = state.betBudget || 3000;
      invested += budget;
      
      if (pred.combos.includes(actualCombo)) {
        hits++;
        if (rs.pay && rs.pay.t3.amount > 0) {
          // Estimate our actual return based on proportional allocation
          // Our bet on winning combo = budget / (odds * invSum) rounded to 100
          // Actual return = betAmount * odds
          returned += rs.pay.t3.amount;
        }
      }
    }
  }
  
  return {
    total, hits,
    hitRate: total > 0 ? Math.round(hits / total * 1000) / 10 : 0,
    roi: invested > 0 ? Math.round(returned / invested * 1000) / 10 : 0,
    invested, returned,
  };
}

// ── Odds Fetching ──
async function fetchLiveOdds(sid, rno) {
  const key = `odds-${sid}-${rno}`;
  // TTLCache: オッズは3分TTL
  const cached = cacheOdds.get(key);
  if (cached) return cached;
  try {
    const url = `${BOATRACE_JP}odds3t?rno=${rno}&jcd=${jcd(sid)}&hd=${getDateStr()}`;
    /* console.log(`[EDGE-LIVE] Fetching odds: ${url}`); */
    const html = await fetchViaProxy(url);
    if (!html) { console.warn('[EDGE-LIVE] No proxy for odds'); return null; }
    const data = parseLiveOdds(html);
    if (data && Object.keys(data).length > 10) {
      data._ts = Date.now();
      data._fetchedAt = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
      cacheOdds.set(key, data);
      liveCache[key] = data;
      const ok2 = `${sid}-${rno}`;
      state.oddsCache[ok2] = data;
      state.oddsMeta = state.oddsMeta || {};
      state.oddsMeta[ok2] = { fetchedAt: data._fetchedAt, ts: data._ts };
      // ═══ v16.3: オッズ取得完了 → pick確定 ═══
      freezePick(sid, rno, 'odds');
      /* console.log(`[EDGE-LIVE] Odds OK: ${Object.keys(data).length */
    }
    return data;
  } catch(e) {
    console.warn('[EDGE-LIVE] Odds fetch failed:', e.message);
    return null;
  }
}

function parseLiveOdds(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const odds = {};
  const toH = s => (s||'').replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
  
  // odds3t table structure (6 columns, one per 1st-place boat):
  // Header row: [1] [name] [2] [name] [3] [name] [4] [name] [5] [name] [6] [name]
  // Data rows (5 groups of 4 rows each, for 2nd=other 5 boats):
  //   Row 1: [2nd] [3rd] [odds]  [2nd] [3rd] [odds]  ... (×6 cols)
  //   Row 2:       [3rd] [odds]        [3rd] [odds]  ... (2nd inherited)
  //   Row 3:       [3rd] [odds]        [3rd] [odds]  ...
  //   Row 4:       [3rd] [odds]        [3rd] [odds]  ...
  
  // Most reliable: find the odds table and iterate td elements with class/structure
  // Boatrace.jp uses specific CSS classes for odds cells
  
  // Strategy: extract all tds from the main odds table,
  // then parse the 6-column × 20-row grid
  
  const allTables = doc.querySelectorAll('table');
  let oddsTable = null;
  
  for (const t of allTables) {
    const text = t.textContent || '';
    // The odds table contains many decimal numbers
    const decCount = (text.match(/\d+\.\d/g) || []).length;
    if (decCount > 20) {
      oddsTable = t;
      break;
    }
  }
  
  if (!oddsTable) {
    // Fallback: text-based extraction
    const bodyText = toH(doc.body?.textContent || '');
    const section = bodyText.slice(bodyText.indexOf('3連単オッズ'));
    if (section) {
      // Extract triplets: [boat][boat][odds_value]
      const re = /\b([1-6])\s+([1-6])\s+([\d,]+\.?\d*)\b/g;
      let m, first = 0;
      const lines = section.split(/\n/);
      for (const line of lines) {
        // Detect 1st place header (single digit followed by name)
        const hdr = line.match(/^\s*([1-6])\s+[^\d]/);
        if (hdr) first = parseInt(hdr[1]);
      }
    }
    /* console.log(`[EDGE-LIVE] Parsed ${Object.keys(odds).length}  */
    return odds;
  }
  
  // Parse the odds table
  const rows = oddsTable.querySelectorAll('tr');
  const firsts = [1, 2, 3, 4, 5, 6]; // 1st place boats (columns)
  
  // Find data rows (skip header)
  let dataRows = [];
  for (const row of rows) {
    const tds = row.querySelectorAll('td');
    if (tds.length === 0) continue;
    
    // Check if this is a data row (contains odds values)
    let hasOdds = false;
    for (const td of tds) {
      const t = toH(td.textContent.trim());
      if (/^\d+\.\d+$/.test(t) || /^\d{3,5}$/.test(t.replace(/,/g,''))) {
        hasOdds = true;
        break;
      }
    }
    if (hasOdds) dataRows.push(row);
  }
  
  // Parse data rows
  // Each row has 6 groups (one per 1st-place boat)
  // Group can be: [2nd][3rd][odds] or [3rd][odds]
  let currentSeconds = [0, 0, 0, 0, 0, 0]; // track 2nd for each column
  
  for (const row of dataRows) {
    const tds = row.querySelectorAll('td');
    const cells = [];
    for (const td of tds) {
      const text = toH(td.textContent.trim()).replace(/,/g, '');
      const rs = td.getAttribute('rowspan');
      cells.push({ text, rowspan: rs ? parseInt(rs) : 0 });
    }
    
    // Parse cells into 6-column groups
    let ci = 0; // cell index
    for (let col = 0; col < 6; col++) {
      if (ci >= cells.length) break;
      const first = firsts[col];
      
      let second, third, oddsVal;
      
      // Check if first cell has rowspan (= new 2nd place)
      if (cells[ci].rowspan >= 2 && /^[1-6]$/.test(cells[ci].text)) {
        second = parseInt(cells[ci].text);
        currentSeconds[col] = second;
        ci++;
        if (ci < cells.length && /^[1-6]$/.test(cells[ci].text)) {
          third = parseInt(cells[ci].text);
          ci++;
          if (ci < cells.length) {
            oddsVal = parseFloat(cells[ci].text);
            ci++;
          }
        }
      } else if (/^[1-6]$/.test(cells[ci].text)) {
        // Could be 2nd (no rowspan) or 3rd
        const bn = parseInt(cells[ci].text);
        ci++;
        if (ci < cells.length) {
          const next = cells[ci].text;
          const nextVal = parseFloat(next);
          if (nextVal >= 1.0 && (/\./.test(next) || nextVal >= 100)) {
            // bn is 3rd, next is odds
            third = bn;
            second = currentSeconds[col];
            oddsVal = nextVal;
            ci++;
          } else if (/^[1-6]$/.test(next)) {
            // bn is 2nd, next is 3rd
            second = bn;
            currentSeconds[col] = second;
            third = parseInt(next);
            ci++;
            if (ci < cells.length) {
              oddsVal = parseFloat(cells[ci].text);
              ci++;
            }
          }
        }
      } else {
        ci++;
        continue;
      }
      
      if (first && second && third && oddsVal > 0 &&
          first !== second && first !== third && second !== third) {
        odds[`${first}-${second}-${third}`] = oddsVal;
      }
    }
  }
  
  /* console.log(`[EDGE-LIVE] Parsed ${Object.keys(odds).length}  */
  return odds;
}

// ── Synthetic Odds / Smart Bet Builder ──
function buildSmartBets(pred, odds, targetSyntheticOdds, budget) {
  if (!pred || !odds || !targetSyntheticOdds) return null;
  budget = budget || 3000;
  
  // Step 1: 全120通りの3連単を確率・EVで評価
  const allCombos = [];
  for (let a = 1; a <= 6; a++)
    for (let b = 1; b <= 6; b++)
      for (let c = 1; c <= 6; c++) {
        if (a === b || b === c || a === c) continue;
        const combo = `${a}-${b}-${c}`;
        const odd = odds[combo];
        if (!odd || odd <= 0) continue;
        
        let prob;
        if (pred.trifectaProbs && pred.trifectaProbs[combo]) {
          prob = pred.trifectaProbs[combo];
        } else {
          const pa = pred.probs[a-1] || 0;
          const pb = pred.probs[b-1] || 0;
          const pc = pred.probs[c-1] || 0;
          prob = (pa / 100) * (pb / (100 - pa)) * (pc / (100 - pa - pb));
        }
        prob = Math.max(prob, 0.001);
        const ev = prob * odd;
        allCombos.push({ combo, odd, prob, ev });
      }
  
  if (allCombos.length === 0) return null;
  
  // Step 2: 投資スタイルに応じた選択ロジック（1着固定流し優先）
  // バックテスト実証: 1着固定流しはTOP3均等より+12pt ROI改善
  const axis1 = pred.ranked?.[0]?.boat;
  let pool;
  
  // まず1着固定（axis1が1着）の目を優先抽出
  const axisPool = axis1 ? allCombos.filter(c => c.combo.startsWith(axis1 + '-')) : [];
  
  if (targetSyntheticOdds <= 5) {
    // 手堅く: 1着固定でオッズ低い順
    pool = axisPool.filter(c => c.ev >= 0.3).sort((a, b) => a.odd - b.odd);
    if (pool.length < 3) pool = allCombos.filter(c => c.ev >= 0.3).sort((a, b) => a.odd - b.odd);
  } else if (targetSyntheticOdds <= 15) {
    // バランス: 1着固定でEV>=0.8
    pool = axisPool.filter(c => c.ev >= 0.8).sort((a, b) => a.odd - b.odd);
    // 不足なら裏目も追加
    if (pool.length < 3) {
      const counterPool = allCombos.filter(c => c.ev >= 0.8 && !c.combo.startsWith(axis1 + '-')).sort((a, b) => a.odd - b.odd);
      pool = [...pool, ...counterPool];
    }
    if (pool.length < 3) pool = allCombos.filter(c => c.ev >= 0.5).sort((a, b) => a.odd - b.odd);
  } else {
    // 穴狙い: 1着固定でEV上位＋高オッズ
    const high = axisPool.filter(c => c.ev >= 0.5 && c.odd >= 15).sort((a, b) => b.ev - a.ev);
    pool = high.length >= 3 ? high : allCombos.filter(c => c.ev >= 0.5 && c.odd >= 15).sort((a, b) => b.ev - a.ev);
    if (pool.length < 3) pool = allCombos.filter(c => c.ev >= 0.5).sort((a, b) => b.ev - a.ev);
  }
  
  if (pool.length === 0) pool = allCombos.sort((a, b) => a.odd - b.odd);
  
  // Step 3: 合成オッズが目標に達するまで追加
  const selected = [];
  for (const c of pool) {
    selected.push(c);
    const invSum = selected.reduce((s, x) => s + 1 / x.odd, 0);
    const synOdds = 1 / invSum;
    if (synOdds <= targetSyntheticOdds) break;
    if (selected.length >= 30) break;
  }
  
  if (selected.length === 0) return null;
  
  // Step 4: EV順にソート（表示用）
  selected.sort((a, b) => b.ev - a.ev);
  
  // Step 5: 均等回収方式で金額配分
  const invSum = selected.reduce((s, c) => s + 1 / c.odd, 0);
  const actualSynOdds = Math.round(1 / invSum * 10) / 10;
  
  const rawBets = selected.map(c => ({
    ...c,
    rawAmount: budget / (c.odd * invSum),
  }));
  
  // 100円単位で丸め（最低100円）
  const bets = rawBets.map(b => {
    const rounded = Math.max(100, Math.round(b.rawAmount / 100) * 100);
    return {
      ...b,
      betAmount: rounded,
      returnIfHit: Math.round(b.odd * rounded),
    };
  });
  
  const totalBet = bets.reduce((s, b) => s + b.betAmount, 0);
  const minReturn = Math.min(...bets.map(b => b.returnIfHit));
  const maxReturn = Math.max(...bets.map(b => b.returnIfHit));
  const realSynOdds = Math.round(minReturn / totalBet * 10) / 10;
  const expectedROI = bets.reduce((s, b) => s + b.prob * b.returnIfHit, 0) / totalBet * 100;
  
  const avgEV = selected.reduce((s,c) => s+c.ev, 0) / selected.length;
  
  return {
    bets,
    count: bets.length,
    totalBet,
    syntheticOdds: realSynOdds > 0 ? realSynOdds : actualSynOdds,
    expectedROI: Math.round(expectedROI),
    minReturn,
    maxReturn,
    budget,
    avgEV: Math.round(avgEV * 100) / 100,
    hasLowEV: avgEV < 1.0,
  };
}

// v16.4: localStorage永続化
function savePickStore() {
  try {
    const dateKey = `br-picks-${getDateStr()}`;
    const data = {};
    for (const [k, v] of Object.entries(state.pickStore)) {
      // pred（大きい）は省略して軽量化
      data[k] = { ...v, pred: undefined };
    }
    localStorage.setItem(dateKey, JSON.stringify(data));
  } catch(e) { console.warn('savePickStore:', e); }
}

function loadPickStore() {
  try {
    const dateKey = `br-picks-${getDateStr()}`;
    const raw = localStorage.getItem(dateKey);
    if (raw) {
      const data = JSON.parse(raw);
      for (const [k, v] of Object.entries(data)) {
        if (!state.pickStore[k]) state.pickStore[k] = v;
      }
    }
  } catch(e) { console.warn('loadPickStore:', e); }
}

// 日次サマリーの自動保存
function saveDailySummary() {
  try {
    // 問題5修正: 過去日表示中は保存しない（不正確なデータで上書きを防止）
    if (getDateStr() !== getTodayStr()) return;
    
    const log = JSON.parse(localStorage.getItem('br-daily-log') || '[]');
    const today = getDateStr();
    
    const picks = generateAllPicks();
    const finished = picks.filter(p => {
      const rs = state.rMap[`${p.venueId}-${p.raceNumber}`];
      return rs?.hasResult && p.rank !== 'D';
    });
    // 問題2修正: 1R以上あれば保存（8%閾値戦略で1-2R/日を記録するため）
    if (finished.length < 1) return;
    
    let totalBet = 0, totalRet = 0, hits = 0, total = finished.length;
    let pending = 0; // payout未確定のレース数
    for (const p of finished) {
      const key = `${p.venueId}-${p.raceNumber}`;
      // 問題3修正: pickStoreのfrozenを優先（calcAIStatsと同じロジック）
      const frozen = state.pickStore[key];
      totalBet += frozen?.totalBet || p.totalBet || 0;
      
      const hr = checkHit(p.venueId, p.raceNumber);
      if (hr?.hit) {
        hits++;
        if (hr.payout != null && hr.payout > 0) {
          totalRet += hr.payout;
        } else {
          pending++; // 問題1対応: payout未確定を記録
        }
      }
    }
    
    const entry = {
      date: today, total, hits,
      bet: totalBet, ret: totalRet,
      roi: totalBet > 0 ? Math.round(totalRet / totalBet * 100) : 0,
      profit: totalRet - totalBet,
      avgHitPay: hits > 0 ? Math.round(totalRet / Math.max(hits - pending, 1)) : 0,
      avgBet: total > 0 ? Math.round(totalBet / total) : 0,
      pending, // payout未確定の的中数
      ts: Date.now()
    };
    
    // 同日のエントリを上書き（なければ追加）
    const idx = log.findIndex(d => d.date === today);
    if (idx >= 0) log[idx] = entry;
    else log.push(entry);
    
    // 90日分だけ保持
    while (log.length > 90) log.shift();
    localStorage.setItem('br-daily-log', JSON.stringify(log));
  } catch(e) { console.warn('saveDailySummary:', e); }
}

function freezePick(venueId, raceNo, source) {
  const key = `${venueId}-${raceNo}`;
  if (state.pickStore[key]) return; // 既にfreeze済み → 上書きしない
  
  const venue = state.venues.find(v => v.id === venueId);
  const race = venue?.races?.find(r => r.number === raceNo);
  if (!race || !venue) return;
  
  const pv = state.pvMap[key] || null;
  const result = state.rMap[key] || null;
  const pick = generateAIPick(race, venue, pv, result);
  if (!pick) return;
  if (pick.rank === 'D') return; // D判定はfreeze不要（見送り）
  
  state.pickStore[key] = {
    rank: pick.rank,
    bets: pick.bets || [],
    combos: pick.combos || [],
    totalBet: pick.totalBet,
    betStrategy: pick.betStrategy,
    confidence: pick.confidence,
    usedOdds: pick.usedOdds || false,
    pred: pick.pred,
    analysis: pick.analysis,
    reasons: pick.reasons,
    frozenAt: new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'}),
    source: source || 'unknown',
    venueId, raceNumber: raceNo,
    venueName: venue.name,
    raceName: race.name,
  };
  savePickStore();
}

function refreezePickAction(venueId, raceNo) {
  const key = `${venueId}-${raceNo}`;
  const rs = state.rMap[key];
  if (rs?.hasResult) return; // 結果が出ていたら再freeze不可
  delete state.pickStore[key];
  state._picksCache = null; state._picksCacheKey = null;
  freezePick(venueId, raceNo, 'reanalyze');
  render();
}

function checkHit(venueId, raceNo) {
  const key = `${venueId}-${raceNo}`;
  const rs = state.rMap[key];
  if (!rs?.hasResult || rs.order.length < 3) return null;
  
  const actual = `${rs.order[0]}-${rs.order[1]}-${rs.order[2]}`;
  const frozen = state.pickStore[key];
  
  if (frozen) {
    if (frozen.rank === 'D') return null;
    const hit = frozen.bets.some(b => b.combo === actual);
    let payout = 0;
    if (hit && rs.pay?.t3?.amount > 0) {
      const winBet = frozen.bets.find(b => b.combo === actual);
      if (winBet) payout = Math.floor(rs.pay.t3.amount / 100 * winBet.betAmount);
    } else if (hit) {
      // 問題1修正: 配当情報欠損時、oddsキャッシュからpayoutを推定
      const oddsData = state.oddsCache[key];
      if (oddsData) {
        const winBet = frozen.bets.find(b => b.combo === actual);
        if (winBet) {
          const comboKey = actual.replace(/-/g, '');
          const odds = oddsData[comboKey] || oddsData[actual];
          if (odds && odds > 0) {
            payout = Math.floor(odds * winBet.betAmount);
          }
        }
      }
      // オッズもなければpayout=0のまま（後から結果再取得時に上書きされる）
    }
    return {
      hit, actual, rank: frozen.rank, totalBet: frozen.totalBet,
      frozenAt: frozen.frozenAt, bets: frozen.bets, payout,
    };
  }
  
  // フォールバック: pickStoreにない場合はgenerateAllPicksから検索
  const picks = generateAllPicks();
  const pick = picks.find(p => p.venueId === venueId && p.raceNumber === raceNo);
  if (!pick || pick.rank === 'D') return null;
  
  const hitFb = (pick.bets || []).some(b => b.combo === actual);
  let payoutFb = 0;
  if (hitFb && rs.pay?.t3?.amount > 0) {
    const winBet = (pick.bets || []).find(b => b.combo === actual);
    if (winBet) payoutFb = Math.floor(rs.pay.t3.amount / 100 * winBet.betAmount);
  } else if (hitFb) {
    const oddsData = state.oddsCache[key];
    if (oddsData) {
      const winBet = (pick.bets || []).find(b => b.combo === actual);
      if (winBet) {
        const comboKey = actual.replace(/-/g, '');
        const odds = oddsData[comboKey] || oddsData[actual];
        if (odds && odds > 0) payoutFb = Math.floor(odds * winBet.betAmount);
      }
    }
  }
  return {
    hit: hitFb, actual, rank: pick.rank, totalBet: pick.totalBet,
    frozenAt: null, bets: pick.bets || [], payout: payoutFb,
  };
}

function getPickForDisplay(race, venue, pv, result) {
  const key = `${venue.id}-${race.number}`;
  const frozen = state.pickStore[key];
  if (frozen) {
    return { ...frozen, isFrozen: true };
  }
  const pick = generateAIPick(race, venue, pv, result);
  if (!pick) return null;
  return { ...pick, isFrozen: false, venueId: venue.id, raceNumber: race.number, venueName: venue.name, raceName: race.name };
}

注意:「通算勝率」と「AI予測1着確率」は別物。混同しないこと。通算勝率は選手の実績、AI予測は本レースの予測値。
${vName}(${vClass}) ${vGrade||'一般'} ${raceNo}R 風${wind}m 波${wave}cm 荒${chaos.score}
${raceInfo}`;

function generateAIPick(race, venue, pv, result) {
  const entries = race.entries;
  if (!entries || entries.length < 6) return null;
  
  const traits = VENUE_TRAITS[venue.id];
  const pred = predict(entries, pv, venue.id, race.grade);
  if (!pred) return null;
  
  // ═══ v16.3: 1M後予測でtrifectaProbsを補正（ビジュアルと買い目の整合性確保）═══
  if (pred.trifectaProbs && Object.keys(pred.trifectaProbs).length > 0) {
    try {
      const fm = predictFormation(race, venue, pv, pred);
      if (fm.positions1M && fm.positions1M.length >= 3) {
        // 1M後のadvantage順位から各艇のブースト倍率を計算
        const advBoost = {}; // boat → boost multiplier
        for (let i = 0; i < fm.positions1M.length; i++) {
          const p = fm.positions1M[i];
          // 上位ほど高いブースト（1位=1.4, 2位=1.2, 3位=1.1, 4位以下=0.85-0.95）
          if (i === 0) advBoost[p.bn] = 1.4;
          else if (i === 1) advBoost[p.bn] = 1.2;
          else if (i === 2) advBoost[p.bn] = 1.1;
          else if (i === 3) advBoost[p.bn] = 0.95;
          else advBoost[p.bn] = 0.85;
        }
        // trifectaProbsの各組み合わせを1M後順位でブースト
        for (const k of Object.keys(pred.trifectaProbs)) {
          const [a, b, c] = k.split('-').map(Number);
          const boost = (advBoost[a] || 1) * (advBoost[b] || 1) * (advBoost[c] || 1);
          pred.trifectaProbs[k] *= boost;
        }
        // 再正規化
        const total = Object.values(pred.trifectaProbs).reduce((s, v) => s + v, 0);
        if (total > 0) {
          for (const k of Object.keys(pred.trifectaProbs)) pred.trifectaProbs[k] /= total;
        }
      }
    } catch(e) { /* formation計算失敗時はスキップ */ }
  }
  
  const ranked = pred.ranked;
  const gap = pred.gap;
  
  // ── 分析要素の収集 ──
  const analysis = {};
  
  const boat1 = entries.find(e => e.boatNumber === 1);
  const boat1Rank = ranked.findIndex(r => r.boat === 1);
  analysis.boat1Top = boat1Rank === 0;
  
  const c1win = traits ? traits.c1win : 55;
  analysis.inStrong = c1win >= 60; // 60%以上のみ「強いイン場」（厳密に）
  analysis.inWeak = c1win <= 48;
  const venueDiff = traits ? traits.diff : '★★';
  const diffLevel = (venueDiff.match(/★/g) || []).length;
  analysis.difficult = diffLevel >= 4;
  analysis.easy = diffLevel <= 2;
  
  analysis.hasPreview = pv != null && pv.entries && pv.entries.length > 0;
  analysis.hasExT = analysis.hasPreview && pv.entries.some(e => e.exT != null);
  
  analysis.wind = pv ? pv.wind : null;
  analysis.windDir = pv ? pv.windDir : 0;
  analysis.wave = pv ? pv.wave : null;
  analysis.headWind = analysis.windDir >= 3 && analysis.windDir <= 5;
  analysis.strongWind = analysis.wind && analysis.wind >= 4;
  analysis.roughWater = analysis.wave && analysis.wave >= 3;
  
  let exTimes = {};
  if (pv && pv.entries) {
    for (const pe of pv.entries) {
      if (pe.exT) exTimes[pe.bn] = pe.exT;
    }
  }
  const exVals = Object.values(exTimes);
  const bestExT = exVals.length > 0 ? Math.min(...exVals) : null;
  const exRange = exVals.length > 0 ? Math.max(...exVals) - Math.min(...exVals) : 0;
  analysis.motorGap = exRange > 0.15;
  
  const classes = entries.map(e => e.cls);
  const a1Count = classes.filter(c => c === 'A1').length;
  const b2Count = classes.filter(c => c === 'B2').length;
  analysis.mixedClass = a1Count >= 1 && b2Count >= 1; // A級+B2混在
  analysis.allA = a1Count >= 4;
  
  const topBoat = ranked[0].boat;
  analysis.topIsInner = topBoat <= 2;
  analysis.topIsOuter = topBoat >= 4;
  
  const topEntry = entries.find(e => e.boatNumber === topBoat);
  analysis.topHasGoodMotor = topEntry && (topEntry.mdr || 30) >= 40;
  analysis.topWr = topEntry ? (topEntry.wr || 0) : 0;
  
  // ── 「予測しやすさ」スコア（旧confidence）──
  let predictability = 0;
  const reasons = [];
  
  // パワーギャップ（実力差が明確なほど予測しやすい）
  if (gap >= 2.0) { predictability += 3; reasons.push({type:'positive', text:`${ranked[0].boat}号艇(${ranked[0].name})が圧倒的パワー（2位との差:${gap}）`}); }
  else if (gap >= 1.0) { predictability += 2; reasons.push({type:'positive', text:`上位と下位の実力差が明確（差:${gap}）`}); }
  else if (gap >= 0.5) { predictability += 1; reasons.push({type:'neutral', text:`パワー差は中程度（差:${gap}）。展開次第`}); }
  else { predictability -= 1; reasons.push({type:'negative', text:`実力拮抗（パワー差:${gap}）。着順が読みにくい`}); }
  
  // イン+1号艇が強いレースは「堅い＝配当安い」
  let likelyFormation = false; // 本命決着になりそうか
  if (analysis.boat1Top && analysis.inStrong) {
    predictability += 2;
    likelyFormation = true;
    reasons.push({type:'positive', text:`1号艇${boat1.name}(${boat1.cls})がパワー1位 × イン率${c1win}%の場 → 本命展開`});
    reasons.push({type:'warning', text:`⚡ ただし本命決着は配当が安い。投資額を抑えて点数を絞る`});
  } else if (analysis.boat1Top) {
    predictability += 1;
    reasons.push({type:'positive', text:`1号艇がパワーランク1位（イン率${c1win}%）`});
  } else if (analysis.topIsOuter) {
    reasons.push({type:'neutral', text:`パワー1位が${topBoat}号艇（外枠）。波乱含みだが当たれば高配当`});
  }
  
  // 場の難易度
  if (analysis.difficult) {
    predictability -= 1;
    reasons.push({type:'negative', text:`${venue.name}は難水面（難易度${venueDiff}）。予想が崩れやすい`});
  } else if (analysis.easy && analysis.boat1Top) {
    predictability += 1;
  }
  
  // 展示情報
  if (analysis.hasExT) {
    if (analysis.motorGap && exTimes[topBoat] === bestExT) {
      predictability += 2;
      reasons.push({type:'positive', text:`${ranked[0].boat}号艇が展示タイム最速(${bestExT.toFixed(2)})。データと機力が一致`});
    } else if (analysis.motorGap) {
      predictability += 1;
      reasons.push({type:'neutral', text:`展示タイム差あり(${exRange.toFixed(2)}秒差)だがパワー1位と最速艇が異なる`});
    } else {
      reasons.push({type:'neutral', text:`展示タイム横一線(差${exRange.toFixed(2)}秒)。スタート勝負`});
    }
  } else {
    predictability -= 1;
    reasons.push({type:'negative', text:'展示データ未取得。データ不足で予測精度低い'});
  }
  
  // 気象条件
  if (analysis.strongWind && analysis.headWind) {
    predictability -= 2;
    reasons.push({type:'negative', text:`向かい風${analysis.wind}m。イン不利＋荒れ水面で予測困難`});
  } else if (analysis.roughWater) {
    predictability -= 1;
    reasons.push({type:'negative', text:`波高${analysis.wave}cm。水面荒れで展開が読みにくい`});
  } else if (analysis.wind != null && analysis.wind <= 2) {
    predictability += 1;
    reasons.push({type:'positive', text:'穏やかな水面。実力通りの結果が出やすい'});
  }
  
  // クラス混成
  if (analysis.mixedClass) {
    predictability += 1;
    reasons.push({type:'positive', text:`A級とB2級が混在 → 実力差が明確で予測しやすい`});
  } else if (analysis.allA) {
    predictability -= 1;
    reasons.push({type:'negative', text:`A級${a1Count}人のハイレベル戦。拮抗して荒れやすい`});
  }
  
  // モーター
  if (analysis.topHasGoodMotor) {
    predictability += 1;
    reasons.push({type:'positive', text:`${topBoat}号艇のモーター2連率${topEntry.mdr}% → 機力の裏付けあり`});
  }
  
  // コース別成績（枠番勝率）
  if (topEntry?.courseStats) {
    const topCourse = ranked[0].course;
    const csTop = topEntry.courseStats[topCourse];
    if (csTop && csTop.top3Rate >= 60) {
      predictability += 1;
      reasons.push({type:'positive', text:`${topBoat}号艇は${topCourse}Cで3連対率${csTop.top3Rate.toFixed(0)}% → コース適性も裏付け`});
    } else if (csTop && csTop.top3Rate <= 20 && csTop.entryRate >= 10) {
      predictability -= 1;
      reasons.push({type:'negative', text:`${topBoat}号艇は${topCourse}Cで3連対率${csTop.top3Rate.toFixed(0)}% → コース適性に不安`});
    }
  }
  
  // ── 「配当妙味」スコア（v10b: 大幅強化）──
  // データ検証: 本命レースはROI 33.7%、穴レースはROI 214.9%
  // → 配当妙味のペナルティ/ボーナスを強化
  let valueScore = 0;
  
  // 堅いレースのペナルティを大幅強化
  if (likelyFormation && analysis.inStrong && boat1 && boat1.cls === 'A1') {
    valueScore -= 3; // v10b: -1→-3 超堅い本命は大幅マイナス
    reasons.push({type:'warning', text:`配当妙味:低。イン率${c1win}%×A1級1号艇 → 配当1000-2000円台`});
  } else if (likelyFormation && analysis.inStrong) {
    valueScore -= 2; // v10b: 堅い本命も-2
    reasons.push({type:'warning', text:`配当妙味:やや低。本命決着濃厚`});
  } else if (likelyFormation) {
    valueScore -= 1;
  }
  
  // 1号艇がパワー1位 → 配当安い傾向
  if (analysis.boat1Top && !analysis.topIsOuter) {
    valueScore -= 1;
  }
  
  if (analysis.topIsOuter && predictability >= 1) {
    valueScore += 2;
    reasons.push({type:'positive', text:`${topBoat}号艇（外枠）軸の予想 → 的中時の配当に期待`});
  }
  if (!analysis.boat1Top && analysis.topWr >= 6.5) {
    valueScore += 1;
    reasons.push({type:'positive', text:`${topBoat}号艇(勝率${analysis.topWr})が1号艇ではない → 穴目の可能性`});
  }
  if (analysis.mixedClass && !likelyFormation) {
    valueScore += 1;
  }
  if (gap >= 1.5 && !likelyFormation) {
    valueScore += 1;
    reasons.push({type:'positive', text:`軸が明確で本命パターンから外れている → 狙い目`});
  }
  // v10b: パワー差があるが1号艇でない → 高配当チャンス
  if (gap >= 2.0 && topBoat >= 3) {
    valueScore += 2;
    reasons.push({type:'positive', text:`🔥 パワー差大+外枠軸(${topBoat}号艇) → 万舟チャンス`});
  }
  
  // ── 総合判定：予測しやすさ × 配当妙味 ──
  // v10b: データ検証の結果、以下の知見を反映
  // - Sランク(旧): 的中率40%だがROI 33.7% → 本命すぎて配当が安い
  // - Bランク(旧): 的中率40%でROI 214.9% → 穴目の利益が大きい
  // - Cランク(旧): 0/21で全滅 → 見送りにすべき
  // → 配当妙味を重視し、本命レースの投資を大幅抑制
  
  const totalScore = predictability + valueScore;
  
  // v10b: 配当妙味スコアを独立評価（回収率に直結）
  const isHighValue = valueScore >= 2;      // 配当が期待できる
  const isLowValue = valueScore <= -1;       // 本命寄り＝配当安い
  const isPredictable = predictability >= 2; // 予測しやすい
  
  let rank, maxBudget;
  
  // 回収率重視のランク付け
  if (isPredictable && isHighValue && totalScore >= 4) {
    rank = 'S'; maxBudget = state.params.budgetS;
    reasons.unshift({type:'positive', text:'🔥 予測精度◎ × 高配当期待 → 勝負レース'});
  } else if (isPredictable && !isLowValue && totalScore >= 3) {
    rank = 'A'; maxBudget = state.params.budgetA;
    reasons.unshift({type:'positive', text:'💎 好条件が揃ったレース'});
  } else if (totalScore >= 1) {
    // Phase1 #5: 集中投資モード — Bは全てDに降格
    if (state.params?.focusMode !== false) {
      rank = 'D'; maxBudget = 0;
      reasons.push({type:'warning', text:'💡 集中投資モード: B判定→見送り（S/Aのみ投資）'});
    } else {
      rank = 'B'; maxBudget = state.params.budgetB;
    }
  } else {
    rank = 'D'; maxBudget = 0;
  }
  
  // ── 本命レースの投資抑制 ──
  if (likelyFormation && analysis.inStrong) {
    if (boat1 && boat1.cls === 'A1' && state.params.skipSafeFormation) {
      rank = 'D'; maxBudget = 0;
      reasons.push({type:'warning', text:'⚠️ 超本命レース。配当が安すぎるため完全見送り（ROI改善策）'});
    } else {
      // 堅い（イン率60%超×1号艇パワー1位）→ 最小投資
      maxBudget = Math.min(maxBudget, 600);
      reasons.push({type:'warning', text:'→ 本命決着濃厚。最小投資(¥600)に制限'});
    }
  }
  
  // 堅い×予測しやすい but 配当妙味なし → 投資を大幅抑制
  if (isPredictable && isLowValue && rank !== 'D') {
    maxBudget = Math.min(maxBudget, 800);
    reasons.push({type:'warning', text:'→ 予測は容易だが配当妙味なし。投資を¥800に抑制'});
  }
  
  // 難水面は投資を抑える
  if (analysis.difficult && rank !== 'D') {
    maxBudget = Math.min(maxBudget, 1500);
    reasons.push({type:'warning', text:`→ 難水面のため投資上限¥${maxBudget.toLocaleString()}に制限`});
  }
  
  if (rank === 'D') {
    return { rank, confidence: totalScore, budget: 0, totalBet: 0, bets: [], combos: [], reasons, betStrategy: '見送り — 予測困難', pred, analysis, venueId: venue.id, raceNumber: race.number, venueName: venue.name, raceName: race.name };
  }
  
  // ── オッズ取得（キャッシュから）──
  const oddsKey = `${venue.id}-${race.number}`;
  const liveOdds = state.oddsCache[oddsKey] || null;
  const hasOdds = liveOdds && Object.keys(liveOdds).length > 30;
  
  // ── 買い目構成（1着固定流し — バックテストでROI+12pt実証済み）──
  // 軸艇を1着固定、2着候補×3着候補をtrifectaProbs確率で展開
  // 裏目として2位艇1着の目も少数追加
  let combos = [];
  let betStrategy = '';
  const axis1 = ranked[0].boat;
  const axis2 = ranked[1].boat;
  const axis3 = ranked[2].boat;
  const wild4 = ranked.length > 3 ? ranked[3].boat : null;
  const wild5 = ranked.length > 4 ? ranked[4].boat : null;
  const wild6 = ranked.length > 5 ? ranked[5].boat : null;
  
  const MAX_POINTS = { S: state.params.maxPointsS, A: state.params.maxPointsA, B: state.params.maxPointsB };
  const maxPoints = MAX_POINTS[rank] || 8;
  let activeThresh = '5%'; // 5%閾値デフォルト（バックテストROI 87%実証）
  
  if (pred.trifectaProbs && Object.keys(pred.trifectaProbs).length > 0) {
    const sorted = Object.entries(pred.trifectaProbs)
      .sort((a, b) => b[1] - a[1]);
    
    // ① 1着固定流し: axis1が1着の買い目を確率順で選出
    const axisFirst = sorted.filter(([k]) => k.startsWith(axis1 + '-'));
    // ② 裏目: axis2が1着の買い目
    const counterFirst = sorted.filter(([k]) => k.startsWith(axis2 + '-'));
    
    // 確率閾値: 5%以上の目を優先（バックテスト10342Rで5%ROI 87%実証）
    // フォールバック: 5%以上が0点→3%、3%も0点→1.5%
    const PROB_THRESH_HIGH = 0.05;
    const PROB_THRESH_MID = 0.03;
    const PROB_THRESH_LOW = 0.015;
    
    let axisFiltered = axisFirst.filter(([,p]) => p >= PROB_THRESH_HIGH);
    let counterFiltered = counterFirst.filter(([,p]) => p >= PROB_THRESH_HIGH);
    activeThresh = '5%';
    
    // フォールバック: 5%以上が少なすぎる場合→3%→1.5%
    if (axisFiltered.length === 0) {
      axisFiltered = axisFirst.filter(([,p]) => p >= PROB_THRESH_MID);
      counterFiltered = counterFirst.filter(([,p]) => p >= PROB_THRESH_MID);
      activeThresh = '3%';
    }
    if (axisFiltered.length === 0) {
      axisFiltered = axisFirst.filter(([,p]) => p >= PROB_THRESH_LOW);
      counterFiltered = counterFirst.filter(([,p]) => p >= PROB_THRESH_LOW);
      activeThresh = '1.5%';
    }
    
    if (rank === 'S') {
      // S: 1着固定流し主力 + 裏目2点
      for (const [k] of axisFiltered.slice(0, maxPoints - 2)) combos.push(k);
      if (combos.length < maxPoints - 2) {
        // 閾値以下でも軸1着のTOP目を補充
        for (const [k] of axisFirst.slice(0, maxPoints - 2)) { if (!combos.includes(k)) combos.push(k); if (combos.length >= maxPoints - 2) break; }
      }
      for (const [k] of counterFiltered.slice(0, 2)) combos.push(k);
      betStrategy = `${axis1}号艇1着固定流し(${combos.length}点 ≥${activeThresh})+裏${axis2}号艇`;
    } else if (rank === 'A') {
      // A: 1着固定流し + 裏目1点
      for (const [k] of axisFiltered.slice(0, maxPoints - 1)) combos.push(k);
      if (combos.length < maxPoints - 1) {
        for (const [k] of axisFirst.slice(0, maxPoints - 1)) { if (!combos.includes(k)) combos.push(k); if (combos.length >= maxPoints - 1) break; }
      }
      for (const [k] of counterFiltered.slice(0, 1)) combos.push(k);
      betStrategy = `${axis1}号艇1着固定流し(${combos.length}点 ≥${activeThresh})`;
    } else if (rank === 'B') {
      // B: 1着固定流しメインだが、確率上位も混ぜる
      for (const [k] of axisFiltered.slice(0, Math.max(3, maxPoints - 2))) combos.push(k);
      // 確率TOP目で軸1着以外も追加
      for (const [k] of sorted.slice(0, maxPoints)) { if (!combos.includes(k)) combos.push(k); if (combos.length >= maxPoints) break; }
      betStrategy = `${axis1}号艇軸流し+確率上位`;
    } else {
      // C: 確率上位3点（変更なし）
      for (const [k] of sorted.slice(0, Math.min(3, maxPoints))) combos.push(k);
      betStrategy = '確率上位3点';
    }
  } else {
    // trifectaProbsがない場合: 1着固定流しをrankedから構築
    const seconds = [axis2, axis3];
    if (wild4) seconds.push(wild4);
    for (const sec of seconds) {
      const thirds = [axis2, axis3, wild4, wild5].filter(b => b && b !== axis1 && b !== sec);
      for (const thr of thirds) combos.push(`${axis1}-${sec}-${thr}`);
    }
    // 裏目
    combos.push(`${axis2}-${axis1}-${axis3}`);
    if (wild4) combos.push(`${axis2}-${axis1}-${wild4}`);
    betStrategy = `${axis1}号艇1着固定流し(フォールバック)`;
  }
  
  combos = [...new Set(combos)];
  
  // ═══ 5%閾値フィルタ: 最終的に確率≥activeThreshの目のみ残す ═══
  if (pred.trifectaProbs && combos.length > 0) {
    const thresh = activeThresh === '5%' ? 0.05 : activeThresh === '3%' ? 0.03 : 0.015;
    const filtered = combos.filter(c => (pred.trifectaProbs[c] || 0) >= thresh);
    // 最低1点は残す
    if (filtered.length > 0) combos = filtered;
  }
  
  // ═══════════════════════════════════════════════════════
  //  v10: オッズ連動配分 + EVフィルタ + 合成オッズチェック
  // ═══════════════════════════════════════════════════════
  
  let bets;
  let usedOdds = false;
  
  if (hasOdds) {
    // ── オッズがある場合: EVフィルタ → 均等回収方式 ──
    usedOdds = true;
    
    // 各買い目にオッズとEVを付与（展開連動型確率を使用）
    const combosWithOdds = combos.map(combo => {
      const odd = liveOdds[combo] || 0;
      // v15.3: 展開連動型3連単確率を優先使用
      let prob;
      if (pred.trifectaProbs && pred.trifectaProbs[combo]) {
        prob = pred.trifectaProbs[combo];
      } else {
        // フォールバック: 独立確率
        const nums = combo.split('-').map(Number);
        const pa = pred.probs[nums[0]-1] || 0;
        const pb = pred.probs[nums[1]-1] || 0;
        const pc = pred.probs[nums[2]-1] || 0;
        prob = (pa / 100) * (pb / (100 - pa)) * (pc / (100 - pa - pb));
      }
      prob = Math.max(prob, 0.001);
      const ev = odd > 0 ? prob * odd : 0;
      return { combo, odd, prob, ev };
    }).filter(c => c.odd > 0); // オッズが取れない目は除外
    
    if (combosWithOdds.length === 0) {
      // オッズが全く取れない → フォールバック
      usedOdds = false;
    } else {
      // EVフィルタ: EV < threshold を除外（1.0未満はマイナス期待値）
      const EV_THRESHOLD = state.params.evThreshold;
      let filtered = combosWithOdds.filter(c => c.ev >= EV_THRESHOLD);
      if (filtered.length < 2) {
        // EV順で上位を確保（最低2点）
        filtered = [...combosWithOdds].sort((a, b) => b.ev - a.ev).slice(0, Math.min(3, combosWithOdds.length));
      }
      
      // EV<1.0の目がある場合に警告
      const negEV = filtered.filter(c => c.ev < 1.0);
      if (negEV.length > 0 && filtered.length > negEV.length) {
        // マイナス期待値の目を除外して再構成
        const posOnly = filtered.filter(c => c.ev >= 1.0);
        if (posOnly.length >= 2) {
          reasons.push({type:'warning', text:`⚡ EV<1.0の${negEV.length}点を除外（マイナス期待値）`});
          filtered = posOnly;
        }
      }
      
      // 点数制限
      if (filtered.length > maxPoints) {
        filtered = [...filtered].sort((a, b) => b.ev - a.ev).slice(0, maxPoints);
      }
      
      // 合成オッズチェック
      const invSum = filtered.reduce((s, c) => s + 1 / c.odd, 0);
      const synOdds = 1 / invSum;
      
      if (synOdds < state.params.synOddsMin) {
        reasons.push({type:'warning', text:`⚠️ 合成オッズ${synOdds.toFixed(1)}倍 < 下限${state.params.synOddsMin}倍。見送り`});
        return { rank: 'D', confidence: totalScore, budget: 0, totalBet: 0, bets: [], combos: [], reasons, betStrategy: '見送り — 合成オッズ低すぎ', pred, analysis, venueId: venue.id, raceNumber: race.number, venueName: venue.name, raceName: race.name };
      }
      
      // 均等回収方式で配分（どの目が当たっても近いリターン）
      // #12改善: Kelly基準ベースの最適配分オプション
      const useKelly = state.params.kellyFraction || 0.25; // Kelly基準の何割を使うか（0.25=四分の一Kelly）
      bets = filtered.map(c => {
        // Kelly基準: f = (p*b - q) / b where b=odds-1, p=prob, q=1-prob
        const kellyF = Math.max(0, (c.prob * (c.odd - 1) - (1 - c.prob)) / (c.odd - 1));
        const kellyBet = kellyF * useKelly * maxBudget;
        // 均等回収方式のベット額
        const equalBet = maxBudget / (c.odd * invSum);
        // ブレンド: Kelly 40% + 均等回収 60%
        const rawAmount = kellyBet * 0.4 + equalBet * 0.6;
        const betAmount = Math.max(100, Math.round(rawAmount / 100) * 100);
        return {
          combo: c.combo,
          weight: 1,
          betAmount,
          odd: c.odd,
          ev: Math.round(c.ev * 100) / 100,
          prob: c.prob,
          returnIfHit: Math.round(c.odd * betAmount),
        };
      });
      
      // EVでソート（表示用）
      bets.sort((a, b) => b.ev - a.ev);
      
      const totalBetCalc = bets.reduce((s, b) => s + b.betAmount, 0);
      const minReturn = Math.min(...bets.map(b => b.returnIfHit));
      const realSynOdds = Math.round(minReturn / totalBetCalc * 10) / 10;
      const expectedROI = bets.reduce((s, b) => s + b.prob * b.returnIfHit, 0) / totalBetCalc * 100;
      
      reasons.push({type:'neutral', text:`📊 オッズ連動配分: ${bets.length}点 / 合成${realSynOdds}倍 / 期待ROI ${Math.round(expectedROI)}%`});
      
      // 期待ROIが低すぎる場合の警告
      if (expectedROI < 75) {
        reasons.push({type:'warning', text:`⚠️ 期待ROI ${Math.round(expectedROI)}%。理論的に不利。点数削減か見送り推奨`});
        // ROI<75%は完全見送り
        return { rank: 'D', confidence: totalScore, budget: 0, totalBet: 0, bets: [], combos: [], reasons, betStrategy: `見送り — 期待ROI ${Math.round(expectedROI)}% < 75%`, pred, analysis, venueId: venue.id, raceNumber: race.number, venueName: venue.name, raceName: race.name, usedOdds: true };
      } else if (expectedROI < 100) {
        reasons.push({type:'warning', text:`⚡ 期待ROI ${Math.round(expectedROI)}%。控除率を超えられていない`});
        // B以上ならBに降格、予算も削減
        if (rank === 'S') { rank = 'B'; maxBudget = state.params.budgetB; reasons.push({type:'warning', text:'→ ランクB降格（期待ROI不足）'}); }
        else if (rank === 'A') { rank = 'B'; maxBudget = state.params.budgetB; reasons.push({type:'warning', text:'→ ランクB降格（期待ROI不足）'}); }
        // 予算を半減
        maxBudget = Math.round(maxBudget * 0.5 / 100) * 100;
        // 再計算
        for (const bet of bets) {
          bet.betAmount = Math.max(100, Math.round(bet.betAmount * 0.5 / 100) * 100);
          bet.returnIfHit = Math.round(bet.odd * bet.betAmount);
        }
      } else if (expectedROI >= 130) {
        reasons.push({type:'positive', text:`🔥 期待ROI ${Math.round(expectedROI)}%。プラス期待値！`});
      } else if (expectedROI >= 100) {
        reasons.push({type:'positive', text:`✅ 期待ROI ${Math.round(expectedROI)}%。理論上プラス圏内`});
      }
      
      combos = bets.map(b => b.combo);
      betStrategy = `${axis1}号艇軸 オッズ連動${bets.length}点 (合成${realSynOdds}倍)`;
    }
  }
  
  if (!usedOdds) {
    // ── オッズなし: 従来のweight方式（改良版）──
    const top3 = [axis1, axis2, axis3];
    
    // 点数制限を適用
    if (combos.length > maxPoints) {
      combos = combos.slice(0, maxPoints);
    }
    
    bets = combos.map(combo => {
      const boats = combo.split('-').map(Number);
      const allTop3 = boats.every(b => top3.includes(b));
      const hasWild5 = wild5 && boats.includes(wild5);
      const hasWild6 = wild6 && boats.includes(wild6);
      const hasWild4 = wild4 && boats.includes(wild4);
      // 逆傾斜: 穴目ほど厚く
      let weight;
      if (hasWild5 || hasWild6) weight = 2.0;   // 大穴目 → 厚く
      else if (hasWild4) weight = 1.5;           // 中穴目 → やや厚く
      else if (allTop3) weight = state.params.honmeiWeight; // 本命目 → 薄く
      else weight = 1.0;
      return { combo, weight, betAmount: 0, odd: null, ev: null, returnIfHit: null };
    });
    
    const totalWeight = bets.reduce((s, b) => s + b.weight, 0);
    for (const bet of bets) {
      bet.betAmount = Math.max(100, Math.round(maxBudget * bet.weight / totalWeight / 100) * 100);
    }
    
    betStrategy = `${axis1}号艇軸（${bets.length}点）`;
    
    // 思考ログ
    const mainCount = bets.filter(b => b.weight <= 1.0).length;
    const upsetCount = bets.filter(b => b.weight > 1.0).length;
    reasons.push({type:'neutral', text:`📊 本線${mainCount}点(薄) + 穴目${upsetCount}点(厚) ※オッズ未取得`});
  }
  
  const totalBet = bets.reduce((s, b) => s + b.betAmount, 0);
  
  return {
    rank, confidence: totalScore, budget: maxBudget, totalBet, bets, combos, reasons, betStrategy,
    pred, analysis, venueId: venue.id, raceNumber: race.number, venueName: venue.name, raceName: race.name,
    usedOdds,
  };
}

function generateAllPicks() {
  // Cache to prevent re-computation on every render
  const cacheKey = `${state.venues.length}-${Object.keys(state.rMap).length}-${Object.keys(state.pvMap).length}-${Object.keys(state.oddsCache||{}).length}`;
  if (state._picksCache && state._picksCacheKey === cacheKey) return state._picksCache;
  
  const picks = [];
  
  for (const venue of state.venues) {
    if (!venue.active) continue;
    for (const race of venue.races) {
      const key = `${venue.id}-${race.number}`;
      const pv = state.pvMap[key] || null;
      const result = state.rMap[key] || null;
      const pick = generateAIPick(race, venue, pv, result);
      if (pick) {
        pick.result = result;
        picks.push(pick);
      }
    }
  }
  
  picks.sort((a, b) => b.confidence - a.confidence);
  state._picksCache = picks;
  state._picksCacheKey = cacheKey;
  return picks;
}

function calcAIStats() {
  const picks = generateAllPicks();
  
  // ═══ v16.3: 結果が出ているレースで未freezeのものを一括freeze（pick再利用で高速化） ═══
  for (const pick of picks) {
    const key = `${pick.venueId}-${pick.raceNumber}`;
    const rs = state.rMap[key];
    if (rs?.hasResult && !state.pickStore[key] && pick.rank !== 'D') {
      // 当日レースはオッズが必要。過去日は常にfreeze
      const hasOdds = !!state.oddsCache[key];
      const isToday2 = getDateStr() === getTodayStr();
      if (hasOdds || !isToday2) {
        state.pickStore[key] = {
          rank: pick.rank, bets: pick.bets || [], combos: pick.combos || [],
          totalBet: pick.totalBet, betStrategy: pick.betStrategy, confidence: pick.confidence,
          usedOdds: pick.usedOdds || false, pred: pick.pred, analysis: pick.analysis, reasons: pick.reasons,
          frozenAt: new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'}),
          source: hasOdds ? 'odds' : 'stats',
          venueId: pick.venueId, raceNumber: pick.raceNumber, venueName: pick.venueName, raceName: pick.raceName,
        };
      }
    }
  }
  
  let total = 0, hits = 0, invested = 0, returned = 0;
  const details = [];
  let top1In1st = 0, top1In3 = 0, top3In3 = 0, top4In3 = 0;
  let hitPayouts = [];
  let totalWithResult = 0;
  let oddsHits = 0, noOddsHits = 0;
  let skippedByD = 0;
  let rankStats = { S:{t:0,h:0,inv:0,ret:0}, A:{t:0,h:0,inv:0,ret:0}, B:{t:0,h:0,inv:0,ret:0}, C:{t:0,h:0,inv:0,ret:0} };
  
  for (const pick of picks) {
    const key = `${pick.venueId}-${pick.raceNumber}`;
    const rs = state.rMap[key];
    if (!rs || !rs.hasResult || rs.order.length < 3) continue;
    
    totalWithResult++;
    const actual = rs.order.slice(0, 3);
    const predTop = pick.pred ? pick.pred.ranked.slice(0, 4).map(r => r.boat) : [];
    if (predTop[0] === actual[0]) top1In1st++;
    if (actual.includes(predTop[0])) top1In3++;
    const ov3 = actual.filter(b => predTop.slice(0,3).includes(b)).length;
    if (ov3 === 3) top3In3++;
    const ov4 = actual.filter(b => predTop.includes(b)).length;
    if (ov4 === 3) top4In3++;
    
    // pickStoreから確定データで判定
    const frozen = state.pickStore[key];
    const useRank = frozen?.rank || pick.rank;
    if (useRank === 'D') { skippedByD++; continue; }
    
    total++;
    const useTotalBet = frozen?.totalBet || pick.totalBet;
    const useBets = frozen?.bets || pick.bets || [];
    invested += useTotalBet;
    
    const actualCombo = `${rs.order[0]}-${rs.order[1]}-${rs.order[2]}`;
    const hit = useBets.some(b => b.combo === actualCombo);
    
    const rs2 = rankStats[useRank];
    if (rs2) { rs2.t++; rs2.inv += useTotalBet; }
    
    if (hit) {
      hits++;
      if (rs2) rs2.h++;
      const isOdds = frozen?.usedOdds || pick.usedOdds;
      if (isOdds) oddsHits++; else noOddsHits++;
      if (rs.pay && rs.pay.t3.amount > 0) {
        const winBet = useBets.find(b => b.combo === actualCombo);
        if (winBet) {
          const payout = Math.floor(rs.pay.t3.amount / 100 * winBet.betAmount);
          returned += payout;
          if (rs2) rs2.ret += payout;
          hitPayouts.push({ payout100: rs.pay.t3.amount, betAmount: winBet.betAmount, payout, rank: useRank });
        }
      }
    }
    
    details.push({ ...pick, rank: useRank, hit, actualCombo, result: rs });
  }
  
  const avgHitPay = hitPayouts.length > 0 ? Math.round(hitPayouts.reduce((a,b)=>a+b.payout100,0) / hitPayouts.length) : 0;
  const avgActualReturn = hitPayouts.length > 0 ? Math.round(hitPayouts.reduce((a,b)=>a+b.payout,0) / hitPayouts.length) : 0;
  
  // ── 連敗カウント（直近から遡って連続不的中を数える） ──
  let loseStreak = 0;
  for (let i = details.length - 1; i >= 0; i--) {
    if (details[i].hit) break;
    loseStreak++;
  }
  
  return {
    picks, total, hits,
    hitRate: total > 0 ? Math.round(hits / total * 1000) / 10 : 0,
    roi: invested > 0 ? Math.round(returned / invested * 1000) / 10 : 0,
    invested, returned, profit: returned - invested, details,
    rankStats,
    skippedByD,
    oddsHits, noOddsHits,
    loseStreak,
    analysis: {
      totalWithResult,
      top1In1st, top1In1stRate: totalWithResult > 0 ? Math.round(top1In1st/totalWithResult*1000)/10 : 0,
      top1In3, top1In3Rate: totalWithResult > 0 ? Math.round(top1In3/totalWithResult*1000)/10 : 0,
      top3In3, top3In3Rate: totalWithResult > 0 ? Math.round(top3In3/totalWithResult*1000)/10 : 0,
      top4In3, top4In3Rate: totalWithResult > 0 ? Math.round(top4In3/totalWithResult*1000)/10 : 0,
      avgHitPay,
      avgActualReturn,
    }
  };
}

// Phase2 #8: TTLキャッシュ
class TTLCache {
  constructor(defaultTTL = 120000) { this.store = new Map(); this.ttl = defaultTTL; }
  set(key, value, ttl) {
    this.store.set(key, { value, expiry: Date.now() + (ttl || this.ttl) });
  }
  get(key) {
    const entry = this.store.get(key);
    if (!entry) return null;
    if (Date.now() > entry.expiry) { this.store.delete(key); return null; }
    return entry.value;
  }
  has(key) { return this.get(key) !== null; }
  delete(key) { this.store.delete(key); }
  clear() { this.store.clear(); }
}

function jcd(stadiumId) {
  return String(stadiumId).padStart(2, '0');
}

function fetchWithTimeout(url, ms) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), ms);
  return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(timer));
}

async function fetchViaProxy(targetUrl) {
  // Try working proxy first
  if (workingProxy != null) {
    try {
      const pUrl = CORS_PROXIES[workingProxy](targetUrl);
      const res = await fetchWithTimeout(pUrl, 10000);
      if (res.ok) {
        let text = await res.text();
        // allorigins /get endpoint wraps in JSON
        if (pUrl.includes('/get?url=')) {
          try { const j = JSON.parse(text); text = j.contents || text; } catch(e) {}
        }
        if (text.length > 200 && !text.includes('blocked') && !text.includes('Access Denied')) return text;
      }
    } catch(e) {}
    // Working proxy failed, reset
    console.warn(`[EDGE-LIVE] Working proxy ${workingProxy} failed, resetting`);
    workingProxy = null;
  }
  // Try all proxies
  for (let i = 0; i < CORS_PROXIES.length; i++) {
    if (i === workingProxy) continue;
    try {
      const pUrl = CORS_PROXIES[i](targetUrl);
      const res = await fetchWithTimeout(pUrl, 10000);
      if (res.ok) {
        let text = await res.text();
        if (pUrl.includes('/get?url=')) {
          try { const j = JSON.parse(text); text = j.contents || text; } catch(e) {}
        }
        // Validate response contains actual boatrace content
        if (text.length > 200 && (text.includes('boatrace') || text.includes('oddsPoint') || text.includes('oddstf') || text.includes('raceResult'))) {
          workingProxy = i;
          return text;
        }
        if (text.length > 200 && !text.includes('blocked') && !text.includes('Access Denied') && !text.includes('error')) {
          // Generic large response, still might work
          workingProxy = i;
          return text;
        }
      }
    } catch(e) {
      console.warn(`[EDGE-LIVE] Proxy ${i} failed:`, e.message);
    }
  }
  console.error('[EDGE-LIVE] All proxies failed');
  return null;
}

async function fetchLivePreview(sid, rno) {
  const key = `pv-${sid}-${rno}`;
  if (liveCache[key]) return liveCache[key];
  try {
    const url = `${BOATRACE_JP}beforeinfo?rno=${rno}&jcd=${jcd(sid)}&hd=${getDateStr()}`;
    /* console.log(`[EDGE-LIVE] Fetching preview: ${url}`); */
    const html = await fetchViaProxy(url);
    if (!html) { console.warn('[EDGE-LIVE] No proxy available'); return null; }
    const data = parseLivePreview(html, sid, rno);
    if (data && data.entries.length > 0 && data.entries.some(e => e.exT != null || e.exST != null || e.wt != null)) {
      liveCache[key] = data;
      // Merge: keep existing entries data, overlay live data
      const existing = state.pvMap[`${sid}-${rno}`];
      if (existing && existing.entries) {
        // Merge live data into existing API data
        for (const le of data.entries) {
          const ae = existing.entries.find(e => e.bn === le.bn);
          if (ae) {
            if (le.exT != null && ae.exT == null) ae.exT = le.exT;
            if (le.exST != null && ae.exST == null) ae.exST = le.exST;
            if (le.course > 0 && ae.course === 0) ae.course = le.course;
            if (le.wt != null && ae.wt == null) ae.wt = le.wt;
            if (le.tilt != null && ae.tilt == null) ae.tilt = le.tilt;
          }
        }
        if (data.course && data.course.length > 0) {
          existing.course = data.course;
          existing.courseConfidence = data.courseConfidence;
          existing.courseSources = data.courseSources;
        }
        if (data.temp != null) existing.temp = data.temp;
        if (data.waterTemp != null) existing.waterTemp = data.waterTemp;
        if (data.wind != null) existing.wind = data.wind;
        if (data.wave != null) existing.wave = data.wave;
        existing.live = true;
      } else {
        state.pvMap[`${sid}-${rno}`] = data;
      }
      /* console.log(`[EDGE-LIVE] Preview OK: ${data.entries.length}  */
    }
    return data;
  } catch(e) {
    console.warn(`[EDGE-LIVE] Preview failed:`, e.message);
    return null;
  }
}

function parseLivePreview(html, sid, rno) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const entries = [];
  
  // Parse weather from body text
  let wind = null, windDir = 0, wave = null, weather = 0, temp = null, waterTemp = null;
  const bodyText = doc.body?.textContent || '';
  const tempM = bodyText.match(/気温[^\d]*(\d+(?:\.\d+)?)/);
  if (tempM) temp = parseFloat(tempM[1]);
  const wtM = bodyText.match(/水温[^\d]*(\d+(?:\.\d+)?)/);
  if (wtM) waterTemp = parseFloat(wtM[1]);
  const windM = bodyText.match(/風速[^\d]*(\d+)/);
  if (windM) wind = parseInt(windM[1]);
  const waveM = bodyText.match(/波高[^\d]*(\d+)/);
  if (waveM) wave = parseInt(waveM[1]);
  
  // Parse from table: each racer has 2 rows (main + sub)
  // Look for exhibition time pattern: X.XX in the 6-7 second range
  const allRows = doc.querySelectorAll('tr');
  let currentBn = 0;
  
  for (const row of allRows) {
    const text = row.textContent || '';
    
    // Detect boat number from row classes or content
    const boatImg = row.querySelector('[class*="boatColor"]') || row.querySelector('img[src*="icon_boat"]');
    if (boatImg) {
      const src = boatImg.getAttribute('src') || boatImg.className || '';
      const m = src.match(/[_\-](\d)[._]/);
      if (m) currentBn = parseInt(m[1]);
    }
    
    // Try to detect boat number from 枠 column (1-6)
    const firstTd = row.querySelector('td');
    if (firstTd) {
      const tdText = firstTd.textContent.trim();
      // Only accept if it's purely a single digit 1-6 (not "1R", "10R", etc)
      if (/^[1-6]$/.test(tdText)) {
        currentBn = parseInt(tdText);
      }
    }
    
    if (!currentBn) continue;
    
    // Look for exhibition time (6.XX pattern)
    const exTMatch = text.match(/(\d\.\d{2})/g);
    const exTimes = (exTMatch || []).map(Number).filter(v => v >= 5.5 && v <= 8.0);
    
    // Look for weight (XX.Xkg)
    const wtMatch = text.match(/(\d{2}\.\d)kg/);
    
    // Look for ST (.XX) - start timing is typically 0.XX format
    const stMatch = text.match(/ST\s*[.．](\d{2})/);
    // Also try: standalone 0.XX that looks like ST (not part of 6.XX exhibition time)
    const stMatch2 = text.match(/(?<!\d)[0０]\s*[.．]\s*(\d{2})(?!\d)/);
    
    // Look for course number (進入 X or コース X)
    const courseMatch = text.match(/(?:進入|コース)\s*(\d)/);
    // Also detect from cell structure: look for just a number 1-6 in specific cells
    const cells = row.querySelectorAll('td');
    let cellCourse = 0;
    if (cells.length >= 3) {
      // Course is often in the 3rd or 4th cell
      for (let ci = 1; ci < Math.min(cells.length, 5); ci++) {
        const ct = cells[ci].textContent.trim();
        if (/^[1-6]コース$/.test(ct) || (/^[1-6]$/.test(ct) && ci >= 2 && ci <= 3)) {
          cellCourse = parseInt(ct);
          break;
        }
      }
    }
    
    // Check if this row has exhibition data
    const detectedCourse = courseMatch ? parseInt(courseMatch[1]) : cellCourse;
    if (exTimes.length > 0 || wtMatch) {
      const existing = entries.find(e => e.bn === currentBn);
      if (existing) {
        // Update existing
        if (exTimes.length > 0 && existing.exT == null) existing.exT = exTimes[0];
        if (stMatch && existing.exST == null) existing.exST = parseFloat('0.' + stMatch[1]);
        if (detectedCourse > 0 && existing.course === 0) existing.course = detectedCourse;
        if (wtMatch && existing.wt == null) existing.wt = parseFloat(wtMatch[1]);
      } else {
        entries.push({
          bn: currentBn,
          course: detectedCourse,
          exST: stMatch ? parseFloat('0.' + stMatch[1]) : (stMatch2 ? parseFloat('0.' + stMatch2[1]) : null),
          exT: exTimes.length > 0 ? exTimes[0] : null,
          tilt: null,
          wt: wtMatch ? parseFloat(wtMatch[1]) : null,
        });
      }
    } else if (detectedCourse > 0 || stMatch) {
      // Sub-row with course/ST info
      const existing = entries.find(e => e.bn === currentBn);
      if (existing) {
        if (detectedCourse > 0) existing.course = detectedCourse;
        if (stMatch) existing.exST = parseFloat('0.' + stMatch[1]);
      }
    }
  }
  
  // Tilt parsing: look for tilt values near exhibition time
  const tiltPattern = /(-?\d\.\d)\s/g;
  let tiltM;
  const allTilts = [];
  while ((tiltM = tiltPattern.exec(bodyText)) !== null) {
    const v = parseFloat(tiltM[1]);
    if (Math.abs(v) <= 3.0 && v !== 0.0) allTilts.push(v);
  }
  // Assign tilts to entries if possible
  if (allTilts.length === entries.length) {
    entries.forEach((e, i) => { e.tilt = allTilts[i]; });
  }
  
  // Build course order from entries (per-row detection)
  const courseFromRows = [];
  for (const e of entries) {
    if (e.course > 0) courseFromRows[e.course - 1] = e.bn;
  }
  
  // ═══ v16.3: 複数パターン投票方式 + 枠なりデフォルト原則 ═══
  const WAKU_NARI = [1,2,3,4,5,6]; // 枠なり = デフォルト
  const candidates = []; // 各パターンの検出結果を保存
  
  // Source 1: Row-based detection
  const src1 = courseFromRows.filter(v => v > 0);
  if (src1.length === 6 && new Set(courseFromRows).size === 6) {
    candidates.push({ source:'row', order:[...courseFromRows] });
  }
  
  // Source 2: CSS classes like "is-boatColor1" in course display sections
  const courseColorEls = doc.querySelectorAll('[class*="boatColor"]');
  if (courseColorEls.length >= 6) {
    const detected = [];
    for (const el of courseColorEls) {
      const cls = el.className || '';
      const m = cls.match(/boatColor(\d)/);
      if (m) {
        const bn = parseInt(m[1]);
        if (bn >= 1 && bn <= 6 && !detected.includes(bn)) detected.push(bn);
      }
    }
    if (detected.length === 6) {
      candidates.push({ source:'css', order:detected });
    }
  }
  
  // Source 3: Start course table with "コース" header
  const allTables = doc.querySelectorAll('table');
  for (const tbl of allTables) {
    const headerText = tbl.querySelector('th, caption')?.textContent || '';
    if (headerText.includes('コース') || headerText.includes('進入') || headerText.includes('スタート展示')) {
      const detectedCourse = [];
      const rows = tbl.querySelectorAll('tr');
      for (const row of rows) {
        const cells = row.querySelectorAll('td');
        for (const cell of cells) {
          const img = cell.querySelector('img[src*="icon_boat"], [class*="boat"]');
          if (img) {
            const src = img.getAttribute('src') || img.className || '';
            const bm = src.match(/[_\-](\d)/);
            if (bm) {
              const bn = parseInt(bm[1]);
              if (bn >= 1 && bn <= 6 && !detectedCourse.includes(bn)) detectedCourse.push(bn);
            }
          }
        }
      }
      if (detectedCourse.length === 6) {
        candidates.push({ source:'table', order:detectedCourse });
      }
    }
  }
  
  // Source 4: text-based "1 2 3 4 5 6" near "コース" or "進入"
  const courseTextMatch = bodyText.match(/(?:コース|進入)[^\d]{0,30}([1-6])\s*([1-6])\s*([1-6])\s*([1-6])\s*([1-6])\s*([1-6])/);
  if (courseTextMatch) {
    const detected = courseTextMatch.slice(1, 7).map(Number);
    if (new Set(detected).size === 6) {
      candidates.push({ source:'text', order:detected });
    }
  }
  
  // ═══ 投票: 枠なりと異なるコース順は2ソース以上の一致が必要 ═══
  let finalCourse = WAKU_NARI;
  let courseConfidence = 0; // 0=枠なり(デフォルト), 1=低信頼, 2+=高信頼
  
  if (candidates.length > 0) {
    // 枠なりかどうか判定
    const isWakuNari = (order) => order.every((bn, i) => bn === i + 1);
    
    // 全候補が枠なりなら枠なり確定
    if (candidates.every(c => isWakuNari(c.order))) {
      finalCourse = WAKU_NARI;
      courseConfidence = candidates.length;
    } else {
      // 非枠なりの候補をグループ化（同じコース順同士）
      const nonWaku = candidates.filter(c => !isWakuNari(c.order));
      
      if (nonWaku.length >= 2) {
        // 2つ以上の非枠なりソースが一致するか？
        const key0 = nonWaku[0].order.join('-');
        const matching = nonWaku.filter(c => c.order.join('-') === key0);
        if (matching.length >= 2) {
          // 2ソース以上一致 → 採用
          finalCourse = nonWaku[0].order;
          courseConfidence = matching.length;
        } else {
          // 不一致 → 枠なりにフォールバック（パースミスの可能性高い）
          finalCourse = WAKU_NARI;
          courseConfidence = 0;
        }
      } else {
        // 非枠なりソースが1つだけ → 信頼度不足、枠なりにフォールバック
        finalCourse = WAKU_NARI;
        courseConfidence = 0;
      }
    }
  }
  
  
  return {
    wind, windDir, wave, weather, temp, waterTemp,
    entries,
    course: finalCourse,
    courseConfidence,
    courseSources: candidates.map(c => c.source),
    live: true,
  };
}

function parseLiveResult(html, sid, rno) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const order = [];
  const sts = {};
  const usedPlaces = new Set();
  const usedBoats = new Set();
  
  const toHalf = s => (s||'').replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
  
  // Get current race entries for racer-number-to-boat-number mapping
  const race = currentRace();
  const racerMap = {}; // racerNo -> boatNumber
  if (race) {
    for (const e of race.entries) {
      if (e.regNo) racerMap[e.regNo] = e.boatNumber;
    }
  }
  
  const allRows = doc.querySelectorAll('tr');
  
  for (const row of allRows) {
    const tds = row.querySelectorAll('td');
    if (tds.length < 3) continue;
    
    const rowText = row.textContent || '';
    
    // Skip non-result rows  
    if (rowText.includes('連単') || rowText.includes('連複') || rowText.includes('拡連') || 
        rowText.includes('単勝') || rowText.includes('複勝') || rowText.includes('返還') ||
        rowText.includes('決まり手') || rowText.includes('備考')) continue;
    
    // Parse place from first cell
    const placeText = toHalf(tds[0]?.textContent?.trim());
    const place = parseInt(placeText);
    if (!(place >= 1 && place <= 6)) continue;
    if (usedPlaces.has(place)) continue;
    
    // Strategy 1: Get boat number from td[1] text
    let bn = 0;
    const boatText = toHalf(tds[1]?.textContent?.trim());
    const n2 = parseInt(boatText);
    if (n2 >= 1 && n2 <= 6) bn = n2;
    
    // Strategy 2: class-based detection
    if (!bn) {
      const boatEl = row.querySelector('[class*="boatColor"], [class*="boat_color"], [class*="is-boat"]');
      if (boatEl) {
        const m = (boatEl.className || '').match(/(\d)/);
        if (m) { const v = parseInt(m[1]); if (v >= 1 && v <= 6) bn = v; }
      }
    }
    
    // Strategy 3: Extract 4-digit racer number from row and map to boat
    if (!bn) {
      const racerMatch = rowText.match(/(\d{4})\s/);
      if (racerMatch && racerMap[parseInt(racerMatch[1])]) {
        bn = racerMap[parseInt(racerMatch[1])];
      }
    }
    
    // Strategy 4: img src or alt containing boat number
    if (!bn) {
      const imgs = row.querySelectorAll('img');
      for (const img of imgs) {
        const src = img.getAttribute('src') || '';
        const alt = img.getAttribute('alt') || '';
        const m = (src + alt).match(/[_\-](\d)[._\-]|color(\d)|boat(\d)/i);
        if (m) { const v = parseInt(m[1] || m[2] || m[3]); if (v >= 1 && v <= 6) { bn = v; break; } }
      }
    }
    
    if (!bn || usedBoats.has(bn)) continue;
    
    // Validate: row should contain racer info (4-digit number or meaningful text)
    const nameArea = Array.from(tds).slice(2).map(td => td.textContent).join('');
    const hasRacerNum = /\d{4}/.test(nameArea);
    const hasName = /[\u4e00-\u9fff\u30a0-\u30ff]{2,}/.test(nameArea); // At least 2 kanji/katakana
    
    // Relaxed: if we couldn't find racer info but have valid place+boat, still accept
    // (some HTML structures might be different)
    if (!hasRacerNum && !hasName && tds.length <= 3) continue;
    
    usedPlaces.add(place);
    usedBoats.add(bn);
    order.push({ bn, place });
  }
  
  order.sort((a,b) => a.place - b.place);
  
  // Parse ST from start info
  for (const row of allRows) {
    const tds = row.querySelectorAll('td');
    for (const td of tds) {
      const text = (td.textContent || '').trim();
      const m = text.match(/^\s*(\d)\s+[.．](\d{2})/);
      if (m) {
        const sbn = parseInt(m[1]);
        if (sbn >= 1 && sbn <= 6) sts[sbn] = parseFloat('0.' + m[2]);
      }
    }
  }
  
  // Parse payouts
  const pay = { t3:{combo:'—',amount:0}, f3:{combo:'—',amount:0}, t2:{combo:'—',amount:0}, f2:{combo:'—',amount:0} };
  
  for (const row of allRows) {
    const tds = row.querySelectorAll('td');
    if (tds.length < 2) continue;
    
    const cells = Array.from(tds).map(td => td.textContent.trim());
    const rowText = cells.join(' ');
    
    let payType = null;
    if (rowText.includes('3連単')) payType = 't3';
    else if (rowText.includes('3連複')) payType = 'f3';
    else if (rowText.includes('2連単')) payType = 't2';
    else if (rowText.includes('2連複')) payType = 'f2';
    
    if (!payType || pay[payType].amount > 0) continue;
    
    let combo = null, amount = 0;
    for (const cell of cells) {
      if (/^\d[-=]\d/.test(cell)) combo = cell;
      const amtMatch = cell.match(/¥?([\d,]+)/);
      if (amtMatch) {
        const val = parseInt(amtMatch[1].replace(/,/g, ''));
        if (val >= 100) amount = val;
      }
    }
    
    if (combo && amount > 0) pay[payType] = { combo, amount };
  }
  
  // Fallback regex
  if (pay.t3.amount === 0) {
    const bodyText = doc.body?.textContent || '';
    const patterns = [
      { key: 't3', re: /3連単\s*(\d[-]\d[-]\d)\s*¥?([\d,]+)/ },
      { key: 'f3', re: /3連複\s*(\d[=]\d[=]\d)\s*¥?([\d,]+)/ },
      { key: 't2', re: /2連単\s*(\d[-]\d)\s*¥?([\d,]+)/ },
      { key: 'f2', re: /2連複\s*(\d[=]\d)\s*¥?([\d,]+)/ },
    ];
    for (const p of patterns) {
      const m = bodyText.match(p.re);
      if (m && pay[p.key].amount === 0) {
        pay[p.key] = { combo: m[1], amount: parseInt(m[2].replace(/,/g, '')) };
      }
    }
  }
  
  // Parse technique
  let technique = null;
  const bodyText = doc.body?.textContent || '';
  const techMatch = bodyText.match(/決まり手\s*([^\s\n]{1,6})/);
  if (techMatch) technique = techMatch[1];
  
  return {
    order: order.map(o => o.bn),
    technique,
    pay,
    sts,
    hasResult: order.length >= 3,
    live: true,
  };
}
