    const evROIC = evROI >= 100 ? 'var(--ok)' : evROI >= 80 ? 'var(--warn)' : 'var(--err)';
    triBox.appendChild(h('div',{style:{fontSize:'12px',marginTop:'6px',padding:'4px 8px',borderRadius:'var(--r-sm)',background:'rgba(48,192,96,0.06)',border:'1px solid rgba(48,192,96,0.15)'}},
      h('span',{style:{color:'var(--tx3)'}},'🎯 高確率フィルタ(>3%): '),
      h('span',{style:{fontWeight:700,color:evROIC,fontFamily:'JetBrains Mono,monospace'}},`ROI ${evROI}%`),
      h('span',{style:{color:'var(--tx4)',marginLeft:'6px'}},`${m.evFilter.hit}/${m.evFilter.races}R的中 (${m.evFilter.skip}Rスキップ)`)));
  }
  // 選択的ベット戦略
  if (m.selectiveBet && m.selectiveBet.races > 0) {
    const selROI = Math.round(m.selectiveBet.ret / m.selectiveBet.bet * 100);
    const selROIC = selROI >= 100 ? 'var(--ok)' : selROI >= 80 ? 'var(--warn)' : 'var(--err)';
    triBox.appendChild(h('div',{style:{fontSize:'12px',marginTop:'4px',padding:'4px 8px',borderRadius:'var(--r-sm)',background:'rgba(79,140,255,0.06)',border:'1px solid rgba(79,140,255,0.15)'}},
      h('span',{style:{color:'var(--tx3)'}},'🏆 S+Aランクのみ: '),
      h('span',{style:{fontWeight:700,color:selROIC,fontFamily:'JetBrains Mono,monospace'}},`ROI ${selROI}%`),
      h('span',{style:{color:'var(--tx4)',marginLeft:'6px'}},`${m.selectiveBet.hit}/${m.selectiveBet.races}R的中 (${m.selectiveBet.skip}Rスキップ)`)));
  }
  wrap.appendChild(triBox);
  
  // ═══ セクション2: ランク別3連単ROI ═══
  const rkCard = h('div',{style:{marginBottom:'10px'}});
  rkCard.appendChild(h('div',{style:{fontSize:'13px',fontWeight:700,marginBottom:'4px'}},'ランク別 3連単ROI'));
  for (const [rk, style] of [['S','#f87171'],['A','#80b0ff'],['B','#50e080']]) {
    const rs = m.rankStats?.[rk];
    if (!rs || rs.total === 0) continue;
    const roi = rs.bet > 0 ? Math.round(rs.ret / rs.bet * 100) : 0;
    const hitR = (rs.hit / rs.total * 100).toFixed(1);
    const row = h('div',{style:{display:'flex',alignItems:'center',gap:'6px',padding:'4px 0',borderBottom:'1px solid var(--bd)',fontSize:'12px'}});
    row.appendChild(h('span',{className:`rank rank-${rk}`,style:{width:'20px',height:'20px',fontSize:'11px'}},rk));
    row.appendChild(h('span',{style:{minWidth:'50px'}},`${rs.total}R`));
    row.appendChild(h('span',{style:{minWidth:'60px'}},`${rs.hit}的中(${hitR}%)`));
    row.appendChild(h('span',{style:{fontWeight:700,fontFamily:'JetBrains Mono,monospace',color:roi>=100?'var(--ok)':roi>=70?'var(--warn)':'var(--err)'}},`ROI ${roi}%`));
    rkCard.appendChild(row);
  }
  wrap.appendChild(rkCard);

  // ═══ セクション3: 基本KPI ═══
  const grid = h('div',{className:'ent-grid',style:{gap:'6px',marginBottom:'10px'}});
  const addCell = (label, value, color) => {
    const cell = h('div',{className:'ent-cell'});
    cell.appendChild(h('div',{className:'ent-cell-label'},label));
    cell.appendChild(h('div',{className:'ent-cell-val',style:{color:color||'var(--tx)'}},value));
    grid.appendChild(cell);
  };
  
  const stMAE = m.stErrors.length > 0 ? (m.stErrors.reduce((a,b)=>a+b,0)/m.stErrors.length) : 0;
  addCell('ST誤差(MAE)', stMAE.toFixed(3)+'秒', stMAE <= 0.03 ? 'var(--ok)' : 'var(--err)');
  const courseRate = m.courseTotal > 0 ? Math.round(m.courseAccuracy / m.courseTotal * 100) : 0;
  addCell('進入正解', courseRate+'%', courseRate >= 85 ? 'var(--ok)' : 'var(--err)');
  const top1Rate = rc > 0 ? Math.round(m.top1Accuracy / rc * 100) : 0;
  addCell('1着的中', top1Rate+'%', top1Rate >= 30 ? 'var(--ok)' : 'var(--err)');
  const top3Rate = rc > 0 ? Math.round(m.top3Accuracy / rc * 100) : 0;
  addCell('軸3着内', top3Rate+'%', top3Rate >= 60 ? 'var(--ok)' : 'var(--err)');
  const tacticRate = m.tacticTotal > 0 ? Math.round(m.tacticAccuracy / m.tacticTotal * 100) : 0;
  addCell('決まり手', tacticRate+'%', tacticRate >= 40 ? 'var(--ok)' : 'var(--err)');
  const winROI = m.winBet > 0 ? Math.round(m.winReturn / m.winBet * 100) : 0;
  addCell('単勝ROI', winROI+'%', winROI >= 100 ? 'var(--ok)' : 'var(--err)');
  wrap.appendChild(grid);

  // ═══ セクション4: Brier Score ═══
  if (m.brierCount > 0) {
    const brier = m.brierSum / m.brierCount;
    const brierBox = h('div',{style:{marginBottom:'10px',padding:'8px 10px',borderRadius:'var(--r)',background:'var(--sf)'}});
    brierBox.appendChild(h('div',{style:{fontSize:'13px',fontWeight:700,marginBottom:'4px'}},'📊 Brier Score（確率精度指標）'));
    const brierRow = h('div',{style:{display:'flex',alignItems:'baseline',gap:'8px'}});
    brierRow.appendChild(h('span',{style:{fontSize:'22px',fontWeight:900,fontFamily:'JetBrains Mono,monospace',color:brier<=0.15?'var(--ok)':brier<=0.20?'var(--warn)':'var(--err)'}},brier.toFixed(4)));
    brierRow.appendChild(h('span',{style:{fontSize:'11px',color:'var(--tx3)'}},'(0=完全予測 / 0.167=ランダム / 0.25=最悪)'));
    brierBox.appendChild(brierRow);
    wrap.appendChild(brierBox);
  }
  
  // ═══ セクション5: キャリブレーションプロット ═══
  if (m.calibration && m.calibration.length > 20) {
    const calCard = h('div',{style:{marginBottom:'10px',padding:'10px',borderRadius:'var(--r)',background:'var(--sf)'}});
    calCard.appendChild(h('div',{style:{fontSize:'13px',fontWeight:700,marginBottom:'6px'}},'📈 キャリブレーションプロット'));
    calCard.appendChild(h('div',{style:{fontSize:'11px',color:'var(--tx4)',marginBottom:'6px'}},'予測確率 vs 実出現率（対角線=完全キャリブレーション）'));
    
    // ビン分け
    const bins = [
      {min:0,max:0.02,label:'0-2%'},{min:0.02,max:0.05,label:'2-5%'},{min:0.05,max:0.10,label:'5-10%'},
      {min:0.10,max:0.20,label:'10-20%'},{min:0.20,max:0.50,label:'20-50%'},{min:0.50,max:1.01,label:'50%+'}
    ];
    const binData = bins.map(b => {
      const items = m.calibration.filter(c => c.prob >= b.min && c.prob < b.max);
      const n = items.length;
      const hits = items.filter(c => c.hit).length;
      const actualRate = n > 0 ? hits / n : 0;
      const midProb = (b.min + b.max) / 2;
      return { ...b, n, hits, actualRate, midProb };
    }).filter(b => b.n >= 3); // 3件以上あるビンのみ

    if (binData.length >= 3) {
      // SVGキャリブレーションプロット
      const PW = 280, PH = 140;
      const svg2 = document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg2.setAttribute('viewBox', `0 0 ${PW} ${PH}`);
      svg2.setAttribute('width', '100%');
      svg2.setAttribute('height', '140');
      
      let svgContent = '';
      // 対角線（完全キャリブレーション）
      svgContent += `<line x1="30" y1="${PH-20}" x2="${PW-10}" y2="10" stroke="rgba(255,255,255,0.15)" stroke-dasharray="4"/>`;
      // 軸
      svgContent += `<line x1="30" y1="${PH-20}" x2="${PW-10}" y2="${PH-20}" stroke="rgba(255,255,255,0.1)"/>`;
      svgContent += `<line x1="30" y1="${PH-20}" x2="30" y2="10" stroke="rgba(255,255,255,0.1)"/>`;
      // ラベル
      svgContent += `<text x="15" y="${PH/2}" fill="#5a6478" font-size="9" transform="rotate(-90,15,${PH/2})" text-anchor="middle">実出現率</text>`;
      svgContent += `<text x="${PW/2}" y="${PH-3}" fill="#5a6478" font-size="9" text-anchor="middle">予測確率</text>`;
      
      // データポイント
      const maxRate = Math.max(0.5, ...binData.map(b => b.actualRate), ...binData.map(b => b.midProb));
      for (const b of binData) {
        const x = 30 + (b.midProb / maxRate) * (PW - 40);
        const y = (PH - 20) - (b.actualRate / maxRate) * (PH - 30);
        const r = Math.max(4, Math.min(10, Math.sqrt(b.n) * 0.5));
        const isOver = b.actualRate < b.midProb * 0.7; // 過大評価
        const isUnder = b.actualRate > b.midProb * 1.3; // 過小評価
        const col = isOver ? '#f05252' : isUnder ? '#3b82f6' : '#30c060';
        svgContent += `<circle cx="${x}" cy="${y}" r="${r}" fill="${col}" opacity="0.7"/>`;
        svgContent += `<text x="${x}" y="${y-r-2}" fill="${col}" font-size="8" text-anchor="middle">${(b.actualRate*100).toFixed(1)}%</text>`;
      }
      
      svg2.innerHTML = svgContent;
      calCard.appendChild(svg2);
      
      // テーブル
      const calTbl = h('div',{style:{fontSize:'11px',marginTop:'6px'}});
      for (const b of binData) {
        const deviation = b.n > 0 ? ((b.actualRate - b.midProb) / Math.max(b.midProb, 0.01) * 100).toFixed(0) : '0';
        const devColor = Math.abs(parseFloat(deviation)) <= 20 ? 'var(--ok)' : Math.abs(parseFloat(deviation)) <= 50 ? 'var(--warn)' : 'var(--err)';
        const row = h('div',{style:{display:'flex',gap:'4px',padding:'2px 0',borderBottom:'1px solid var(--bd)'}});
        row.appendChild(h('span',{style:{minWidth:'45px',color:'var(--tx3)'}},b.label));
        row.appendChild(h('span',{style:{minWidth:'35px'}},b.n+'件'));
        row.appendChild(h('span',{style:{minWidth:'45px'}},`実${(b.actualRate*100).toFixed(1)}%`));
        row.appendChild(h('span',{style:{color:devColor,fontWeight:700}},`乖離${deviation}%`));
        calTbl.appendChild(row);
      }
      calCard.appendChild(calTbl);
    }
    wrap.appendChild(calCard);
  }
  
  // ═══ セクション6: 温度探索結果 ═══
  if (DEV_MODE && m.tempResults && Object.keys(m.tempResults).length > 0) {
    const tempCard = h('div',{style:{marginBottom:'10px',padding:'8px 10px',borderRadius:'var(--r)',background:'var(--sf)'}});
    tempCard.appendChild(h('div',{style:{fontSize:'13px',fontWeight:700,marginBottom:'4px'}},'🌡️ Softmax温度探索'));
    tempCard.appendChild(h('div',{style:{fontSize:'11px',color:'var(--tx4)',marginBottom:'6px'}},`現在のT=${SOFTMAX_T} — 最適なTを探索`));
    
    let bestT = SOFTMAX_T, bestBrier = Infinity;
    const tEntries = [];
    for (const [tStr, data] of Object.entries(m.tempResults)) {
      const t = parseFloat(tStr);
      const brier = data.count > 0 ? data.brier / data.count : 1;
      const top1 = rc > 0 ? Math.round(data.top1 / rc * 100) : 0;
      const triROI = data.triBet > 0 ? Math.round(data.triRet / data.triBet * 100) : 0;
      if (brier < bestBrier) { bestBrier = brier; bestT = t; }
      tEntries.push({ t, brier, top1, triROI });
    }
    
    for (const te of tEntries) {
      const isBest = te.t === bestT;
      const isCurrent = te.t === SOFTMAX_T;
      const row = h('div',{style:{display:'flex',alignItems:'center',gap:'6px',padding:'3px 0',borderBottom:'1px solid var(--bd)',fontSize:'12px',background:isBest?'rgba(48,192,96,0.06)':'transparent'}});
      row.appendChild(h('span',{style:{minWidth:'35px',fontFamily:'JetBrains Mono,monospace',fontWeight:isCurrent?800:400}},`T=${te.t}`));
      row.appendChild(h('span',{style:{minWidth:'70px',color:isBest?'var(--ok)':'var(--tx3)'}},`Brier ${te.brier.toFixed(4)}`));
      row.appendChild(h('span',{style:{minWidth:'55px'}},`1着${te.top1}%`));
      row.appendChild(h('span',{style:{minWidth:'55px',color:te.triROI>=100?'var(--ok)':te.triROI>=70?'var(--warn)':'var(--tx4)'}},`ROI${te.triROI}%`));
      if (isBest) row.appendChild(h('span',{style:{color:'var(--ok)',fontWeight:700,fontSize:'11px'}},'← 最適'));
      if (isCurrent && !isBest) row.appendChild(h('span',{style:{color:'var(--warn)',fontSize:'11px'}},'← 現在'));
      tempCard.appendChild(row);
    }
    
    if (bestT !== SOFTMAX_T) {
      tempCard.appendChild(h('div',{style:{marginTop:'6px',padding:'4px 8px',borderRadius:'var(--r-sm)',background:'rgba(240,160,48,0.1)',fontSize:'12px',color:'var(--warn)',fontWeight:600}},
        `⚠️ T=${bestT} に変更するとBrier Score改善 (${(bestBrier).toFixed(4)} vs 現在)`));
    }
    wrap.appendChild(tempCard);
  }
  
  // ═══ セクション7: 旧重み比較 ═══
  
  // ═══ セクション6.8: ファクター重要度分析 ═══
  if (DEV_MODE && m.factorImportance) {
    const fiCard = h('div',{style:{marginBottom:'10px',padding:'8px 10px',borderRadius:'var(--r)',background:'var(--sf)'}});
    fiCard.appendChild(h('div',{style:{fontSize:'13px',fontWeight:700,marginBottom:'4px'}},'🎯 ファクター重要度（偏相関分析）'));
    fiCard.appendChild(h('div',{style:{fontSize:'10px',color:'var(--tx4)',marginBottom:'6px'}},'偏相関=他ファクターの影響を除いた独自貢献度。多重共線性を考慮した推奨重み'));
    
    const factorLabels = {wr:'勝率',st:'ST',mt:'モーター',crs:'コース',cls:'級別',ex:'展示'};
    const currentW = {wr:W.wr,st:W.st,mt:W.mt,crs:W.crs,cls:W.cls,ex:0.05};
    const pCorrs = m.partialCorrs || {};
    const sorted = Object.entries(m.factorImportance).sort((a,b) => Math.abs(b[1]) - Math.abs(a[1]));
    
    for (const [f, r] of sorted) {
      const label = factorLabels[f] || f;
      const barW = Math.round(Math.abs(r) * 200);
      const color = r > 0 ? '#22c55e' : '#f05252';
      const suggested = m.suggestedWeights?.[f];
      const current = currentW[f] || 0;
      
      const row = h('div',{style:{display:'flex',alignItems:'center',gap:'5px',padding:'2px 0',borderBottom:'1px solid var(--bd)',fontSize:'12px'}});
      row.appendChild(h('span',{style:{minWidth:'42px',fontWeight:600}},label));
      row.appendChild(h('div',{style:{flex:1,height:'10px',borderRadius:'5px',background:'var(--sf2)',overflow:'hidden'}},
        h('div',{style:{width:Math.min(100,barW)+'%',height:'100%',borderRadius:'5px',background:color}})));
      row.appendChild(h('span',{style:{minWidth:'40px',fontFamily:'JetBrains Mono,monospace',color:Math.abs(r)>0.1?color:'var(--tx3)'}},r.toFixed(3)));
      const pc = pCorrs[f];
      if (pc != null) {
        const pcColor = Math.abs(pc) > 0.05 ? (pc > 0 ? '#22c55e' : '#f05252') : 'var(--tx4)';
        row.appendChild(h('span',{style:{minWidth:'38px',fontFamily:'JetBrains Mono,monospace',fontSize:'11px',color:pcColor}},pc.toFixed(3)));
      }
      if (suggested != null) {
        const diff = suggested - current;
        row.appendChild(h('span',{style:{minWidth:'55px',fontSize:'11px',color:Math.abs(diff)>0.05?'var(--warn)':'var(--tx4)'}},
          `${(current*100).toFixed(0)}→${(suggested*100).toFixed(0)}%`));
      }
      fiCard.appendChild(row);
    }
    
    if (m.suggestedWeights) {
      fiCard.appendChild(h('div',{style:{marginTop:'4px',fontSize:'11px',color:'var(--warn)'}},
        '💡 推奨重み（偏相関ベース）: ' + Object.entries(m.suggestedWeights).map(([f,w])=>`${factorLabels[f]||f}=${(w*100).toFixed(0)}%`).join(' / ')));
      fiCard.appendChild(h('div',{style:{fontSize:'10px',color:'var(--tx4)',marginTop:'2px'}},
        '※ 偏相関は因果関係を保証しない。適用後は必ずバックテストで効果検証してください'));
      
      // 適用ボタン
      fiCard.appendChild(h('button',{className:'btn-primary',style:{marginTop:'6px',fontSize:'12px',padding:'4px 12px'},onClick:()=>{
        const sw = m.suggestedWeights;
        if(sw.wr!=null) W.wr = sw.wr;
        if(sw.st!=null) W.st = sw.st;
        if(sw.mt!=null) W.mt = sw.mt;
        if(sw.crs!=null) W.crs = sw.crs;
        if(sw.cls!=null) W.cls = sw.cls;
        /* console.log('[WEIGHTS] Applied suggested weights:', JSON.str */
        alert('推奨重みを適用しました。再バックテストで効果を確認してください。');
        render();
      }},'🔄 推奨重みを適用'));
    }
    wrap.appendChild(fiCard);
  }

  // ═══ セクション6.5: コース連動率（実測 vs ハードコード）═══
  if (DEV_MODE && state._bt?.linkage) {
    const lkCard = h('div',{style:{marginBottom:'10px',padding:'8px 10px',borderRadius:'var(--r)',background:'var(--sf)'}});
    lkCard.appendChild(h('div',{style:{fontSize:'13px',fontWeight:700,marginBottom:'4px'}},'🔗 コース連動率（実測データ）'));
    lkCard.appendChild(h('div',{style:{fontSize:'11px',color:'var(--tx4)',marginBottom:'6px'}},'1着コース → 2着コースの実測倍率 (1.0=均等)'));
    
    const hardcoded = {
      1:{2:1.6,3:1.2,4:1.0,5:0.7,6:0.7},
      2:{1:1.3,3:1.2,4:1.0,5:1.0,6:1.0},
      3:{1:0.6,2:0.8,4:1.5,5:1.0,6:1.0},
      4:{1:0.6,2:0.8,3:1.0,5:1.5,6:1.0},
      5:{1:1.1,2:1.0,3:1.0,4:1.3,6:1.0},
      6:{1:1.1,2:1.0,3:1.0,4:1.0,5:1.3},
    };
    
    const lnk = state._bt.linkage;
    // 最も乖離が大きいパターンTOP5を表示
    const deviations = [];
    for (const c1 of Object.keys(lnk)) {
      for (const c2 of Object.keys(lnk[c1])) {
        const emp = lnk[c1][c2];
        const hc = hardcoded[c1]?.[c2] || 1.0;
        deviations.push({ c1:parseInt(c1), c2:parseInt(c2), emp, hc, diff: Math.abs(emp - hc) });
      }
    }
    deviations.sort((a,b) => b.diff - a.diff);
    
    for (const d of deviations.slice(0, 8)) {
      const improved = Math.abs(d.emp - 1.0) > 0.05; // 実測に有意な偏りがある
      const row = h('div',{style:{display:'flex',alignItems:'center',gap:'6px',padding:'2px 0',borderBottom:'1px solid var(--bd)',fontSize:'12px'}});
      row.appendChild(h('span',{style:{minWidth:'55px',color:'var(--tx2)'}},`${d.c1}C→${d.c2}C`));
      row.appendChild(h('span',{style:{minWidth:'55px',color:'var(--tx3)'}},`旧:${d.hc.toFixed(2)}`));
      row.appendChild(h('span',{style:{minWidth:'55px',fontWeight:700,color:d.diff>0.3?'var(--warn)':'var(--tx2)'}},`実測:${d.emp.toFixed(2)}`));
      row.appendChild(h('span',{style:{fontSize:'11px',color:d.diff>0.3?'var(--err)':d.diff>0.1?'var(--warn)':'var(--ok)'}},
        d.diff>0.3?'⚠️ 大幅乖離':d.diff>0.1?'△ 要調整':'✓ 近似'));
      lkCard.appendChild(row);
    }
    
    if (window.EMPIRICAL_LINKAGE) {
      lkCard.appendChild(h('div',{style:{marginTop:'4px',fontSize:'11px',color:'var(--ok)',fontWeight:600}},'✅ 実測倍率を予測エンジンに自動適用済み'));
    }
    wrap.appendChild(lkCard);
  }

  // ═══ セクション7: 旧重み比較 ═══
  if (DEV_MODE && m.oldTop1 != null) {
    const oldTop1Rate = rc > 0 ? Math.round(m.oldTop1 / rc * 100) : 0;
    const oldROI = m.winBet > 0 ? Math.round(m.oldWinReturn / m.winBet * 100) : 0;
    const cmpBox = h('div',{style:{marginBottom:'10px',padding:'8px 10px',borderRadius:'var(--r)',background:'var(--sf)',fontSize:'12px'}});
    cmpBox.appendChild(h('div',{style:{fontWeight:700,marginBottom:'4px'}},'⚖️ 重み比較'));
    const cmpGrid = h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'4px',textAlign:'center'}});
    cmpGrid.appendChild(h('div',{style:{color:'var(--tx4)'}},''));
    cmpGrid.appendChild(h('div',{style:{color:'var(--tx3)',fontWeight:600}},'旧'));
    cmpGrid.appendChild(h('div',{style:{color:'var(--ac-t)',fontWeight:600}},'新'));
    cmpGrid.appendChild(h('div',{style:{color:'var(--tx3)',textAlign:'left'}},'1着'));
    cmpGrid.appendChild(h('div',{style:{fontFamily:'JetBrains Mono,monospace'}},oldTop1Rate+'%'));
    cmpGrid.appendChild(h('div',{style:{fontFamily:'JetBrains Mono,monospace',fontWeight:700,color:top1Rate>oldTop1Rate?'var(--ok)':'var(--err)'}},top1Rate+'%'));
    cmpGrid.appendChild(h('div',{style:{color:'var(--tx3)',textAlign:'left'}},'単勝ROI'));
    cmpGrid.appendChild(h('div',{style:{fontFamily:'JetBrains Mono,monospace'}},oldROI+'%'));
    cmpGrid.appendChild(h('div',{style:{fontFamily:'JetBrains Mono,monospace',fontWeight:700,color:winROI>oldROI?'var(--ok)':'var(--err)'}},winROI+'%'));
    cmpBox.appendChild(cmpGrid);
    wrap.appendChild(cmpBox);
  }
  
  // ═══ v16: 展示あり/なし別統計 ═══
  if (m.prevStats) {
    const pw = m.prevStats.with, pwo = m.prevStats.without;
    const pvCard = h('div',{style:{marginBottom:'10px',padding:'8px 10px',borderRadius:'var(--r)',background:'var(--sf)'}});
    pvCard.appendChild(h('div',{style:{fontSize:'13px',fontWeight:700,marginBottom:'6px'}},'🔬 展示データ影響分析'));
    
    if (pwo.total === 0) {
      // BTデータに展示なしレースがない場合
      pvCard.appendChild(h('div',{style:{fontSize:'12px',color:'var(--tx3)',lineHeight:'1.6',padding:'6px',borderRadius:'var(--r-sm)',background:'rgba(255,255,255,0.02)'}},
        `全${pw.total}Rに展示データあり — 展示あり/なしの比較は不可。パラメータ変更→BT再実行で影響を測定。`));
    } else {
    const pvGrid = h('div',{style:{display:'grid',gridTemplateColumns:'auto 1fr 1fr',gap:'4px 10px',fontSize:'12px',textAlign:'right'}});
    pvGrid.appendChild(h('div',{style:{textAlign:'left',color:'var(--tx4)',fontWeight:600}},''));
    pvGrid.appendChild(h('div',{style:{fontWeight:600,color:'var(--ok)'}},'展示あり'));
    pvGrid.appendChild(h('div',{style:{fontWeight:600,color:'var(--tx3)'}},'展示なし'));
    const addPvRow = (label, v1, v2, better) => {
      pvGrid.appendChild(h('div',{style:{textAlign:'left',color:'var(--tx3)'}},label));
      pvGrid.appendChild(h('div',{style:{fontFamily:'JetBrains Mono,monospace',fontWeight:better==='with'?800:400,color:better==='with'?'var(--ok)':'var(--tx)'}},v1));
      pvGrid.appendChild(h('div',{style:{fontFamily:'JetBrains Mono,monospace',fontWeight:better==='without'?800:400,color:better==='without'?'var(--ok)':'var(--tx)'}},v2));
    };
    const wROI = pw.bet > 0 ? Math.round(pw.ret / pw.bet * 100) : 0;
    const woROI = pwo.bet > 0 ? Math.round(pwo.ret / pwo.bet * 100) : 0;
    const wBrier = pw.brierN > 0 ? (pw.brier / pw.brierN).toFixed(4) : '—';
    const woBrier = pwo.brierN > 0 ? (pwo.brier / pwo.brierN).toFixed(4) : '—';
    const wT1 = pw.total > 0 ? Math.round(pw.top1 / pw.total * 100) : 0;
    const woT1 = pwo.total > 0 ? Math.round(pwo.top1 / pwo.total * 100) : 0;
    addPvRow('レース数', pw.total+'R', pwo.total+'R', '');
    addPvRow('3連単ROI', wROI+'%', woROI+'%', wROI>woROI?'with':'without');
    addPvRow('Brier', wBrier, woBrier, parseFloat(wBrier)<parseFloat(woBrier)?'with':'without');
    addPvRow('1着的中', wT1+'%', woT1+'%', wT1>woT1?'with':'without');
    pvCard.appendChild(pvGrid);
    const diff = wROI - woROI;
    pvCard.appendChild(h('div',{style:{marginTop:'6px',fontSize:'12px',fontWeight:700,color:diff>0?'var(--ok)':diff<0?'var(--err)':'var(--tx3)'}},
      diff > 0 ? `→ 展示データの価値: ROI +${diff}pt` : diff < 0 ? `→ 展示なしの方がROI ${Math.abs(diff)}pt高い（展示重み要見直し）` : '→ 差なし'));
    } // end else (pwo.total > 0)
    
    // 展示パラメータ調整UI
    pvCard.appendChild(h('div',{style:{marginTop:'8px',paddingTop:'8px',borderTop:'1px solid var(--bd)'}}));
    pvCard.appendChild(h('div',{style:{fontSize:'11px',fontWeight:700,color:'var(--tx2)',marginBottom:'6px'}},'⚙️ 展示重みパラメータ'));
    pvCard.appendChild(h('div',{style:{fontSize:'10px',color:'var(--tx4)',marginBottom:'6px'}},'変更後にBT再実行で効果を検証'));
    
    // ST混入比率
    const stRow = h('div',{style:{display:'flex',alignItems:'center',gap:'6px',marginBottom:'4px'}});
    stRow.appendChild(h('span',{style:{fontSize:'11px',color:'var(--tx3)',minWidth:'80px'}},'ST混入比率'));
    const stOpts = [0, 0.15, 0.25, 0.35, 0.45];
    for (const v of stOpts) {
      const isActive = Math.abs(EX_PARAMS.stBlend - v) < 0.01;
      stRow.appendChild(h('button',{style:{fontSize:'10px',padding:'2px 6px',borderRadius:'4px',border:`1px solid ${isActive?'var(--ac)':'var(--bd)'}`,background:isActive?'var(--ac-s)':'transparent',color:isActive?'var(--ac-t)':'var(--tx3)',cursor:'pointer',fontFamily:'JetBrains Mono,monospace'},
        onClick:()=>{EX_PARAMS.stBlend=v;render();}},v===0?'OFF':String(v)));
    }
    pvCard.appendChild(stRow);
    
    // 展示タイム係数
    const exRow = h('div',{style:{display:'flex',alignItems:'center',gap:'6px',marginBottom:'4px'}});
    exRow.appendChild(h('span',{style:{fontSize:'11px',color:'var(--tx3)',minWidth:'80px'}},'タイム係数'));
    const exOpts = [0, 1.5, 3.0, 4.5, 6.0];
    for (const v of exOpts) {
      const isActive = Math.abs(EX_PARAMS.exCoeff - v) < 0.01;
      exRow.appendChild(h('button',{style:{fontSize:'10px',padding:'2px 6px',borderRadius:'4px',border:`1px solid ${isActive?'var(--ac)':'var(--bd)'}`,background:isActive?'var(--ac-s)':'transparent',color:isActive?'var(--ac-t)':'var(--tx3)',cursor:'pointer',fontFamily:'JetBrains Mono,monospace'},
        onClick:()=>{EX_PARAMS.exCoeff=v;render();}},v===0?'OFF':String(v)));
    }
    pvCard.appendChild(exRow);
    
    // 現在値表示
    pvCard.appendChild(h('div',{style:{fontSize:'10px',color:'var(--tx4)',marginTop:'4px'}},
      `現在: stBlend=${EX_PARAMS.stBlend} / exCoeff=${EX_PARAMS.exCoeff}`));
    
    wrap.appendChild(pvCard);
  }

  // ═══ v16: 確率閾値グリッドサーチ結果 ═══
  if (m.probFilter && Object.keys(m.probFilter).length > 0) {
    const pfCard = h('div',{style:{marginBottom:'10px',padding:'8px 10px',borderRadius:'var(--r)',background:'var(--sf)'}});
    pfCard.appendChild(h('div',{style:{fontSize:'13px',fontWeight:700,marginBottom:'4px'}},'📊 戦略比較（確率閾値グリッドサーチ）'));
    pfCard.appendChild(h('div',{style:{fontSize:'10px',color:'var(--tx4)',marginBottom:'6px'}},'予測確率≥X%の目にのみベットした場合のROI'));
    const pfTbl = h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:'12px'}});
    const pfHead = h('tr');
    ['閾値','投資','的中数','的中率','ROI','見送り'].forEach(c => {
      pfHead.appendChild(h('th',{style:{padding:'3px 4px',textAlign:c==='閾値'?'left':'right',borderBottom:'1px solid var(--bd)',color:'var(--tx4)',fontWeight:600,fontSize:'11px'}},c));
    });
    pfTbl.appendChild(pfHead);
    // TOP3も追加
    const allStrats = [['TOP3', {bet:m.triBet,ret:m.triReturn,hit:m.triHit,total:m.triTotal,skip:0}], ...Object.entries(m.probFilter).sort((a,b)=>parseFloat(a[0])-parseFloat(b[0]))];
    if (m.selectiveBet) allStrats.push(['S+A', m.selectiveBet]);
    for (const [label, s] of allStrats) {
      const roi = s.bet > 0 ? Math.round(s.ret / s.bet * 100) : 0;
      const hitRate = s.total > 0 ? (s.hit / s.total * 100).toFixed(1) : '0';
      const rc = roi >= 100 ? 'var(--ok)' : roi >= 80 ? 'var(--warn)' : 'var(--err)';
      const row = h('tr',{style:{borderBottom:'1px solid var(--bd)',background:roi>=100?'rgba(48,192,96,0.04)':roi>=90?'rgba(240,160,48,0.04)':''}});
      row.appendChild(h('td',{style:{padding:'3px 4px',fontWeight:label==='TOP3'?800:600}},label));
      row.appendChild(h('td',{style:{padding:'3px 4px',textAlign:'right',fontFamily:'JetBrains Mono,monospace'}},'¥'+(s.bet||0).toLocaleString()));
      row.appendChild(h('td',{style:{padding:'3px 4px',textAlign:'right',fontFamily:'JetBrains Mono,monospace'}},`${s.hit||0}/${s.total||0}`));
      row.appendChild(h('td',{style:{padding:'3px 4px',textAlign:'right',fontFamily:'JetBrains Mono,monospace'}},hitRate+'%'));
      row.appendChild(h('td',{style:{padding:'3px 4px',textAlign:'right',fontWeight:800,color:rc,fontFamily:'JetBrains Mono,monospace'}},roi+'%'));
      row.appendChild(h('td',{style:{padding:'3px 4px',textAlign:'right',fontSize:'11px',color:'var(--tx4)'}},s.skip||0));
      pfTbl.appendChild(row);
    }
    pfCard.appendChild(pfTbl);
    wrap.appendChild(pfCard);
  }

  // ═══ v16.1: 道B — スキップ戦略グリッドサーチ ═══
  if (m.skipStrats && Object.keys(m.skipStrats).length > 0) {
    const ssCard = h('div',{style:{marginBottom:'10px',padding:'8px 10px',borderRadius:'var(--r)',background:'var(--sf)'}});
    ssCard.appendChild(h('div',{style:{fontSize:'13px',fontWeight:700,marginBottom:'4px'}},'🚫 スキップ戦略比較'));
    ssCard.appendChild(h('div',{style:{fontSize:'10px',color:'var(--tx4)',marginBottom:'6px'}},'条件を満たすレースのみベット時のROI'));
    const ssTbl = h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:'11px'}});
    const ssHead = h('tr');
    ['条件','ROI','的中率','ベット数','スキップ'].forEach(c => {
      ssHead.appendChild(h('th',{style:{padding:'2px 3px',textAlign:c==='条件'?'left':'right',borderBottom:'1px solid var(--bd)',color:'var(--tx4)',fontSize:'10px'}},c));
    });
    ssTbl.appendChild(ssHead);
    const sorted = Object.entries(m.skipStrats).sort((a,b) => {
      const roiA = a[1].bet > 0 ? a[1].ret / a[1].bet : 0;
      const roiB = b[1].bet > 0 ? b[1].ret / b[1].bet : 0;
      return roiB - roiA;
    });
    for (const [name, s] of sorted) {
      if (s.total < 100) continue;
      const roi = s.bet > 0 ? Math.round(s.ret / s.bet * 100) : 0;
      const hitRate = s.total > 0 ? (s.hit / s.total * 100).toFixed(1) : '0';
      const rc = roi >= 100 ? 'var(--ok)' : roi >= 85 ? 'var(--warn)' : 'var(--err)';
      const isBest = sorted[0][0] === name;
      const row = h('tr',{style:{borderBottom:'1px solid var(--bd)',background:roi>=100?'rgba(48,192,96,0.06)':isBest?'rgba(240,160,48,0.04)':''}});
      row.appendChild(h('td',{style:{padding:'2px 3px',fontWeight:isBest?800:600,fontSize:'11px'}},name));
      row.appendChild(h('td',{style:{padding:'2px 3px',textAlign:'right',fontWeight:800,color:rc,fontFamily:'JetBrains Mono,monospace'}},roi+'%'));
      row.appendChild(h('td',{style:{padding:'2px 3px',textAlign:'right',fontFamily:'JetBrains Mono,monospace'}},hitRate+'%'));
      row.appendChild(h('td',{style:{padding:'2px 3px',textAlign:'right',color:'var(--tx3)'}},s.total.toLocaleString()+'R'));
      row.appendChild(h('td',{style:{padding:'2px 3px',textAlign:'right',color:'var(--tx4)'}},s.skip.toLocaleString()));
      ssTbl.appendChild(row);
    }
    ssCard.appendChild(ssTbl);
    wrap.appendChild(ssCard);
  }

  // ═══ v16.1: 道C — 買い方比較 ═══
  if (m.betStyles && Object.keys(m.betStyles).length > 0) {
    const bsCard = h('div',{style:{marginBottom:'10px',padding:'8px 10px',borderRadius:'var(--r)',background:'var(--sf)'}});
    bsCard.appendChild(h('div',{style:{fontSize:'13px',fontWeight:700,marginBottom:'4px'}},'🎯 買い方比較'));
    bsCard.appendChild(h('div',{style:{fontSize:'10px',color:'var(--tx4)',marginBottom:'6px'}},'同じ予測で買い方を変えた場合のROI'));
    for (const [name, s] of Object.entries(m.betStyles)) {
      if (s.total < 100) continue;
      const roi = s.bet > 0 ? Math.round(s.ret / s.bet * 100) : 0;
      const hitRate = s.total > 0 ? (s.hit / s.total * 100).toFixed(1) : '0';
      const rc = roi >= 100 ? 'var(--ok)' : roi >= 85 ? 'var(--warn)' : 'var(--err)';
      const row = h('div',{style:{display:'flex',justifyContent:'space-between',padding:'3px 0',borderBottom:'1px solid var(--bd)',fontSize:'12px'}});
      row.appendChild(h('span',{style:{fontWeight:600,flex:'1'}},name));
      row.appendChild(h('span',{style:{color:'var(--tx3)',minWidth:'50px',textAlign:'right'}},s.total+'R'));
      row.appendChild(h('span',{style:{fontFamily:'JetBrains Mono,monospace',minWidth:'50px',textAlign:'right'}},hitRate+'%'));
      row.appendChild(h('span',{style:{fontWeight:800,color:rc,fontFamily:'JetBrains Mono,monospace',minWidth:'60px',textAlign:'right'}},`ROI ${roi}%`));
      bsCard.appendChild(row);
    }
    wrap.appendChild(bsCard);
  }

  // ═══ v16.1: 道A — 事後EV分析 ═══
  if (DEV_MODE && m.postEV && Object.keys(m.postEV.evBuckets || {}).length > 0) {
    const peCard = h('div',{style:{marginBottom:'10px',padding:'8px 10px',borderRadius:'var(--r)',background:'var(--sf)'}});
    peCard.appendChild(h('div',{style:{fontSize:'13px',fontWeight:700,marginBottom:'4px'}},'💡 事後EV分析'));
    peCard.appendChild(h('div',{style:{fontSize:'10px',color:'var(--tx4)',marginBottom:'6px'}},'的中時: 予測確率×配当÷100 = 市場対比のEV'));
    const order = ['2.0+','1.5-2.0','1.0-1.5','0.5-1.0','<0.5'];
    for (const key of order) {
      const b = m.postEV.evBuckets[key];
      if (!b || b.n === 0) continue;
      const avgPay = Math.round(b.totalPay / b.n);
      const isGood = key.startsWith('2') || key.startsWith('1.');
      const row = h('div',{style:{display:'flex',gap:'10px',padding:'2px 0',fontSize:'12px',borderBottom:'1px solid var(--bd)'}});
      row.appendChild(h('span',{style:{fontWeight:600,minWidth:'60px',color:isGood?'var(--ok)':'var(--tx3)'}},`EV ${key}`));
      row.appendChild(h('span',{style:{color:'var(--tx3)'}},b.n+'件'));
      row.appendChild(h('span',{style:{fontFamily:'JetBrains Mono,monospace'}},`平均¥${avgPay.toLocaleString()}`));
      peCard.appendChild(row);
    }
    if (m.postEV.profitable?.length > 0) {
      const highEV = m.postEV.profitable.filter(p => p.ev >= 1.0);
      peCard.appendChild(h('div',{style:{marginTop:'6px',fontSize:'11px',color:highEV.length > 0?'var(--ok)':'var(--tx3)',fontWeight:600}},
        `事後EV≥1.0の的中: ${highEV.length}件 / ${m.postEV.profitable.length}件 (${Math.round(highEV.length/m.postEV.profitable.length*100)}%)`));
    }
    wrap.appendChild(peCard);
  }

  // ═══ v16: 配当ゾーン分析 ═══
  if (DEV_MODE && m.payoutZones && m.payoutZones.length > 0) {
    const pzCard = h('div',{style:{marginBottom:'10px',padding:'8px 10px',borderRadius:'var(--r)',background:'var(--sf)'}});
    pzCard.appendChild(h('div',{style:{fontSize:'13px',fontWeight:700,marginBottom:'4px'}},'💰 配当ゾーン分析'));
    pzCard.appendChild(h('div',{style:{fontSize:'10px',color:'var(--tx4)',marginBottom:'6px'}},'的中した目の配当帯別・予測確率の分布'));
    const zones = {'~10x':[], '10-50x':[], '50-200x':[], '200x~':[]};
    for (const pz of m.payoutZones) {
      const z = pz.pay < 1000 ? '~10x' : pz.pay < 5000 ? '10-50x' : pz.pay < 20000 ? '50-200x' : '200x~';
      zones[z].push(pz);
    }
    for (const [zone, items] of Object.entries(zones)) {
      if (items.length === 0) continue;
      const probs = items.map(i => i.prob).sort((a,b) => a-b);
      const median = probs[Math.floor(probs.length/2)];
      const avgPay = Math.round(items.reduce((s,i) => s+i.pay, 0) / items.length);
      const row = h('div',{style:{display:'flex',justifyContent:'space-between',padding:'2px 0',borderBottom:'1px solid var(--bd)',fontSize:'12px'}});
      row.appendChild(h('span',{style:{fontWeight:600}},zone));
      row.appendChild(h('span',{style:{color:'var(--tx3)'}},items.length+'件'));
      row.appendChild(h('span',{style:{fontFamily:'JetBrains Mono,monospace'}},`中央値${(median*100).toFixed(1)}%`));
      row.appendChild(h('span',{style:{fontFamily:'JetBrains Mono,monospace',color:'var(--warn)'}},`平均¥${avgPay.toLocaleString()}`));
      pzCard.appendChild(row);
    }
    wrap.appendChild(pzCard);
  }

  // ═══ v16: 2-5%帯キャリブ診断 ═══
  if (DEV_MODE && m.calibDiag) {
    const cdCard = h('div',{style:{marginBottom:'10px',padding:'8px 10px',borderRadius:'var(--r)',background:'var(--sf)'}});
    cdCard.appendChild(h('div',{style:{fontSize:'13px',fontWeight:700,marginBottom:'4px'}},'🔍 2-5%帯キャリブレーション診断'));
    for (const [band, d] of Object.entries(m.calibDiag)) {
      if (d.n === 0) continue;
      const actualRate = (d.hit / d.n * 100).toFixed(2);
      const expectedMid = band === '2-3%' ? 2.5 : band === '3-4%' ? 3.5 : 4.5;
      const deviation = (parseFloat(actualRate) - expectedMid).toFixed(1);
      const devColor = Math.abs(parseFloat(deviation)) > 1.0 ? 'var(--err)' : 'var(--ok)';
      const row = h('div',{style:{display:'flex',gap:'10px',padding:'2px 0',fontSize:'12px'}});
      row.appendChild(h('span',{style:{fontWeight:600,minWidth:'40px'}},band));
      row.appendChild(h('span',{style:{color:'var(--tx3)'}},d.n.toLocaleString()+'件'));
      row.appendChild(h('span',{style:{fontFamily:'JetBrains Mono,monospace'}},`実測${actualRate}%`));
      row.appendChild(h('span',{style:{fontFamily:'JetBrains Mono,monospace',color:devColor}},`乖離${deviation>0?'+':''}${deviation}%`));
      cdCard.appendChild(row);
    }
    wrap.appendChild(cdCard);
  }

  // ═══ v16: レース格別統計 ═══
  if (DEV_MODE && m.gradeStats && Object.keys(m.gradeStats).length > 0) {
    const gsCard = h('div',{style:{marginBottom:'10px',padding:'8px 10px',borderRadius:'var(--r)',background:'var(--sf)'}});
    gsCard.appendChild(h('div',{style:{fontSize:'13px',fontWeight:700,marginBottom:'4px'}},'🏆 レース格別ROI'));
    for (const [grade, s] of Object.entries(m.gradeStats).sort((a,b) => (b[1].total) - (a[1].total))) {
      if (s.total < 3) continue;
      const roi = s.bet > 0 ? Math.round(s.ret / s.bet * 100) : 0;
      const rc = roi >= 100 ? 'var(--ok)' : roi >= 80 ? 'var(--warn)' : 'var(--err)';
      const row = h('div',{style:{display:'flex',gap:'10px',padding:'2px 0',fontSize:'12px',borderBottom:'1px solid var(--bd)'}});
      row.appendChild(h('span',{style:{fontWeight:600,minWidth:'30px'}},grade));
      row.appendChild(h('span',{style:{color:'var(--tx3)'}},s.total+'R'));
      row.appendChild(h('span',{style:{fontFamily:'JetBrains Mono,monospace'}},`${s.hit}/${s.total}的中`));
      row.appendChild(h('span',{style:{fontFamily:'JetBrains Mono,monospace',fontWeight:700,color:rc}},`ROI ${roi}%`));
      gsCard.appendChild(row);
    }
    wrap.appendChild(gsCard);
  }

  // ═══ v16.2: 格×閾値クロス集計マトリクス ═══
  if (m.gradeCross && Object.keys(m.gradeCross).length > 0) {
    const gcCard = h('div',{style:{marginBottom:'10px',padding:'8px 10px',borderRadius:'var(--r)',background:'var(--sf)'}});
    gcCard.appendChild(h('div',{style:{fontSize:'13px',fontWeight:700,marginBottom:'4px'}},'📊 格×戦略クロス集計'));
    gcCard.appendChild(h('div',{style:{fontSize:'10px',color:'var(--tx4)',marginBottom:'6px'}},'レース格ごとに各戦略のROIを比較'));
    
    // グレード一覧を取得
    const grades = [...new Set(Object.keys(m.gradeCross).map(k => k.split('|')[0]))].sort((a,b) => {
      const order = {'SG':0,'PG1':1,'G1':2,'G2':3,'G3':4,'一般':5};
      return (order[a]??9) - (order[b]??9);
    });
    const strats = ['TOP3','2%','3%','5%','8%','gap>0.2'];
    
    const tbl = h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:'11px'}});
    // ヘッダー
    const thead = h('tr');
    thead.appendChild(h('th',{style:{padding:'2px 3px',textAlign:'left',borderBottom:'2px solid var(--bd)',color:'var(--tx4)',fontSize:'10px'}},'格'));
    for (const s of strats) {
      thead.appendChild(h('th',{style:{padding:'2px 3px',textAlign:'right',borderBottom:'2px solid var(--bd)',color:'var(--tx4)',fontSize:'10px'}},s));
    }
    tbl.appendChild(thead);
    
    // 各グレード
    for (const grade of grades) {
      const row = h('tr',{style:{borderBottom:'1px solid var(--bd)'}});
      row.appendChild(h('td',{style:{padding:'3px',fontWeight:700,fontSize:'12px'}},grade));
      let bestROI = 0, bestStrat = '';
      for (const s of strats) {
        const key = `${grade}|${s}`;
        const d = m.gradeCross[key];
        if (d && d.total >= 10) {
          const roi = d.bet > 0 ? Math.round(d.ret / d.bet * 100) : 0;
          if (roi > bestROI) { bestROI = roi; bestStrat = s; }
        }
      }
      for (const s of strats) {
        const key = `${grade}|${s}`;
        const d = m.gradeCross[key];
        if (!d || d.total < 10) {
          row.appendChild(h('td',{style:{padding:'3px',textAlign:'right',color:'var(--tx4)',fontSize:'10px'}},d?`${d.total}R`:'—'));
          continue;
        }
        const roi = d.bet > 0 ? Math.round(d.ret / d.bet * 100) : 0;
        const isBest = s === bestStrat && bestROI > 0;
        const rc = roi >= 100 ? 'var(--ok)' : roi >= 90 ? '#f0a030' : roi >= 80 ? 'var(--warn)' : 'var(--err)';
        const cell = h('td',{style:{padding:'3px',textAlign:'right',fontFamily:'JetBrains Mono,monospace',fontWeight:isBest?900:600,color:rc,fontSize:isBest?'12px':'11px',background:roi>=100?'rgba(48,192,96,0.08)':isBest?'rgba(240,160,48,0.05)':''}});
        cell.appendChild(h('div',null,roi+'%'));
        cell.appendChild(h('div',{style:{fontSize:'9px',color:'var(--tx4)',fontWeight:400}},d.total+'R'));
        row.appendChild(cell);
      }
      tbl.appendChild(row);

    vnTable.innerHTML = `<div style="display:flex;padding:2px 0;color:var(--tx3);border-bottom:1px solid var(--sf)"><span style="flex:1">場</span><span style="width:65px;text-align:right">前半</span><span style="width:65px;text-align:right">後半</span><span style="width:50px;text-align:right">判定</span></div>`;
    // 全場をROI順でソート
    const allVenues = new Set([...Object.keys(h1.venueStats), ...Object.keys(h2.venueStats)]);
    const venueRows = [];
    for (const vid of allVenues) {
      const v1 = h1.venueStats[vid], v2 = h2.venueStats[vid];
      const r1 = v1 && v1.bet > 0 ? Math.round(v1.ret / v1.bet * 100) : null;
      const r2 = v2 && v2.bet > 0 ? Math.round(v2.ret / v2.bet * 100) : null;
      const avg = (r1 !== null && r2 !== null) ? (r1+r2)/2 : (r1||r2||0);
      const n1 = v1 ? v1.total : 0, n2 = v2 ? v2.total : 0;
      const name = (v1||v2)?.name || vid;
      const diff = (r1 !== null && r2 !== null) ? Math.abs(r1-r2) : 99;
      const stable = diff <= 20;
      venueRows.push({vid, name, r1, r2, n1, n2, avg, stable, diff});
    }
    venueRows.sort((a,b) => b.avg - a.avg);
    // TOP5 + WORST5
    const showVenues = [...venueRows.slice(0,5), null, ...venueRows.slice(-5)];
    for (const vr of showVenues) {
      if (!vr) { vnTable.innerHTML += `<div style="padding:2px 0;color:var(--tx3);text-align:center;font-size:11px">···</div>`; continue; }
      vnTable.innerHTML += `<div style="display:flex;padding:3px 0;border-bottom:1px solid var(--sf)"><span style="flex:1">${vr.name}</span><span style="width:65px;text-align:right;color:${vr.r1!==null&&vr.r1>=100?'var(--ok)':'var(--err)'}">${vr.r1!==null?vr.r1+'%':'-'}<small style="color:var(--tx3)">(${vr.n1})</small></span><span style="width:65px;text-align:right;color:${vr.r2!==null&&vr.r2>=100?'var(--ok)':'var(--err)'}">${vr.r2!==null?vr.r2+'%':'-'}<small style="color:var(--tx3)">(${vr.n2})</small></span><span style="width:50px;text-align:right">${vr.stable?'✅':'⚠️'}</span></div>`;
    }
    vnCard.appendChild(vnTable);
    wfCard.appendChild(vnCard);
    
    // 結論
    const stableCount = thresholds.filter(tk => {
      const t1 = h1.probFilter[tk], t2 = h2.probFilter[tk];
      const r1 = t1&&t1.bet>0 ? t1.ret/t1.bet*100 : 0;
      const r2 = t2&&t2.bet>0 ? t2.ret/t2.bet*100 : 0;
      return Math.abs(r1-r2) <= 15;
    }).length;
    const verdictColor = stableCount >= 2 ? 'var(--ok)' : stableCount >= 1 ? '#fbbf24' : 'var(--err)';
    const verdictText = stableCount >= 2 ? '✅ モデルは安定。フィルタ戦略を採用可能' : stableCount >= 1 ? '⚠️ 一部安定。慎重に採用' : '❌ 不安定。過剰適合の可能性あり';
    wfCard.appendChild(h('div',{style:{marginTop:'10px',padding:'8px',borderRadius:'var(--r)',background:'rgba(251,191,36,0.08)',fontSize:'13px',fontWeight:700,color:verdictColor}}, verdictText));
    
    wrap.appendChild(wfCard);
  }
  
  return wrap;
}

      const g1Cum = [];

      const r2B = g1Second.reduce((s,r)=>s+r.bet,0), r2R = g1Second.reduce((s,r)=>s+r.ret,0);

      const splitRow = h('div',{style:{display:'flex',gap:'16px',fontSize:'11px'}});

      splitRow.appendChild(h('div',null,h('span',{style:{color:'var(--tx4)'}},'後半: '),h('span',{style:{fontWeight:700,color:roi2>=100?'var(--ok)':'var(--warn)',fontFamily:'JetBrains Mono,monospace'}},`ROI ${roi2}% (${g1Second.length}R)`)));
      splitCard.appendChild(splitRow);

      splitCard.appendChild(h('div',{style:{fontSize:'10px',marginTop:'4px',color:consistent?'var(--ok)':'var(--err)',fontWeight:600}},
        consistent ? `✅ 前後半の差${Math.abs(roi1-roi2)}pt → 一貫性あり（過学習リスク低）` : `⚠️ 前後半の差${Math.abs(roi1-roi2)}pt → 不安定（特定期間に偏っている可能性）`));
      g1Card.appendChild(splitCard);

  }

  // 詳細ログ
  if (m.details.length > 0) {
    wrap.appendChild(h('div',{style:{fontSize:'13px',fontWeight:700,margin:'6px 0 4px',color:'var(--tx3)'}},'詳細ログ'));
    const logWrap = h('div',{style:{maxHeight:'200px',overflowY:'auto',fontSize:'11px',lineHeight:'1.7'}});

    }
    wrap.appendChild(logWrap);
  }
  
  return wrap;
}
// ── BT サブ関数: 場別・荒れ度別統計 ──

      row.appendChild(h('span',{style:{textAlign:'right',fontWeight:700,color:roi>=100?'var(--ok)':roi>=80?'var(--warn)':'var(--err)',fontFamily:'JetBrains Mono,monospace'}},roi+'%'));

      vsBox.appendChild(row);
    }
    wrap.appendChild(vsBox);
  }

  // 荒れ度別ROI
  if (m.chaosStats && Object.keys(m.chaosStats).length > 0) {
    const csBox = h('div',{style:{marginTop:'8px',padding:'12px',borderRadius:'var(--r)',background:'rgba(0,0,0,0.15)',border:'1px solid rgba(79,140,255,0.1)'}});
    csBox.appendChild(h('div',{style:{fontSize:'13px',fontWeight:800,marginBottom:'6px',color:'var(--warn)'}},'🌊 荒れ度別ROI'));
    for (const [band, cs] of Object.entries(m.chaosStats).sort((a,b)=>a[0].localeCompare(b[0]))) {
      const roi = cs.bet > 0 ? Math.round(cs.ret / cs.bet * 100) : 0;
      const row = h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'12px',padding:'3px 0'}});
      row.appendChild(h('span',{style:{color:'var(--tx2)'}},band));
      row.appendChild(h('span',{style:{display:'flex',gap:'12px'}},
        h('span',{style:{color:'var(--tx3)'}},`${cs.total}R`),
        h('span',{style:{fontWeight:700,color:roi>=100?'var(--ok)':roi>=80?'var(--warn)':'var(--err)',fontFamily:'JetBrains Mono,monospace'}},roi+'%')
      ));
      csBox.appendChild(row);
    }
    wrap.appendChild(csBox);
  }

  return wrap.childNodes.length > 0 ? wrap : null;
}

      html = html.replace(/①/g,'<span style="color:#e0e0e0;background:#111;padding:0 3px;border-radius:3px;font-weight:700">①</span>');
      html = html.replace(/②/g,'<span style="color:#fff;background:#1a1a1a;padding:0 3px;border-radius:3px;font-weight:700">②</span>');
      html = html.replace(/③/g,'<span style="color:#fff;background:#dc2626;padding:0 3px;border-radius:3px;font-weight:700">③</span>');
      html = html.replace(/④/g,'<span style="color:#fff;background:#2563eb;padding:0 3px;border-radius:3px;font-weight:700">④</span>');
      html = html.replace(/⑤/g,'<span style="color:#111;background:#ca8a04;padding:0 3px;border-radius:3px;font-weight:700">⑤</span>');
      html = html.replace(/⑥/g,'<span style="color:#fff;background:#16a34a;padding:0 3px;border-radius:3px;font-weight:700">⑥</span>');
      html = html.replace(/\n/g, '<br>');
      bubble.innerHTML = html;
    } else {
      bubble.textContent = m.text;
    }
    msg.appendChild(bubble);
    msgs.appendChild(msg);
  }
  if (state.chatGenerating) {
    const typing = h('div', { className:'chat-msg ai' });
    typing.appendChild(h('div', { style:{width:'24px',height:'24px',borderRadius:'50%',background:'linear-gradient(135deg,#4f8cff,#7c5cfc)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'14px',flexShrink:0} }, '🤖'));
    typing.appendChild(renderDots(''));
    msgs.appendChild(typing);
  }
  ov.appendChild(msgs);

  // Suggestions
  if (state.chatMessages.length === 0) {
    const sug = h('div', { className:'chat-suggest' });
    // コンテキスト依存のサジェスチョン
    let suggestions;
    if (state.vid && state.rno) {
      const venue = currentVenue();
      const race = currentRace();
      suggestions = [
        `${venue?.name||''}${race?.number||''}Rの展開予想は？`,
        '1号艇信頼できる？',
        '穴で狙える選手は？',
        '3000円で遊ぶなら？'
      ];
    } else {
      suggestions = CHAT_SUGGESTIONS.slice(0, 4);
    }
    for (const s of suggestions) sug.appendChild(h('button', { onClick:()=>sendChatMessage(s) }, s));
    ov.appendChild(sug);
  }

  // Input
  const inputRow = h('div', { className:'chat-input-row' });
  const inp = h('textarea', { className:'chat-input', placeholder:'メッセージを入力...', rows:1 });
  inp.addEventListener('keydown', ev => { if(ev.key==='Enter'&&!ev.shiftKey){ev.preventDefault();const t=inp.value.trim();if(t)sendChatMessage(t);} });
  inputRow.appendChild(inp);
  const sendBtn = h('button', { className:'chat-send', disabled:state.chatGenerating, onClick:()=>{const t=inp.value.trim();if(t)sendChatMessage(t);} });
  sendBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></svg>';
  inputRow.appendChild(sendBtn);
  ov.appendChild(inputRow);

  document.body.appendChild(ov);
  setTimeout(()=>{const m=document.getElementById('chat-msgs');if(m)m.scrollTop=m.scrollHeight;},50);
}

// Overwrite old renderChatModal for sendChatMessage compatibility
function renderChatModal() { if(state.chatOpen) renderChat(); }

// ═══════ Init ═══════
async function supplementCurrentRace() {
  const venue = currentVenue(), race = currentRace();
  if (!venue || !race) return;
  const sid = venue.id, rno = race.number;
  // Phase 1: 高速データ（展示・結果）→ まとめて1回render
  await Promise.allSettled([
    fetchLivePreview(sid, rno).then(() => markFresh(`pv-${sid}-${rno}`)),
    fetchLiveResult(sid, rno).then(() => markFresh(`rs-${sid}-${rno}`)),
  ]);
  render();
  // Phase 2: 補足データ（オッズ・今節・コース別・支部）→ まとめて1回render
  await Promise.allSettled([
    fetchLiveOdds(sid, rno).then(() => { markFresh(`odds-${sid}-${rno}`); calcOddsAlerts(sid, rno); }).catch(()=>{}),
    supplementSesFromResults(sid).catch(()=>{}),
    buildCourseStatsFromResults(sid, rno).then(() => {
      const missing = race.entries.filter(e => e.regNo && !e.courseStats).length;
      if (missing > 0) return supplementCourseStats(sid, rno);
    }).catch(() => supplementCourseStats(sid, rno).catch(()=>{})),
    supplementBranch(sid, rno).catch(()=>{}),
    supplementBranchFromBR(race.entries).catch(()=>{}),
  ]);
  render();
}

document.addEventListener('DOMContentLoaded', () => {
  loadPickStore(); // v16.4: 今日のpickStoreを復元
  render();
  if (isToday()) { fetchAll(); startAutoRefresh(); }
  
  // v16.4: 10分ごとに日次サマリーを自動保存
  setInterval(() => { saveDailySummary(); savePickStore(); }, 600000);
  
  // v16.4: ページ離脱時にも保存
  window.addEventListener('beforeunload', () => { savePickStore(); saveDailySummary(); });
  document.addEventListener('visibilitychange', () => { if (document.hidden) { savePickStore(); saveDailySummary(); } });
  
  // pull-to-refresh
  let _pullStartY = 0;
  state._pullDist = 0;
  document.addEventListener('touchstart', e => {
    if (window.scrollY <= 0) _pullStartY = e.touches[0].clientY;
    else _pullStartY = 0;
  }, {passive:true});
  document.addEventListener('touchmove', e => {
    if (_pullStartY === 0) return;
    const dy = e.touches[0].clientY - _pullStartY;
    if (dy > 0 && window.scrollY <= 0) {
      state._pullDist = dy;
      if (dy > 20) render();
    }
  }, {passive:true});
  document.addEventListener('touchend', () => {
    if (state._pullDist > 60) {
      state._pullDist = 0;
      fetchAll().then(() => render());
    } else {
      state._pullDist = 0;
      render();
    }
    _pullStartY = 0;
  }, {passive:true});
});
