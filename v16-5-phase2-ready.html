      if (!hasSesData) header.appendChild(h('span',{style:{color:'var(--warn)',fontSize:'12px'}},'※今節成績取得中...'));
      else if (sesCount < unique.length) {
        header.appendChild(h('span',{style:{color:'var(--tx4)',fontSize:'11px'}},`得点率取得: ${sesCount}/${unique.length}名`));
        if (sesCount < unique.length * 0.5) header.appendChild(h('button',{style:{fontSize:'11px',padding:'2px 6px',borderRadius:'var(--r-xs)',background:'rgba(78,142,255,0.1)',color:'var(--ac-t)',border:'1px solid rgba(78,142,255,0.2)',cursor:'pointer',marginLeft:'4px'},onClick:()=>{delete liveCache[`ses-results-${selV.id}`];supplementSesFromResults(selV.id).then(()=>render()).catch(()=>{});}},'🔄 再取得'));
      }
      frag.appendChild(header);
      const listWrap = h('div',{style:{maxHeight:'360px',overflowY:'auto',border:'1px solid var(--bd)',borderRadius:'var(--r)',background:'var(--sf)'}});
      for (let i = 0; i < unique.length; i++) {

        const row = h('div',{style:{display:'flex',alignItems:'center',gap:'6px',padding:'8px 10px',borderBottom:i<unique.length-1?'1px solid var(--bd)':'none',fontSize:'14px',cursor:'pointer',background:i%2===0?'transparent':'rgba(255,255,255,0.02)'},onClick:()=>{state.view='races';state.vid=selV.id;state.rno=e.raceNo;onRaceSelect();render();}});
        const rankColor = i===0?'#f5a623':i===1?'#c0c0c0':i===2?'#cd7f32':'var(--tx4)';
        row.appendChild(h('span',{style:{fontWeight:900,color:rankColor,minWidth:'20px',textAlign:'right',fontSize:i<3?'14px':'12px'}},`${i+1}`));
        row.appendChild(boatBadge(e.bn,18));
        row.appendChild(h('span',{style:{fontWeight:700,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:'14px'}},e.name));
        row.appendChild(h('span',{style:{fontSize:'14px',color:CLS_COLOR[e.cls]||'#aaa',fontWeight:700,minWidth:'22px'}},e.cls));
        row.appendChild(h('span',{style:{fontWeight:800,fontSize:'14px',color:e.sesScore>=7?'var(--ok)':e.sesScore>=5?'var(--tx)':e.sesScore>=3?'var(--warn)':e.hasSes?'var(--err)':'var(--tx4)',minWidth:'32px',textAlign:'right'}},e.hasSes ? e.sesScore.toFixed(1) : '—'));
        if (e.hasSes) row.appendChild(h('span',{style:{color:'var(--tx3)',fontSize:'12px',minWidth:'52px',textAlign:'right'}},`${e.wins}勝/${e.races}走`));

        listWrap.appendChild(row);
      }
      frag.appendChild(listWrap);
    }
  }
  return frag;
}

function renderMyPage() {

        if (hasSes) continue; // 既に取得済み

        const firstRace = venue.races[0];
        if (firstRace) {
          try {
            // API版で今節成績を取得（最優先）
            await supplementSesFromResults(venue.id);
            // 支部取得用にスクレイピング版も呼ぶ

            render();
          } catch(e) {}

      }

    const k = `${p.venueId}-${p.raceNumber}`;
    const rs = state.rMap[k];
    if (rs?.hasResult && !state.pickStore[k] && p.rank !== 'D') {
      state.pickStore[k] = {
        rank: p.rank, bets: p.bets || [], combos: p.combos || [],
        totalBet: p.totalBet, betStrategy: p.betStrategy, confidence: p.confidence,
        usedOdds: p.usedOdds || false, pred: p.pred, analysis: p.analysis, reasons: p.reasons,

// ═══════ Backtest Engine ═══════
const TECHNIQUE_MAP = {1:'逃げ',2:'差し',3:'まくり',4:'まくり差し',5:'抜き',6:'恵まれ'};
const TACTIC_TO_TECHNIQUE = {escape:1, sashi:2, makuri:3, makuriSashi:4, follow:0};

async function runBacktest(days) {
  state._bt.status = 'running';
  state._bt.progress = '日付生成中...';
  // BT開始時にEMPIRICAL_LINKAGEをクリア（BT中に段階的に再構築される）
  window.EMPIRICAL_LINKAGE = null;
  render();
  
  const dates = [];

  for (let i = 1; i <= days; i++) {

    d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0,10).replace(/-/g,'');
    dates.push(ds);
  }
  
  const allMetrics = {
    stErrors: [],
    courseAccuracy: 0, courseTotal: 0,
    top1Accuracy: 0, top3Accuracy: 0,
    tacticAccuracy: 0, tacticTotal: 0,
    raceCount: 0,
    // 単勝ROI
    winBet: 0, winReturn: 0,
    // 旧重みとの比較
    oldTop1: 0, oldWinReturn: 0,
    // ═══ Phase1追加: 3連単バックテスト ═══
    triBet: 0,        // 3連単投資額
    triReturn: 0,     // 3連単払戻額
    triHit: 0,        // 3連単的中数
    triTotal: 0,      // 3連単賭けたレース数
    // ═══ Phase1追加: キャリブレーション ═══
    calibration: [],   // {predProb, actual(0or1), combo} の配列
    // ═══ Phase1追加: Brier Score ═══
    brierSum: 0,
    brierCount: 0,
    // ═══ Phase1追加: 温度探索 ═══
    tempResults: {},   // {T: {brier, top1, triROI}} 
    // ═══ Phase1追加: ランク別3連単ROI ═══
    rankStats: { S:{bet:0,ret:0,hit:0,total:0}, A:{bet:0,ret:0,hit:0,total:0}, B:{bet:0,ret:0,hit:0,total:0} },
    // ═══ v16: 展示あり/なし別統計 ═══
    prevStats: {
      with: {bet:0, ret:0, hit:0, total:0, brier:0, brierN:0, top1:0},
      without: {bet:0, ret:0, hit:0, total:0, brier:0, brierN:0, top1:0}
    },
    // ═══ v16: 確率閾値グリッドサーチ ═══
    probFilter: {},
    // ═══ v16: 配当ゾーン分析 ═══
    payoutZones: [],
    // ═══ v16: 2-5%帯キャリブ診断 ═══
    calibDiag: {'2-3%':{n:0,hit:0},'3-4%':{n:0,hit:0},'4-5%':{n:0,hit:0}},
    // ═══ v16: レース格別統計 ═══
    gradeStats: {},
    // 場別ROI統計
    venueStats: {},
    // 荒れ度別ROI統計
    chaosStats: {},
    details: [],
    // ═══ v16.4: ウォークフォワード検証（前半/後半分割） ═══
    walkForward: {
      // midDate はBT実行中に決定（有効日付の中央で分割）
      midDate: null, validDates: [],
      half1: { label:'前半', bet:0, ret:0, hit:0, total:0, venueStats:{}, gradeStats:{}, probFilter:{}, top1:0, raceCount:0 },
      half2: { label:'後半', bet:0, ret:0, hit:0, total:0, venueStats:{}, gradeStats:{}, probFilter:{}, top1:0, raceCount:0 },
    },
  };
  
  // ── 温度探索: 複数のSoftmax Tで予測を記録 ──
  const TEMPS_TO_TEST = [0.5, 0.8, 1.0, 1.5, 2.0, 3.0];
  for (const t of TEMPS_TO_TEST) allMetrics.tempResults[t] = { brier:0, count:0, top1:0 };
  
  let btSkipNoRes = 0, btSkipNoPlace = 0, btProcessed = 0;
  
  // ═══ v16.4: ウォークフォワード — midDateはBT後処理で確定 ═══
  
  // ═══ v16.4: ストリーミングバッチ方式（fetch→即処理→メモリ解放） ═══
  const BATCH_SIZE = 5; // 同時fetch数
  const longRun = dates.length > 100; // 長期BTではキャッシュ無効化+軽量化
  
  for (let batchStart = 0; batchStart < dates.length; batchStart += BATCH_SIZE) {
    const batch = dates.slice(batchStart, batchStart + BATCH_SIZE);
    state._bt.progress = `${batchStart}/${dates.length}日 ${allMetrics.raceCount}R処理`;
    render();
    await new Promise(r => setTimeout(r, 0)); // UIスレッド解放
    
    // バッチ内を並列fetch
    const batchResults = await Promise.allSettled(batch.map(async (ds) => {
      const path = `${ds.slice(0,4)}/${ds}`;
      try {
        const [progRes, prevRes, resRes] = await Promise.allSettled([
          fetch(`${API_BASE}/programs/v2/${path}.json`),
          fetch(`${API_BASE}/previews/v2/${path}.json`),
          fetch(`${API_BASE}/results/v2/${path}.json`),
        ]);
        if (progRes.status !== 'fulfilled' || !progRes.value.ok) return null;
        if (resRes.status !== 'fulfilled' || !resRes.value.ok) return null;
        const progData = await progRes.value.json();
        const resData = await resRes.value.json();
        const prevData = prevRes.status === 'fulfilled' && prevRes.value.ok ? await prevRes.value.json() : null;
        return { ds, progData, resData, prevData };
      } catch(e) { return null; }
    }));
    
    // バッチ結果を即座に処理（メモリに溜めない）
    for (const br of batchResults) {
      if (br.status !== 'fulfilled' || !br.value) { btSkipNoRes++; continue; }
      const { ds, progData, resData, prevData } = br.value;
      const di = dates.indexOf(ds);
      const path = `${ds.slice(0,4)}/${ds}`;
      // v16.4: 有効日付を記録（ウォークフォワード用）
      if (!allMetrics.walkForward.validDates.includes(ds)) allMetrics.walkForward.validDates.push(ds);
    
    try {
      
      const programs = Array.isArray(progData.programs) ? progData.programs : (progData.programs ? Object.values(progData.programs) : []);
      const results = Array.isArray(resData.results) ? resData.results : (resData.results ? Object.values(resData.results) : []);
      const previews = prevData ? (Array.isArray(prevData.previews) ? prevData.previews : (prevData.previews ? Object.values(prevData.previews) : [])) : [];
      /* console.log(`[BT] ${ds}: programs=${programs.length}, result */
      
      // results/previewsをMapに変換（O(n)→O(1)検索）
      const resMap = {};
      for (const r of results) resMap[`${parseInt(r.race_stadium_number)}-${parseInt(r.race_number)}`] = r;
      const prevMap = {};
      for (const p of previews) prevMap[`${parseInt(p.race_stadium_number)}-${parseInt(p.race_number)}`] = p;
      
      for (const prog of programs) {
        const sid = parseInt(prog.race_stadium_number) || 0;
        const rno = parseInt(prog.race_number) || 0;
        if (!sid || !rno) continue;
        const rKey = `${sid}-${rno}`;
        
        const res = resMap[rKey];
        if (!res) { btSkipNoRes++; continue; }
        
        const resBoats = Array.isArray(res.boats) ? res.boats : (res.boats ? Object.values(res.boats) : []);
        // racer_place_numberが存在する行が3つ以上あればOK
        const validPlaces = resBoats.filter(b => b.racer_place_number > 0);
        if (validPlaces.length < 3) { btSkipNoPlace++; continue; }
        btProcessed++;
        
        const prev = prevMap[rKey];
        
        const entries = (Array.isArray(prog.boats) ? prog.boats : (prog.boats ? Object.values(prog.boats) : [])).map((b, idx) => parseEntry(b, idx));
        const venue = { id: sid, name: VENUES[sid] || `場${sid}` };
        const pvMap = {};
        if (prev) {
          const pvEntries = [];
          for (const b of (Array.isArray(prev.boats) ? prev.boats : (prev.boats ? Object.values(prev.boats) : []))) {
            pvEntries.push({
              bn: b.racer_boat_number,
              course: b.racer_course_number || 0,
              exST: b.racer_start_timing ?? null,
              exT: b.racer_exhibition_time > 0 ? b.racer_exhibition_time : null,
              tilt: b.racer_tilt_adjustment ?? null,
              wt: b.racer_weight > 0 ? b.racer_weight : null,
            });
          }
          const courseOrder = [];
          for (const e of pvEntries) { if (e.course > 0) courseOrder[e.course - 1] = e.bn; }
          pvMap[rKey] = {
            wind: prev.race_wind ?? null, windDir: prev.race_wind_direction_number ?? 0,
            wave: prev.race_wave ?? null,
            entries: pvEntries,
            course: courseOrder.filter(v => v != null && v > 0),
          };
        }
        
        const pv = pvMap[rKey] || null;
        const hasPreview = pv && pv.entries && pv.entries.some(e => e.exT != null || e.exST != null);
        const raceGrade = normalizeGrade(prog.race_grade_number);
        const race = { entries, number: rno, grade: raceGrade };
        
        // ── 予測実行（現在の重み）──
        const pred = predict(entries, pv, venue.id, raceGrade);
        let formation;
        try { formation = predictFormation(race, venue, pv, pred); } catch(e) { continue; }
        
        // ── 旧重みでの予測 ──
        const savedW = { ...W };
        W.wr = 0.20; W.st = 0.05; W.mt = 0.06; W.t2 = 0.09; W.crs = 0.48; W.cls = 0.06;
        const oldPred = predict(entries, pv, venue.id);
        Object.assign(W, savedW);
        
        // (コース因子グリッドサーチはactualCombo定義後に移動)
        
        // ── 実結果 ──
        const actualCourse = [];
        const actualST = {};
        const actualPlace = {};
        for (const b of resBoats) {
          if (b.racer_course_number) actualCourse[b.racer_course_number - 1] = b.racer_boat_number;
          if (b.racer_start_timing != null) actualST[b.racer_boat_number] = b.racer_start_timing;
          if (b.racer_place_number) actualPlace[b.racer_boat_number] = b.racer_place_number;
        }
        const actualTechnique = res.race_technique_number || 0;
        const actual123 = Object.entries(actualPlace).filter(([,p])=>p<=3).sort(([,a],[,b])=>a-b).map(([bn])=>parseInt(bn));
        const actualCombo = actual123.length >= 3 ? `${actual123[0]}-${actual123[1]}-${actual123[2]}` : null;
        
        // ═══ v16.3: コース因子グリッドサーチ（0.65x/0.70x/0.75x） ═══
        // v16.4: 長期BTではスキップ（predict()×3回/レースの削減）
        if (!longRun) {
        if (!allMetrics.crsGrid) allMetrics.crsGrid = {};
        const CRS_TESTS = [0.20, 0.22, 0.24]; // 0.24周辺の最終確認
        for (const testCrs of CRS_TESTS) {
          const key = `crs=${testCrs}`;
          if (!allMetrics.crsGrid[key]) allMetrics.crsGrid[key] = {bet:0,ret:0,hit:0,total:0,bet5:0,ret5:0,hit5:0,total5:0};
          const savedCrs = W.crs;
          W.crs = testCrs;
          const cPred = predict(entries, pv, venue.id, raceGrade);
          W.crs = savedCrs;
          if (cPred && cPred.trifectaProbs && actualCombo) {
            const cSorted = Object.entries(cPred.trifectaProbs).sort((a,b)=>b[1]-a[1]);
            const cBets3 = cSorted.slice(0,3).map(([c])=>c);
            allMetrics.crsGrid[key].bet += cBets3.length * 100;
            allMetrics.crsGrid[key].total++;
            if (cBets3.includes(actualCombo)) {
              allMetrics.crsGrid[key].hit++;
              allMetrics.crsGrid[key].ret += (res.payouts?.trifecta?.[0]?.payout || 0);
            }
            const cBets5 = cSorted.filter(([,p])=>p>=0.05);
            if (cBets5.length > 0 && cBets5.length <= 15) {
              allMetrics.crsGrid[key].bet5 += cBets5.length * 100;
              allMetrics.crsGrid[key].total5++;
              if (cBets5.some(([c])=>c===actualCombo)) {
                allMetrics.crsGrid[key].hit5++;
                allMetrics.crsGrid[key].ret5 += (res.payouts?.trifecta?.[0]?.payout || 0);
              }
            }
          }
        }
        } // end if (!longRun) crs grid
        
        // ═══ v16.3: Platt Scalingパラメータグリッドサーチ ═══
        // v16.4: 長期BT(100日超)ではスキップ（CPU負荷削減）
        if (!longRun) {
        if (!allMetrics.plattGrid) allMetrics.plattGrid = {};
        const PLATT_TESTS = [
          {a:0.75, b:-0.20}, {a:0.80, b:-0.15}, {a:0.82, b:-0.15},
          {a:0.85, b:-0.10}, {a:0.90, b:-0.10}, {a:0.85, b:-0.20},
        ];
        for (const pt of PLATT_TESTS) {
          const key = `A=${pt.a}/B=${pt.b}`;
          if (!allMetrics.plattGrid[key]) allMetrics.plattGrid[key] = {bet:0,ret:0,hit:0,total:0,bet5:0,ret5:0,hit5:0,total5:0,brierSum:0,brierN:0};
          // Platt変換を一時適用
          const savedA = window.PLATT_A, savedB = window.PLATT_B;
          window.PLATT_A = pt.a; window.PLATT_B = pt.b;
          const pPred = predict(entries, pv, venue.id, raceGrade);
          window.PLATT_A = savedA; window.PLATT_B = savedB;
          if (pPred && pPred.trifectaProbs && actualCombo) {
            const pSorted = Object.entries(pPred.trifectaProbs).sort((a,b)=>b[1]-a[1]);
            // TOP3
            const pBets3 = pSorted.slice(0,3).map(([c])=>c);
            allMetrics.plattGrid[key].bet += pBets3.length * 100;
            allMetrics.plattGrid[key].total++;
            if (pBets3.includes(actualCombo)) {
              allMetrics.plattGrid[key].hit++;
              allMetrics.plattGrid[key].ret += (res.payouts?.trifecta?.[0]?.payout || 0);
            }
            // 5%フィルタ
            const pBets5 = pSorted.filter(([,p])=>p>=0.05);
            if (pBets5.length > 0 && pBets5.length <= 15) {
              allMetrics.plattGrid[key].bet5 += pBets5.length * 100;
              allMetrics.plattGrid[key].total5++;

              for (const third of [top[2]?.boat, top[3]?.boat, top[4]?.boat].filter(Boolean)) {
                if (third === a1 || third === a2) continue;
                combos.push(`${a1}-${a2}-${third}`, `${a2}-${a1}-${third}`, `${a1}-${third}-${a2}`, `${a2}-${third}-${a1}`);
              }
              const unique = [...new Set(combos)].filter(c => pred.trifectaProbs[c] >= 0.005);
              return {combos: unique.slice(0,10), cost: unique.slice(0,10).length * 100};
            })(),
            // 確率加重: 確率に比例して金額配分（高確率の目に厚く）
            '確率加重TOP5': (() => {
              const top5 = sortedTri.slice(0,5);
              const totalProb = top5.reduce((s,[,p])=>s+p, 0);
              return {combos: top5.map(([c])=>c), cost: 500, weighted: true, weights: top5.map(([,p])=>p/totalProb)};
            })(),
          };
          
          for (const [name, style] of Object.entries(betStyleTests)) {
            if (!allMetrics.betStyles[name]) allMetrics.betStyles[name] = {bet:0,ret:0,hit:0,total:0};
            const bs = allMetrics.betStyles[name];
            if (style.combos.length === 0) continue;
            bs.total++;
            if (style.weighted && style.weights) {
              // 確率加重: 的中時は加重分の配当
              bs.bet += style.cost;
              const hitIdx = style.combos.indexOf(actualCombo);
              if (hitIdx >= 0) {
                bs.hit++;
                // 加重配分: この目に割り当てた金額 × 配当
                const myWeight = style.weights[hitIdx];
                bs.ret += Math.round(triPayAll * myWeight * style.combos.length);
              }
            } else {
              bs.bet += style.cost;
              if (style.combos.includes(actualCombo)) {
                bs.hit++;
                bs.ret += triPayAll;
              }
            }
          }
          } catch(e) { console.warn('[BT] ABC error:', e.message); }
        }
        
        // ═══ Phase1: キャリブレーション ═══
        if (pred.trifectaProbs && actualCombo) {
          for (const [combo, prob] of Object.entries(pred.trifectaProbs)) {
            if (prob >= 0.005) {
              // v16.4: 長期BT対応 — 個別push廃止、バケット集計のみ
              if (!longRun) allMetrics.calibration.push({ prob, hit: combo === actualCombo ? 1 : 0 });
              // バケット集計（メモリ効率）
              if (!allMetrics.calBuckets) allMetrics.calBuckets = {};
              const bk = prob < 0.01 ? '0-1%' : prob < 0.02 ? '1-2%' : prob < 0.05 ? '2-5%' : prob < 0.10 ? '5-10%' : '10%+';
              if (!allMetrics.calBuckets[bk]) allMetrics.calBuckets[bk] = {n:0, hit:0, sumProb:0};
              allMetrics.calBuckets[bk].n++;
              allMetrics.calBuckets[bk].sumProb += prob;
              if (combo === actualCombo) allMetrics.calBuckets[bk].hit++;
              // ═══ v16: 2-5%帯キャリブ診断 ═══
              if (prob >= 0.02 && prob < 0.05) {
                const band = prob < 0.03 ? '2-3%' : prob < 0.04 ? '3-4%' : '4-5%';
                allMetrics.calibDiag[band].n++;
                if (combo === actualCombo) allMetrics.calibDiag[band].hit++;
              }
            }
          }
          for (let bn = 1; bn <= 6; bn++) {
            const predProb = (pred.probs[bn-1] || 0) / 100;
            const actual = (actual1st && parseInt(actual1st) === bn) ? 1 : 0;
            allMetrics.brierSum += (predProb - actual) ** 2;
            allMetrics.brierCount++;
            // ═══ v16: 展示別Brier ═══
            const bBucket = hasPreview ? allMetrics.prevStats.with : allMetrics.prevStats.without;
            bBucket.brier += (predProb - actual) ** 2;
            bBucket.brierN++;
          }
          // ═══ v16: 展示別1着精度 ═══
          if (predicted1st && actual1st && predicted1st === parseInt(actual1st)) {
            (hasPreview ? allMetrics.prevStats.with : allMetrics.prevStats.without).top1++;
          }
        }
        
        // ═══ Phase3 #11: ファクター重要度データ収集 ═══
        if (pred.ranked.length >= 2 && actual1st) {
          if (!allMetrics.factorCorr) allMetrics.factorCorr = { wr:[], st:[], mt:[], crs:[], cls:[], ex:[], hit:[] };
          const topBoat = pred.ranked[0].boat;
          const topEntry = entries.find(en => en.boatNumber === topBoat);
          const isHit = topBoat === parseInt(actual1st);
          if (topEntry) {
            allMetrics.factorCorr.wr.push(topEntry.wr || 0);
            allMetrics.factorCorr.st.push(topEntry.st || 0.18);
            allMetrics.factorCorr.mt.push(topEntry.mdr || 30);
            allMetrics.factorCorr.crs.push(pred.ranked[0].factors?.['コース'] || 0);
            allMetrics.factorCorr.cls.push(CLASS_BONUS[topEntry.cls] || 0);
            allMetrics.factorCorr.ex.push(pred.ranked[0].factors?.['展示'] || 0);
            allMetrics.factorCorr.hit.push(isHit ? 1 : 0);
          }
        }
        
        // ═══ Phase1: 温度探索 ═══
        // v16.4: longRunでは10%サンプリングで実行（全レースだと6倍のコスト）
        const doTempSearch = !longRun || (longRun && allMetrics.raceCount % 10 === 0);
        if (doTempSearch) {
        const savedT = SOFTMAX_T;
        for (const testT of TEMPS_TO_TEST) {
          SOFTMAX_T = testT;
          const tPred = predict(entries, pv, venue.id, raceGrade);
          const tTop = tPred.ranked[0]?.boat;
          if (tTop && actual1st && tTop === parseInt(actual1st)) allMetrics.tempResults[testT].top1++;
          // Brier for this T
          for (let bn = 1; bn <= 6; bn++) {
            const pp = (tPred.probs[bn-1] || 0) / 100;
            const ac = (actual1st && parseInt(actual1st) === bn) ? 1 : 0;
            allMetrics.tempResults[testT].brier += (pp - ac) ** 2;
            allMetrics.tempResults[testT].count++;
          }
          // 3連単ROI for this T
          if (actualCombo && tPred.trifectaProbs) {
            if (!allMetrics.tempResults[testT].triBet) { allMetrics.tempResults[testT].triBet=0; allMetrics.tempResults[testT].triRet=0; allMetrics.tempResults[testT].triHit=0; }
            const tSorted = Object.entries(tPred.trifectaProbs).sort((a,b)=>b[1]-a[1]);
            const tBets = tSorted.slice(0,3).map(([c])=>c);
            allMetrics.tempResults[testT].triBet += tBets.length * 100;
            if (tBets.includes(actualCombo)) {
              allMetrics.tempResults[testT].triHit++;
              allMetrics.tempResults[testT].triRet += (res.payouts?.trifecta?.[0]?.payout || 0);
            }
          }
        }
        SOFTMAX_T = savedT;
        } // end if (doTempSearch)
        
        // ═══ Phase1 #4: コース連動率の実証データ集計 ═══
        if (actualCourse.length >= 6 && actual123.length >= 3) {
          // 1着のコースと2着のコースの組合せを集計
          const a1Boat = actual123[0], a2Boat = actual123[1], a3Boat = actual123[2];
          const a1Course = actualCourse.indexOf(a1Boat) + 1;
          const a2Course = actualCourse.indexOf(a2Boat) + 1;
          const a3Course = actualCourse.indexOf(a3Boat) + 1;
          if (a1Course >= 1 && a1Course <= 6 && a2Course >= 1 && a2Course <= 6) {
            if (!allMetrics.linkage) allMetrics.linkage = {};
            // "1着Cコース→2着Cコース" のキー
            const lk12 = `${a1Course}->${a2Course}`;
            const lk1base = `${a1Course}->*`;
            allMetrics.linkage[lk12] = (allMetrics.linkage[lk12] || 0) + 1;
            allMetrics.linkage[lk1base] = (allMetrics.linkage[lk1base] || 0) + 1;
            // 2着→3着も
            if (a3Course >= 1 && a3Course <= 6) {
              const lk23 = `2nd${a2Course}->${a3Course}`;
              const lk2base = `2nd${a2Course}->*`;
              allMetrics.linkage[lk23] = (allMetrics.linkage[lk23] || 0) + 1;
              allMetrics.linkage[lk2base] = (allMetrics.linkage[lk2base] || 0) + 1;
            }
          }
        }
        
        // BT中に500R毎にEMPIRICAL_LINKAGEを段階更新（学習データの蓄積を反映）
        if (allMetrics.linkage && allMetrics.raceCount > 0 && allMetrics.raceCount % 500 === 0) {
          const lk = allMetrics.linkage;
          const tmpLink = {};
          for (let c1 = 1; c1 <= 6; c1++) {
            const base = lk[`${c1}->*`] || 0;
            if (base < 20) continue;
            for (let c2 = 1; c2 <= 6; c2++) {
              if (c1 === c2) continue;
              const count = lk[`${c1}->${c2}`] || 0;
              const multiplier = (count / base) / 0.2;
              if (!tmpLink[c1]) tmpLink[c1] = {};
              tmpLink[c1][c2] = Math.round(multiplier * 100) / 100;
            }
          }
          if (Object.keys(tmpLink).length > 0) window.EMPIRICAL_LINKAGE = tmpLink;
        }
        
        // 詳細記録
        if (allMetrics.details.length < 30) {
          allMetrics.details.push({
            date: ds, sid, rno,
            predTop3: formation.positions1M.slice(0,3).map(p => p.bn),
            actualTop3: actual123,
            predTactic: formation.positions1M[0]?.tactic,
            actualTechnique,
            predST: formation.predictedST,
            actualST,
            triHit: actualCombo && pred.trifectaProbs ? Object.entries(pred.trifectaProbs).sort((a,b)=>b[1]-a[1]).slice(0,5).some(([c])=>c===actualCombo) : false,
          });
        }
      }
    } catch(err) {
      console.warn(`[BACKTEST] Error on ${ds}:`, err);
    }
    } // end for (const br of batchResults)
  } // end for (batchStart)
  
  /* console.log(`[BT DONE] processed=${btProcessed}, skipNoRes=$ */
  // ═══ v16.4: ウォークフォワード後処理 — validDatesの中央値で分割集計 ═══
  if (allMetrics.walkForward._races && allMetrics.walkForward._races.length > 0) {
    const races = allMetrics.walkForward._races;
    const vd = [...allMetrics.walkForward.validDates].sort(); // 昇順
    const mid = vd[Math.floor(vd.length / 2)];
    allMetrics.walkForward.midDate = mid;
    
    for (const r of races) {
      const wfHalf = r.ds <= mid ? allMetrics.walkForward.half1 : allMetrics.walkForward.half2;
      wfHalf.raceCount++;
      wfHalf.bet += r.betAmount3; wfHalf.total++;
      if (r.hitCombo3) { wfHalf.hit++; wfHalf.ret += r.triPayAll; }
      if (r.predicted1st && r.actual1st && r.predicted1st === parseInt(r.actual1st)) wfHalf.top1++;
      
      // 場別
      if (!wfHalf.venueStats[r.sid]) wfHalf.venueStats[r.sid] = {bet:0,ret:0,hit:0,total:0,name:r.venueName};
      const wvs = wfHalf.venueStats[r.sid];
      wvs.bet += r.betAmount3; wvs.total++;
      if (r.hitCombo3) { wvs.hit++; wvs.ret += r.triPayAll; }
      
      // 格別
      if (!wfHalf.gradeStats[r.raceGrade]) wfHalf.gradeStats[r.raceGrade] = {bet:0,ret:0,hit:0,total:0};
      const wgs = wfHalf.gradeStats[r.raceGrade];
      wgs.bet += r.betAmount3; wgs.total++;
      if (r.hitCombo3) { wgs.hit++; wgs.ret += r.triPayAll; }
      
      // 閾値別
      for (const thresh of [0.03, 0.05, 0.08]) {
        const key = `${Math.round(thresh*100)}%`;
        if (!wfHalf.probFilter[key]) wfHalf.probFilter[key] = {bet:0,ret:0,hit:0,total:0,skip:0};
        const ws = wfHalf.probFilter[key];
        const filtered = r.sortedTri.filter(([,p]) => p >= thresh);
        if (filtered.length > 0 && filtered.length <= 15) {
          ws.bet += filtered.length * 100; ws.total++;
          if (r.actualCombo && filtered.some(([c]) => c === r.actualCombo)) { ws.hit++; ws.ret += r.triPayAll; }
        } else { ws.skip++; }
      }
      
      // Phase1複合フィルタのWF分割
      {
        const CUT_VENUES = [14, 16, 3, 7, 9];
        const isCutVenue = CUT_VENUES.includes(r.sid);
        const wfKey = r.ds <= mid ? 'h1' : 'h2';
        const venueKeys = isCutVenue ? ['all'] : ['all', 'cut5'];
        for (const vk of venueKeys) {
          for (const thresh of [0.05, 0.08]) {
            const pk = `${vk}_${Math.round(thresh*100)}pct_${wfKey}`;
            if (!allMetrics.phase1) allMetrics.phase1 = {};
            if (!allMetrics.phase1[pk]) allMetrics.phase1[pk] = {bet:0,ret:0,hit:0,total:0,skip:0};
            const s = allMetrics.phase1[pk];
            const filtered = r.sortedTri.filter(([,p]) => p >= thresh);
            if (filtered.length > 0 && filtered.length <= 15) {
              s.bet += filtered.length * 100; s.total++;
              if (r.actualCombo && filtered.some(([c]) => c === r.actualCombo)) { s.hit++; s.ret += r.triPayAll; }
            } else { s.skip++; }
          }
        }
      }
    }
    
    // メモリ解放
    delete allMetrics.walkForward._races;
  }
  
  state._bt.status = 'done';
  state._bt.results = allMetrics;
  
  // ═══ Phase1 #4: COURSE_LINKAGEテーブル自動生成 ═══
  if (allMetrics.linkage) {
    const lk = allMetrics.linkage;
    const newLinkage = {};
    // 1着コースC1 → 2着コースC2の実測倍率
    for (let c1 = 1; c1 <= 6; c1++) {
      const base = lk[`${c1}->*`] || 0;
      if (base < 20) continue; // サンプル不足
      const baseRate = 1 / 5; // 均等確率=0.2
      for (let c2 = 1; c2 <= 6; c2++) {
        if (c1 === c2) continue; // 1着と2着は同じコースにならない（進入後は別艇）
        const count = lk[`${c1}->${c2}`] || 0;
        const actualRate = count / base;
        const multiplier = actualRate / baseRate;
        if (!newLinkage[c1]) newLinkage[c1] = {};
        newLinkage[c1][c2] = Math.round(multiplier * 100) / 100;
      }
    }
    state._bt.linkage = newLinkage;
    // グローバルに保存（予測エンジンが参照可能に）
    window.EMPIRICAL_LINKAGE = newLinkage;
    /* console.log('[BACKTEST] Empirical COURSE_LINKAGE:', JSON.str */
  }
  
  // ═══ Phase3 #11: ファクター重要度分析（偏相関ベース） ═══
  if (allMetrics.factorCorr && allMetrics.factorCorr.hit.length > 50) {
    const fc = allMetrics.factorCorr;
    const n = fc.hit.length;
    const mean = arr => arr.reduce((a,b)=>a+b,0)/arr.length;
    const stddev = arr => { const m=mean(arr); return Math.sqrt(arr.reduce((s,x)=>s+(x-m)**2,0)/arr.length); };
    
    // 正規化（z-score）
    const factors = ['wr','st','mt','crs','cls','ex'];
    const zData = {};
    for (const f of factors) {
      if (!fc[f] || fc[f].length !== n) continue;
      const m = mean(fc[f]), sd = stddev(fc[f]);
      zData[f] = sd > 0 ? fc[f].map(x => (x-m)/sd) : fc[f].map(() => 0);
    }
    const zHit = fc.hit; // 0/1はそのまま
    
    // 単変量相関（参考値として保持）
    const corr = (xs, ys) => {
      const mx = mean(xs), my = mean(ys);
      let num = 0, dx = 0, dy = 0;
      for (let i = 0; i < xs.length; i++) {
        num += (xs[i]-mx)*(ys[i]-my);
        dx += (xs[i]-mx)**2;
        dy += (ys[i]-my)**2;
      }
      return dx > 0 && dy > 0 ? num / Math.sqrt(dx*dy) : 0;
    };
    
    const corrResults = {};
    for (const f of factors) {
      if (zData[f]) corrResults[f] = Math.round(corr(fc[f], zHit) * 1000) / 1000;
    }
    
    // 偏相関: 各ファクターの独自貢献度を計算
    // 簡易ロジスティック回帰の代替: 残差相関法
    // 各ファクターfについて、他のファクターで説明できない残差とhitの相関を計算
    const partialCorrs = {};
    const availFactors = factors.filter(f => zData[f]);
    
    for (const target of availFactors) {
      // targetを他の全ファクターで回帰した残差を求める
      const others = availFactors.filter(f => f !== target);
      if (others.length === 0) { partialCorrs[target] = corrResults[target] || 0; continue; }
      
      // 簡易多重回帰（正規方程式の近似: 平均的な相関を使って残差推定）
      // 他ファクターの線形結合でtargetを予測
      const tArr = zData[target];
      let sumPred = new Array(n).fill(0);
      
      // 各他ファクターとtargetの相関係数を使って簡易予測
      let totalWeight = 0;
      for (const o of others) {
        const r = corr(zData[o], tArr);
        const w = r; // 相関そのものを重みに
        for (let i = 0; i < n; i++) sumPred[i] += w * zData[o][i];
        totalWeight += Math.abs(r);
      }
      // 正規化
      if (totalWeight > 0) sumPred = sumPred.map(x => x / totalWeight);
      
      // 残差 = target - predicted
      const residual = tArr.map((v, i) => v - sumPred[i]);
      
      // 残差とhitの相関 = targetの独自貢献
      partialCorrs[target] = Math.round(corr(residual, zHit) * 1000) / 1000;
    }
    
    allMetrics.factorImportance = corrResults;
    allMetrics.partialCorrs = partialCorrs;
    
    // 推奨重み: 偏相関の絶対値に比例（多重共線性を考慮した重み）
    // ═══ v16: EMA正則化 + ±5%キャップ ═══
    let sumAbs = 0;
    const absPartial = {};
    for (const [f, r] of Object.entries(partialCorrs)) {
      const a = Math.abs(r);
      absPartial[f] = a;
      sumAbs += a;
    }
    if (sumAbs > 0) {
      const rawSuggested = {};
      for (const [f, a] of Object.entries(absPartial)) {
        rawSuggested[f] = a / sumAbs;
      }
      // W のキーマッピング: wr, st, mt, crs, cls (exはWに含まれないので除外)
      const wMap = { wr:'wr', st:'st', mt:'mt', crs:'crs', cls:'cls' };
      const suggested = {};
      const ALPHA = 0.4, MAX_DELTA = 0.05;
      for (const [factor, wKey] of Object.entries(wMap)) {
        if (rawSuggested[factor] != null && W[wKey] != null) {
          const target = ALPHA * rawSuggested[factor] + (1 - ALPHA) * W[wKey];
          let delta = target - W[wKey];
          if (Math.abs(delta) > MAX_DELTA) delta = MAX_DELTA * Math.sign(delta);
          suggested[factor] = Math.round((W[wKey] + delta) * 1000) / 1000;
        }
      }
      allMetrics.suggestedWeights = suggested;
      allMetrics.rawSuggestedWeights = rawSuggested; // 正則化前の値も保持
    }
    
    /* console.log('[BACKTEST] Simple correlations:', corrResults); */
    /* console.log('[BACKTEST] Partial correlations:', partialCorrs */
    /* console.log('[BACKTEST] Suggested weights:', allMetrics.sugg */
  }
  
  /* console.log(`[BT DONE] ${allMetrics.raceCount}R processed, $ */
  
  render();
}

function generateBoardPlan(budget) {
  budget = budget || 30000;
  const allPicks = generateAllPicks();
  if (!allPicks || allPicks.length === 0) return null;
  
  const now = Date.now();
  const plan = [];
  
  for (const p of allPicks) {
    if (p.rank === 'D') continue; // Dランクは除外
    const venue = state.venues.find(v => v.id === p.venueId);
    if (!venue) continue;
    const race = venue.races.find(r => r.number === p.raceNumber);
    if (!race) continue;
    const pv = state.pvMap[`${p.venueId}-${p.raceNumber}`];
    const pred = predict(race.entries, pv, p.venueId, race.grade);
    if (!pred) continue;
    const chaos = calcChaosScore(race, venue, pv, pred);
    const tier = VENUE_TIER[p.venueId] || 'C';
    const rs = state.rMap[`${p.venueId}-${p.raceNumber}`];
    
    // 展示データの有無
    const hasEx = pv?.entries?.some(e => e.exT != null) || false;
    
    // 締切
    const dlInfo = getDeadline(race.deadline);
    const dlMs = race.deadline ? new Date(race.deadline).getTime() : 0;
    const isFinished = rs?.hasResult || false;
    const isComing = dlMs > now;
    
    // 結果
    let resultStatus = 'future'; // future, pending, hit, miss, refund
    let returnAmount = 0;
    if (isFinished) {
      const frozen = state.pickStore[`${p.venueId}-${p.raceNumber}`];
      if (frozen) {
        resultStatus = (frozen.hitPay && frozen.hitPay > 0) ? 'hit' : 'miss';
        returnAmount = frozen.hitPay || 0;
      } else {
        resultStatus = 'miss';
      }
    } else if (!isComing) {
      resultStatus = 'pending';
    }
    
    plan.push({
      venueId: p.venueId, raceNo: p.raceNumber,
      venueName: venue.name, tier, rank: p.rank,
      axisBoat: pred.ranked[0]?.boat, axisName: pred.ranked[0]?.name,
      chaosScore: chaos?.score || 50, chaosLevel: chaos?.level || 'mid', chaosIcon: chaos?.icon || '🌊',
      totalBet: p.totalBet || 0, betStrategy: p.betStrategy || '',
      nCombos: p.combos?.length || 0,
      hasEx, dlMs, dlLabel: dlInfo?.label || '', dlColor: dlInfo?.color || 'var(--tx3)',
      isFinished, isComing, resultStatus, returnAmount,
      // ユーザー裁量（state._board.overridesから復元）
      userAction: 'ai', userBet: null,
      userExec: null, // bet/passed/missed/null
    });
    const oKey = `${p.venueId}-${p.raceNumber}`;
    const ov = (state._board?.overrides || {})[oKey];
    if (ov) {
      plan[plan.length-1].userAction = ov.action || 'ai';
      plan[plan.length-1].userBet = ov.bet ?? null;
      plan[plan.length-1].userExec = ov.exec ?? null;
    }
    // 完了レースでuserExecが未設定 → bet扱い（デフォルト=投票した）
    // ユーザーが明示的にpassed/missedを選んだ場合のみ除外
  }
  
  // 時系列ソート
  plan.sort((a, b) => a.dlMs - b.dlMs);
  
  // 予算配分 — スケーリング廃止: AI推奨金額をそのまま使用（金額は1つに統一）
  for (const p of plan) {
    p.boardBet = p.userBet || p.totalBet;
  }
  
  return plan;
}

function renderStrategyBoard() {
  const wrap = h('div',{className:'fade-up'});
  
  // state初期化
  if (!state._board) state._board = { budget: 30000, overrides: {} };
  if (!state._board.overrides) state._board.overrides = {};
  const bp = state._board;
  
  const plan = generateBoardPlan(bp.budget);
  
  // ── ヘッダー ──
  const hdr = h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'12px'}});
  hdr.appendChild(h('button',{style:{fontSize:'20px',background:'none',border:'none',color:'var(--tx3)',cursor:'pointer',padding:'2px',lineHeight:'1'},onClick:()=>{state.view='top';render();}},'‹'));
  hdr.appendChild(h('div',{style:{flex:1}},
    h('div',{style:{fontSize:'16px',fontWeight:900}},'📋 今日の作戦ボード'),
    h('div',{style:{fontSize:'10px',color:'var(--ok)',display:'flex',alignItems:'center',gap:'4px'}},
      h('span',{style:{width:'5px',height:'5px',borderRadius:'50%',background:'var(--ok)',display:'inline-block',animation:'blink 2s infinite'}},''),
      h('span',null,'LIVE')
    )
  ));
  wrap.appendChild(hdr);
  
  if (!plan || plan.length === 0) {
    wrap.appendChild(h('div',{className:'card',style:{textAlign:'center',padding:'24px'}},
      h('div',{style:{fontSize:'14px',color:'var(--tx3)'}},'データ読み込み中...'),
      h('div',{style:{fontSize:'11px',color:'var(--tx4)',marginTop:'4px'}},'TOP画面でレースデータが読み込まれると表示されます')
    ));
    return wrap;
  }
  
  // 集計（明示的にbet選択したレースのみ収支に含める）
  // userExec: null=未操作, 'bet'=投票した, 'passed'=パス, 'missed'=不在
  const isBet = p => p.userAction !== 'skipped' && p.userExec === 'bet';
  const isActiveOrBet = p => p.userAction !== 'skipped'; // 計画上のアクティブ（coming用）
  const betFinished = plan.filter(p => p.isFinished && isBet(p));
  const coming = plan.filter(p => p.isComing && isActiveOrBet(p));
  const skipped = plan.filter(p => p.userAction === 'skipped');
  const pending = plan.filter(p => p.resultStatus === 'pending');
  const totalInvested = betFinished.reduce((s,p) => s + p.boardBet, 0);
  const totalReturn = betFinished.reduce((s,p) => s + p.returnAmount, 0);
  const totalHit = betFinished.filter(p => p.resultStatus === 'hit').length;
  const profit = totalReturn - totalInvested;
  const roi = totalInvested > 0 ? Math.round(totalReturn / totalInvested * 100) : 0;
  const totalPlanned = plan.filter(p=>isActiveOrBet(p)).reduce((s,p)=>s+p.boardBet,0);
  const remaining = bp.budget - totalInvested;
  
  // AI計画全体（参考値: skipped以外の全完了レース）
  const allFinished = plan.filter(p => p.isFinished && p.userAction !== 'skipped');
  const aiInvested = allFinished.reduce((s,p) => s + p.boardBet, 0);
  const aiReturn = allFinished.reduce((s,p) => s + p.returnAmount, 0);
  const aiHit = allFinished.filter(p => p.resultStatus === 'hit').length;
  const aiRoi = aiInvested > 0 ? Math.round(aiReturn / aiInvested * 100) : 0;
  const passedCount = plan.filter(p => p.userExec === 'passed').length;
  const missedCount = plan.filter(p => p.userExec === 'missed').length;
  const unconfirmed = allFinished.filter(p => !p.userExec).length;
  
  // ── 直近実績バー ──
  const recentStats = calcRecentStats();
  if (recentStats) {
    const rb = h('div',{style:{marginBottom:'8px',padding:'5px 10px',borderRadius:'20px',background:'rgba(255,255,255,0.02)',border:'1px solid var(--bd)',fontSize:'10px',color:'var(--tx3)',display:'flex',alignItems:'center',gap:'8px'}});
    rb.appendChild(h('span',null,'📊 直近3日'));
    rb.appendChild(h('span',null,`ROI `)); rb.appendChild(h('b',{style:{color:'var(--tx2)'}},`${recentStats.roi}%`));
    rb.appendChild(h('span',null,`的中 `)); rb.appendChild(h('b',{style:{color:'var(--tx2)'}},`${recentStats.hit}/${recentStats.total}`));
    wrap.appendChild(rb);
  }
  
  // ── ヒーローKPI ──
  const hasResults = allFinished.length > 0;
  const hasBets = betFinished.length > 0;
  const heroColor = !hasBets ? (hasResults ? 'var(--tx3)' : 'var(--warn)') : profit >= 0 ? 'var(--ok)' : 'var(--err)';
  const heroBg = !hasBets ? 'rgba(240,180,41,0.06),rgba(240,180,41,0.02)' : profit >= 0 ? 'rgba(45,212,160,0.08),rgba(45,212,160,0.02)' : 'rgba(239,86,86,0.08),rgba(239,86,86,0.02)';
  const heroBd = !hasBets ? 'rgba(240,180,41,0.1)' : profit >= 0 ? 'rgba(45,212,160,0.12)' : 'rgba(239,86,86,0.12)';
  
  const hero = h('div',{style:{marginBottom:'12px',padding:'18px 16px 14px',borderRadius:'16px',textAlign:'center',background:`linear-gradient(145deg,${heroBg})`,border:`1px solid ${heroBd}`}});
  hero.appendChild(h('div',{style:{fontSize:'9px',color:'var(--tx3)',letterSpacing:'1.2px',textTransform:'uppercase',marginBottom:'2px'}}, hasBets ? 'your profit' : hasResults ? 'tap ✅ to track' : 'expected profit'));
  const displayVal = hasBets ? `${profit>=0?'+':''}¥${profit.toLocaleString()}` : hasResults ? '—' : `期待ROI 92%`;
  hero.appendChild(h('div',{style:{fontSize:'36px',fontWeight:900,fontFamily:'JetBrains Mono,monospace',letterSpacing:'-1px',lineHeight:'1.1',color:heroColor}},displayVal));
  
  const heroSub = h('div',{style:{display:'flex',justifyContent:'center',gap:'14px',marginTop:'6px',fontSize:'11px'}});
  if (hasBets) {
    heroSub.appendChild(h('span',{style:{color:'var(--tx3)'}},`ROI `)); heroSub.lastChild.appendChild(h('b',{style:{color:'var(--tx2)'}},`${roi}%`));
    heroSub.appendChild(h('span',{style:{color:'var(--tx3)'}},`的中 `)); heroSub.lastChild.appendChild(h('b',{style:{color:'var(--tx2)'}},`${totalHit}/${betFinished.length}`));
  } else if (hasResults) {
    heroSub.appendChild(h('span',{style:{color:'var(--tx4)'}},'消化済みレースで ✅投票した をタップ'));
  }
  heroSub.appendChild(h('span',{style:{color:'var(--tx3)'}},`残 `)); heroSub.lastChild.appendChild(h('b',{style:{color:'var(--tx2)'}},`${coming.length}R`));
  hero.appendChild(heroSub);
  
  // AI計画 vs あなたの比較（overridesがある場合のみ）
  const hasOverrides = Object.keys(bp.overrides).length > 0;
  if (hasResults && hasOverrides) {
    const diff = profit - (aiReturn - aiInvested);
    
    const dual = h('div',{style:{display:'flex',justifyContent:'center',gap:'24px',marginTop:'8px'}});
    const colAI = h('div',{style:{textAlign:'center'}});
    colAI.appendChild(h('div',{style:{fontSize:'9px',color:'var(--tx4)',marginBottom:'1px'}},'AI計画'));
    colAI.appendChild(h('div',{style:{fontSize:'13px',fontWeight:800,fontFamily:'JetBrains Mono,monospace',color:'var(--tx3)'}},`ROI ${aiRoi}%`));
    dual.appendChild(colAI);
    const colYou = h('div',{style:{textAlign:'center'}});
    colYou.appendChild(h('div',{style:{fontSize:'9px',color:'var(--tx4)',marginBottom:'1px'}},'あなた'));
    colYou.appendChild(h('div',{style:{fontSize:'13px',fontWeight:800,fontFamily:'JetBrains Mono,monospace',color:heroColor}},`ROI ${roi}%`));
    dual.appendChild(colYou);
    hero.appendChild(dual);
  }
  
  const prog = h('div',{style:{marginTop:'10px',height:'3px',borderRadius:'2px',background:'rgba(255,255,255,0.04)'}});
  const activeTotal = plan.filter(p=>isActiveOrBet(p)).length;
  const pctDone = activeTotal > 0 ? Math.round(allFinished.length / activeTotal * 100) : 0;
  prog.appendChild(h('div',{style:{height:'100%',borderRadius:'2px',width:`${pctDone}%`,background:'var(--ac)',transition:'width 0.6s'}}));
  hero.appendChild(prog);
  
  const heroFoot = h('div',{style:{display:'flex',justifyContent:'space-between',marginTop:'4px',fontSize:'9px',color:'var(--tx4)',fontFamily:'JetBrains Mono,monospace'}});
  heroFoot.appendChild(h('span',null,`¥${totalInvested.toLocaleString()} 投資済`));
  heroFoot.appendChild(h('span',null,`${allFinished.length}/${activeTotal}R 消化`));
  heroFoot.appendChild(h('span',null,`残 ¥${remaining.toLocaleString()}`));
  hero.appendChild(heroFoot);
  
  // AI計画全体 + パス/不在内訳
  if (passedCount > 0 || missedCount > 0 || unconfirmed > 0) {
    const aiLine = h('div',{style:{marginTop:'4px',fontSize:'9px',color:'var(--tx4)'}});
    const parts = [];
    if (allFinished.length > 0) parts.push(`🤖AI計画: ${aiHit}/${allFinished.length}的中 ROI${aiRoi}%`);
    if (passedCount > 0) parts.push(`${passedCount}Rパス`);
    const totalSkip = missedCount + unconfirmed;
    if (totalSkip > 0) parts.push(`${totalSkip}R未投票`);
    aiLine.textContent = parts.join(' • ');
    hero.appendChild(aiLine);
  }
  wrap.appendChild(hero);
  
  // ── 設定ピル ──
  const pills = h('div',{style:{marginBottom:'10px',display:'flex',alignItems:'center',gap:'5px',flexWrap:'wrap',cursor:'pointer'}});
  for (const [val,label] of [[30000,'¥3万'],[50000,'¥5万'],[100000,'¥10万']]) {
    const isOn = bp.budget === val;
    pills.appendChild(h('span',{style:{fontSize:'10px',padding:'3px 9px',borderRadius:'20px',background:isOn?'rgba(91,156,246,0.1)':'var(--bg3)',color:isOn?'var(--ac)':'var(--tx3)',border:`1px solid ${isOn?'rgba(91,156,246,0.2)':'var(--bd)'}`,fontWeight:600,cursor:'pointer'},
      onClick:()=>{bp.budget=val;render();}},label));
  }
  wrap.appendChild(pills);
  
  // ── 注記 ──
  wrap.appendChild(h('div',{style:{marginBottom:'10px',padding:'6px 10px',borderRadius:'7px',background:'rgba(91,156,246,0.04)',border:'1px solid rgba(91,156,246,0.08)',fontSize:'10px',color:'var(--tx3)',lineHeight:'1.5'}},
    h('span',null,'💡 各レースは'), h('b',{style:{color:'var(--ac)'}},'AI計画通り'), h('span',null,'がデフォルト。詳細画面でオッズ連動の最終買い目を確認。')
  ));
  
  // ── NEXT（締切が近い順、複数対応） ──
  const now = Date.now();
  const nextRaces = coming.filter(p => p.dlMs > now && p.dlMs - now < 30 * 60 * 1000).slice(0, 3); // 30分以内
  if (nextRaces.length > 0) {
    const ng = h('div',{style:{marginBottom:'10px'}});
    const nearestDl = getDeadline(new Date(nextRaces[0].dlMs).toISOString());
    ng.appendChild(h('div',{style:{fontSize:'9px',fontWeight:800,color:'var(--ac)',letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:'6px',display:'flex',alignItems:'center',gap:'5px'}},
      h('span',null,nextRaces.length > 1 ? `NEXT — ${nextRaces.length}レース` : 'NEXT'),
      h('span',{style:{color:'var(--warn)',fontFamily:'JetBrains Mono,monospace',fontSize:'11px',fontWeight:800,animation:'blink 1s infinite'}},`⏱ ${nearestDl?.label||''}`)));
    
    for (const nr of nextRaces) {
      const nc = h('div',{style:{background:'linear-gradient(145deg,rgba(91,156,246,0.08),rgba(167,139,250,0.04))',border:'1px solid rgba(91,156,246,0.15)',borderRadius:'var(--r)',padding:'10px 12px',marginBottom:'6px',cursor:'pointer',position:'relative',overflow:'hidden'},
        onClick:()=>{state.vid=nr.venueId;state.rno=nr.raceNo;state.view='detail';state.tab=1;render();}});
      nc.appendChild(h('div',{style:{position:'absolute',left:0,top:0,bottom:0,width:'3px',background:'linear-gradient(180deg,var(--ac),#a78bfa)'}}));
      
      const row = h('div',{style:{display:'flex',alignItems:'center',gap:'7px'}});
      row.appendChild(h('div',{style:{fontSize:'15px',fontWeight:900,letterSpacing:'-0.3px'}},`${nr.venueName} ${nr.raceNo}R`));
      if (CUT_VENUE_IDS.includes(nr.venueId)) row.appendChild(h('span',{style:{fontSize:'8px',padding:'1px 4px',borderRadius:'3px',background:'rgba(239,68,68,0.1)',color:'var(--err)',fontWeight:700}},'非推奨'));
      row.appendChild(h('span',{className:`rank rank-${nr.rank}`},nr.rank));
      row.appendChild(h('span',{className:`chaos chaos-${nr.chaosLevel}`,style:{fontSize:'9px',padding:'1px 5px'}},`${nr.chaosIcon}${nr.chaosScore}`));
      row.appendChild(h('span',{style:{fontSize:'10px',padding:'2px 6px',borderRadius:'10px',fontWeight:700,background:nr.hasEx?'rgba(52,211,153,0.1)':'rgba(251,191,36,0.08)',color:nr.hasEx?'var(--ok)':'var(--warn)'}},nr.hasEx?'展示✓':'展示待ち'));
      row.appendChild(h('span',{style:{marginLeft:'auto',fontSize:'14px',fontWeight:800,fontFamily:'JetBrains Mono,monospace'}},`¥${nr.boardBet.toLocaleString()}`));
      nc.appendChild(row);
      
      const meta = h('div',{style:{display:'flex',alignItems:'center',gap:'5px',marginTop:'5px'}});
      if (nr.axisBoat) meta.appendChild(boatBadge(nr.axisBoat, 16));
      meta.appendChild(h('span',{style:{fontSize:'12px',fontWeight:600}},`${nr.axisName||''} 軸`));
      meta.appendChild(h('span',{style:{fontSize:'10px',color:'var(--tx3)'}},nr.betStrategy));
      meta.appendChild(h('span',{style:{marginLeft:'auto',fontSize:'10px',color:'var(--ac)'}},'▶ 詳細'));
      nc.appendChild(meta);
      ng.appendChild(nc);
    }
    wrap.appendChild(ng);
  }
  
  // ── 場別スコアボード ──
  const venueMap = {};
  for (const p of plan) {
    if (!venueMap[p.venueId]) venueMap[p.venueId] = {name:p.venueName, tier:p.tier, total:0, done:0, bet:0, ret:0, planned:0};
    const vm = venueMap[p.venueId];
    if (p.userAction !== 'skipped') { vm.total++; vm.planned += p.boardBet; }
    if (p.isFinished && p.userAction !== 'skipped') { vm.done++; vm.bet += p.boardBet; vm.ret += p.returnAmount; }
  }
  const venues = Object.values(venueMap).sort((a,b) => {const to={S:0,A:1,B:2,C:3,D:4}; return (to[a.tier]||9)-(to[b.tier]||9);});
  
  if (venues.length > 0) {
    const vc = h('div',{className:'card',style:{marginBottom:'10px'}});
    vc.appendChild(h('div',{className:'section-title',style:{fontSize:'11px',fontWeight:700,color:'var(--tx3)',marginBottom:'8px'}},'🏟️ 場別スコアボード'));
    const maxPlan = Math.max(...venues.map(v=>v.planned), 1);
    for (const v of venues) {
      const vr = h('div',{style:{display:'flex',alignItems:'center',gap:'7px',padding:'7px 0',borderBottom:'1px solid var(--bd)'}});
      const tc = v.tier==='S'?'rgba(245,200,66,0.12)':v.tier==='A'?'rgba(91,156,246,0.12)':'rgba(255,255,255,0.05)';
      const tcc = v.tier==='S'?'var(--gold)':v.tier==='A'?'var(--ac)':'var(--tx3)';
      vr.appendChild(h('span',{style:{fontSize:'9px',padding:'2px 7px',borderRadius:'20px',fontWeight:800,background:tc,color:tcc}},v.tier));
      vr.appendChild(h('span',{style:{fontSize:'13px',fontWeight:700,width:'38px'}},v.name));
      const bw = h('div',{style:{flex:1,height:'16px',position:'relative',borderRadius:'3px',background:'rgba(255,255,255,0.03)',overflow:'hidden'}});
      bw.appendChild(h('div',{style:{height:'100%',borderRadius:'3px',position:'absolute',left:0,top:0,width:`${v.planned/maxPlan*100}%`,background:'rgba(91,156,246,0.12)'}}));
      if (v.done > 0) bw.appendChild(h('div',{style:{height:'100%',borderRadius:'3px',position:'absolute',left:0,top:0,width:`${v.bet/maxPlan*100}%`,background:'rgba(45,212,160,0.25)'}}));
      vr.appendChild(bw);
      const vroi = v.bet > 0 ? Math.round(v.ret/v.bet*100) : 0;
      const roiC = v.done===0?'var(--tx4)':vroi>=100?'var(--ok)':vroi>=80?'var(--warn)':'var(--err)';
      vr.appendChild(h('div',{style:{fontSize:'10px',color:'var(--tx3)',textAlign:'right',minWidth:'52px',fontFamily:'JetBrains Mono,monospace'}},
        h('div',null,h('b',{style:{color:'var(--tx2)'}},`${v.done}/${v.total}`),`R`),
        h('div',{style:{color:roiC}},v.done>0?`${vroi}%`:'—')
      ));
      vc.appendChild(vr);
    }
    wrap.appendChild(vc);
  }
  
  // ── 消化済み + 結果待ち ──
  const doneAndPending = [...allFinished, ...pending.filter(p => p.userAction !== 'skipped')];
  if (doneAndPending.length > 0) {
    const dc = h('div',{className:'card',style:{marginBottom:'10px'}});
    const toggle = h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 0',cursor:'pointer'}});
    const pendingNonSkip = pending.filter(p => p.userAction !== 'skipped').length;
    toggle.appendChild(h('div',{style:{fontSize:'11px',fontWeight:700,color:'var(--tx3)'}},`✅ 消化済み ${allFinished.length}R${pendingNonSkip>0?' + '+pendingNonSkip+'R結果待ち':''} • ${totalHit}的中${passedCount>0?' ('+passedCount+'Rパス)':''}`));
    const arrowEl = h('span',{style:{fontSize:'10px',color:'var(--tx4)',transition:'transform 0.2s',transform:'rotate(90deg)'}},'▸');
    toggle.appendChild(arrowEl);
    const listEl = h('div',{});
    toggle.addEventListener('click',()=>{listEl.style.display=listEl.style.display==='none'?'block':'none';arrowEl.style.transform=listEl.style.display==='none'?'rotate(0)':'rotate(90deg)';});
    dc.appendChild(toggle);
    
    for (const p of doneAndPending) {
      const isPassed = p.userExec === 'passed';
      const isMissed = p.userExec === 'missed';
      const isPending = p.resultStatus === 'pending';
      const rowOpacity = isPassed ? 0.35 : isMissed ? 0.5 : isPending ? 0.6 : 1;
      const ri = h('div',{style:{display:'flex',alignItems:'center',gap:'7px',padding:'8px 0',opacity:rowOpacity,cursor:'pointer'},
        onClick:()=>{state.vid=p.venueId;state.rno=p.raceNo;state.view='detail';state.tab=0;render();supplementCurrentRace();}});
      ri.appendChild(h('span',{className:`rank rank-${p.rank}`},p.rank));
      if (p.axisBoat) ri.appendChild(boatBadge(p.axisBoat, 16));
      const info = h('div',{style:{flex:1,minWidth:0}});
      const nm = h('div',{style:{fontSize:'12px',fontWeight:700,display:'flex',alignItems:'center',gap:'4px'}});
      nm.appendChild(h('span',null,`${p.venueName} ${p.raceNo}R`));
      if (CUT_VENUE_IDS.includes(p.venueId)) nm.appendChild(h('span',{style:{fontSize:'8px',padding:'1px 4px',borderRadius:'3px',background:'rgba(239,68,68,0.1)',color:'var(--err)',fontWeight:700}},'非推奨'));
      if (p.hasEx) nm.appendChild(h('span',{style:{fontSize:'10px',padding:'2px 6px',borderRadius:'10px',fontWeight:700,background:'rgba(52,211,153,0.1)',color:'var(--ok)'}},'展示✓'));
      if (p.userAction === 'modified') nm.appendChild(h('span',{style:{fontSize:'9px',fontWeight:700,color:'var(--warn)'}},'💰変更'));
      info.appendChild(nm);
      info.appendChild(h('div',{style:{fontSize:'10px',color:'var(--tx3)',display:'flex',alignItems:'center',gap:'4px'}},
        h('span',null,`${p.axisName||''}軸`),
        h('span',{className:`chaos chaos-${p.chaosLevel}`,style:{fontSize:'9px',padding:'1px 5px'}},`${p.chaosIcon}${p.chaosScore}`)
      ));
      ri.appendChild(info);
      const right = h('div',{style:{textAlign:'right',flexShrink:0}});
      right.appendChild(h('div',{style:{fontSize:'11px',fontWeight:700,fontFamily:'JetBrains Mono,monospace',color:isPassed?'var(--tx4)':'var(--tx2)',textDecoration:isPassed?'line-through':'none'}},`¥${p.boardBet.toLocaleString()}`));
      if (p.resultStatus === 'hit') {
        right.appendChild(h('span',{style:{fontSize:'9px',padding:'2px 6px',borderRadius:'3px',fontWeight:700,background:'rgba(45,212,160,0.15)',color:'var(--ok)',display:'inline-block',marginTop:'2px'}},`🎯 +¥${p.returnAmount.toLocaleString()}`));
      } else if (p.resultStatus === 'refund') {
        right.appendChild(h('span',{style:{fontSize:'9px',padding:'2px 6px',borderRadius:'3px',fontWeight:700,background:'rgba(91,156,246,0.1)',color:'var(--ac)',display:'inline-block',marginTop:'2px'}},`↩ 返還`));
      } else if (p.resultStatus === 'pending') {
        right.appendChild(h('span',{style:{fontSize:'9px',padding:'2px 6px',borderRadius:'3px',fontWeight:700,background:'rgba(240,180,41,0.08)',color:'var(--warn)',display:'inline-block',marginTop:'2px'}},'⏳ 結果待ち'));
      } else {
        right.appendChild(h('span',{style:{fontSize:'9px',padding:'2px 6px',borderRadius:'3px',fontWeight:700,background:'rgba(239,86,86,0.08)',color:'#c06060',display:'inline-block',marginTop:'2px'}},'✗'));
      }
      ri.appendChild(right);
      
      // 実行ステータス（投票した/パス/不在）— 結果確定レースのみ
      if (p.isFinished) {
        const execKey = `${p.venueId}-${p.raceNo}`;
        const execRow = h('div',{style:{display:'flex',gap:'6px',marginTop:'4px',paddingLeft:'28px'}});
        const execState = p.userExec || null; // 未操作=不在扱い、明示的にbet/passedを選ぶ
        const mkExBtn = (val, icon, label, activeColor) => {
          const isActive = execState === val;
          return h('button',{style:{fontSize:'11px',padding:'8px 14px',borderRadius:'16px',border:`1px solid ${isActive?activeColor+'44':'var(--bd)'}`,background:isActive?activeColor+'15':'transparent',color:isActive?activeColor:'var(--tx4)',cursor:'pointer',fontWeight:isActive?700:400},
            onClick:(e)=>{e.stopPropagation();
              if(!state._board)state._board={overrides:{}};
              if(!state._board.overrides)state._board.overrides={};
              if(!state._board.overrides[execKey])state._board.overrides[execKey]={};
              state._board.overrides[execKey].exec=val;
              render();
            }},`${icon} ${label}`);
        };
        execRow.appendChild(mkExBtn('bet','✅','投票した','#30c060'));
        execRow.appendChild(mkExBtn('passed','⏭','パス','#f0a030'));
        execRow.appendChild(mkExBtn('missed','⏰','不在','#94a3b8'));
        listEl.appendChild(h('div',{style:{display:'flex',flexDirection:'column',borderBottom:'1px solid var(--bd)'}}, ri, execRow));
      } else {
        listEl.appendChild(h('div',{style:{display:'flex',flexDirection:'column',borderBottom:'1px solid var(--bd)'}}, ri));
      }
    }
    dc.appendChild(listEl);
    wrap.appendChild(dc);
  }

  }
  
  // ── 累計推移（SVGチャート） ──
  if (allFinished.length >= 2) {
    const cc = h('div',{className:'card',style:{marginBottom:'10px'}});

    let cumP = 0;
    const points = [{x:0,y:0,label:'開始'}];
    for (const p of allFinished) {
      cumP += (p.returnAmount - p.boardBet);
      points.push({x:points.length, y:cumP, label:`${p.venueName.slice(0,1)}${p.raceNo}`, hit:p.resultStatus==='hit'});
    }
    const maxY = Math.max(...points.map(p=>Math.abs(p.y)), 1000);
    const svgW = 300, svgH = 50, pad = 5;
    const scaleX = (svgW - pad*2) / Math.max(points.length - 1, 1);
    const mid = svgH / 2;
    const scaleY = (svgH/2 - pad) / maxY;
    
    const polyPoints = points.map((p,i) => `${pad + i*scaleX},${mid - p.y*scaleY}`).join(' ');
    const fillPoints = polyPoints + ` ${pad+(points.length-1)*scaleX},${svgH} ${pad},${svgH}`;

    svgContent += `<polygon points="${fillPoints}" fill="${lineColor}" opacity="0.1"/>`;
    for (let i = 1; i < points.length; i++) {

  // ── Phase 3: ふりかえり（全消化 or 80%以上消化時に表示） ──

    rv.appendChild(h('div',{style:{fontSize:'14px',fontWeight:900,marginBottom:'12px'}},'📋 今日のふりかえり'));
    
    // AI計画仮想収支
    const aiBet = allFinished.reduce((s,p)=>s+p.boardBet,0);
    const aiProfit = totalReturn - aiBet;
    const aiRoi = aiBet > 0 ? Math.round(totalReturn / aiBet * 100) : 0;
    const yourDiff = profit - aiProfit;
    
    // ═══ ① ハズレパターン分析 ═══
    {
      rv.appendChild(h('div',{style:{fontSize:'12px',fontWeight:700,color:'var(--tx2)',marginBottom:'6px'}},'🔍 ハズレ分析'));

      let first1Hit = 0, combo23Miss = 0, first1Miss = 0;
      let strongRaces = 0, strongHit = 0, normalRaces = 0, normalHit = 0;
      let cutVenueCount = 0;
      
      for (const p of finishedRaces) {
        // 1着的中判定

        if (pred && rs?.order?.length >= 3) {

            if (p.resultStatus !== 'hit') combo23Miss++;
          } else {
            first1Miss++;
          }
          
          // TOP確率チェック
          const topProb = pred.trifectaProbs ? Math.max(...Object.values(pred.trifectaProbs)) : 0;
          if (topProb >= 0.08) { strongRaces++; if (p.resultStatus === 'hit') strongHit++; }
          else if (topProb >= 0.05) { normalRaces++; if (p.resultStatus === 'hit') normalHit++; }
        }
        
        // 非推奨場チェック
        if (CUT_VENUE_IDS.includes(p.venueId)) cutVenueCount++;
      }
      
      const anaGrid = h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px',marginBottom:'8px'}});

      anaGrid.appendChild(f1box);
      
      // ハズレ内訳

      patBox.appendChild(h('div',{style:{fontSize:'10px',color:'var(--tx4)',marginBottom:'2px'}},'ハズレ内訳'));
      const missTotal = finishedRaces.length - totalHit;

      rv.appendChild(anaGrid);
      
      // 推奨度別成績
      if (strongRaces > 0 || normalRaces > 0) {
        const recRow = h('div',{style:{display:'flex',gap:'8px',marginBottom:'6px'}});

          recRow.appendChild(h('span',{style:{fontSize:'10px',padding:'3px 8px',borderRadius:'var(--r-full)',background:'rgba(34,197,94,0.08)',color:strongHit>0?'var(--ok)':'var(--tx3)',border:'1px solid rgba(34,197,94,0.15)'}},`🔥強推奨 ${strongHit}/${strongRaces}的中`));
        }

          recRow.appendChild(h('span',{style:{fontSize:'10px',padding:'3px 8px',borderRadius:'var(--r-full)',background:'rgba(96,165,250,0.06)',color:normalHit>0?'var(--ac-t)':'var(--tx3)',border:'1px solid rgba(96,165,250,0.1)'}},`⚡推奨 ${normalHit}/${normalRaces}的中`));
        }
        rv.appendChild(recRow);
      }
      
      // 非推奨場チェック
      const cutCheck = h('div',{style:{fontSize:'11px',color:cutVenueCount===0?'var(--ok)':'var(--err)',marginBottom:'10px',display:'flex',alignItems:'center',gap:'4px'}});
      if (cutVenueCount === 0) {

      rv.appendChild(cutCheck);
    }
    
    // ═══ ② 直近7日の推移（ledgerから） ═══
    {
      try {
        const ledger = JSON.parse(localStorage.getItem('br-ledger') || '[]');
        if (ledger.length >= 2) {
          rv.appendChild(h('div',{style:{fontSize:'12px',fontWeight:700,color:'var(--tx2)',marginTop:'8px',marginBottom:'6px'}},'📈 直近の推移'));
          
          // 直近7日分を集計
          const dayMap = {};
          for (const entry of ledger) {
            const d = entry.date || entry.d;

            if (!dayMap[d]) dayMap[d] = { bet: 0, ret: 0, hit: 0, total: 0 };
            dayMap[d].bet += entry.bet || 0;
            dayMap[d].ret += entry.ret || entry.payout || 0;
            dayMap[d].hit += entry.hit ? 1 : 0;
            dayMap[d].total += 1;
          }
          const days = Object.keys(dayMap).sort().slice(-7);

            const maxBet = Math.max(...days.map(d => dayMap[d].bet), 1);

              const barH = Math.max(4, Math.round(dm.bet / maxBet * chartH * 0.8));

              chart.appendChild(bar);

            // 直近サマリー

            const totalHitN = days.reduce((s,d) => s + dayMap[d].hit, 0);
            const totalRacesN = days.reduce((s,d) => s + dayMap[d].total, 0);
            const roiN = totalBetN > 0 ? Math.round(totalRetN / totalBetN * 100) : 0;
            rv.appendChild(h('div',{style:{fontSize:'10px',color:'var(--tx3)',textAlign:'center',marginBottom:'8px'}},
              `直近${days.length}日: 的中 ${totalHitN}/${totalRacesN} / ROI ${roiN}%`));
          }
        }
      } catch(e) { /* ledger parse error - skip */ }
    }
    
    // ═══ ③ 統計的正常/異常判定 + AI総評 ═══
    {

      const finN = allFinished.length;

      const actualHitRate = finN > 0 ? totalHit / finN : 0;

      if (totalHit === 0) {

        if (zeroPct >= 20) {

      } else {
        const hitPct = Math.round(actualHitRate * 100);
        statBox.appendChild(h('div',null,`今日の的中率 ${hitPct}% (BT平均 15%)`));
        if (hitPct >= 20) {
          statBox.appendChild(h('div',{style:{color:'var(--ok)',fontWeight:600,marginTop:'2px'}},'→ 平均以上の的中。良い日！'));
        } else {
          statBox.appendChild(h('div',{style:{color:'var(--tx3)',marginTop:'2px'}},'→ 平均的な結果'));
        }
      }
      rv.appendChild(statBox);
      
      // AI一言コメント（ルールベース）
      const commentBox = h('div',{style:{padding:'10px',borderRadius:'var(--r-sm)',background:'rgba(96,165,250,0.04)',border:'1px solid rgba(96,165,250,0.1)',fontSize:'12px',lineHeight:'1.6'}});
      commentBox.appendChild(h('span',{style:{fontSize:'13px',marginRight:'4px'}},'💬'));
      
      // コメント生成（ハズレパターンに基づく）
      let comment = '';
      const finishedRaces2 = allFinished.filter(p => p.isFinished);
      let f1hit2 = 0, c23miss2 = 0;
      for (const p of finishedRaces2) {
        const rs = state.rMap[`${p.venueId}-${p.raceNo}`];
        const venue = state.venues.find(v => v.id === p.venueId);

// 直近3日の実績計算（簡易版）
function calcRecentStats() {
  try {
    const allPicks = Object.values(state.pickStore);
    if (allPicks.length < 3) return null;
    const recent = allPicks.slice(-30);
    const total = recent.length;
    const hit = recent.filter(p => p.hitPay && p.hitPay > 0).length;
    const bet = recent.reduce((s,p) => s + (p.totalBet||0), 0);
    const ret = recent.reduce((s,p) => s + (p.hitPay||0), 0);
    const roi = bet > 0 ? Math.round(ret/bet*100) : 0;
    return {total, hit, bet, ret, roi};
  } catch(e) { return null; }
}
